---
# Provision the realm-admin password auto-rotation CronJob and its dependencies:
#   - a dedicated Keycloak service-account client with realm-management
#     `manage-users` (so the CronJob never uses the master bootstrap admin),
#   - OpenBao policy + k8s auth role granting read of the rotator client secret
#     and write of the realm-admin KV path,
#   - the SA/ConfigMap/CronJob manifests.
# Idempotent; safe to re-run.

- name: Ensure OpenBao provisioner token is available
  ansible.builtin.include_role:
    name: common
    tasks_from: load_openbao_provisioner_token.yml

- name: Set Keycloak internal base URL fact for rotator setup
  ansible.builtin.set_fact:
    _kc_rotator_base_url: "{{ keycloak_internal_api_url }}"

- name: Prepare internal HTTPS trust bundle for rotator setup
  ansible.builtin.import_role:
    name: common
    tasks_from: prepare_internal_https_caller.yml
  vars:
    common_internal_https_kubeconfig_path: "{{ keycloak_kubeconfig_path }}"
    common_internal_https_service_name: "{{ keycloak_service_name }}"
    common_internal_https_service_namespace: "{{ keycloak_namespace }}"
    common_internal_https_fqdn: "{{ keycloak_internal_service_fqdn }}"
    common_internal_https_openbao_cluster_addr: "{{ keycloak_openbao_cluster_addr }}"
    common_internal_https_openbao_ca_secret_name: "{{ keycloak_openbao_ca_secret_name }}"
    common_internal_https_ca_source_namespace: "{{ keycloak_namespace }}"
    common_internal_https_bundle_path: /tmp/{{ keycloak_openbao_ca_secret_name }}-rotator-ca.crt
    common_internal_https_openbao_pki_mount: "{{ openbao_pki_internal_mount | default('pki-int') }}"

- name: Read bootstrap-admin credentials for rotator setup
  ansible.builtin.command:
    cmd: >-
      k3s kubectl get secret {{ keycloak_bootstrap_admin_secret_name }}
      -n {{ keycloak_namespace }} -o jsonpath={.data.{{ item }}}
  environment:
    KUBECONFIG: "{{ keycloak_kubeconfig_path }}"
  loop: [username, password]
  register: _kc_rotator_admin_creds_b64
  changed_when: false
  no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"

- name: Obtain Keycloak master admin token for rotator setup
  ansible.builtin.uri:
    url: "{{ _kc_rotator_base_url }}/realms/master/protocol/openid-connect/token"
    method: POST
    body_format: form-urlencoded
    body:
      client_id: admin-cli
      username: "{{ _kc_rotator_admin_creds_b64.results[0].stdout | b64decode }}"
      password: "{{ _kc_rotator_admin_creds_b64.results[1].stdout | b64decode }}"
      grant_type: password
    ca_path: /tmp/{{ keycloak_openbao_ca_secret_name }}-rotator-ca.crt
    validate_certs: true
    status_code: 200
  register: _kc_rotator_token
  retries: 5
  delay: 10
  until: _kc_rotator_token.status == 200
  changed_when: false
  no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"

- name: Set rotator admin token fact
  ansible.builtin.set_fact:
    _kc_rotator_admin_token: "{{ _kc_rotator_token.json.access_token }}"
  no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"

- name: Look up rotator client in Keycloak
  ansible.builtin.uri:
    url: "{{ _kc_rotator_base_url }}/admin/realms/{{ keycloak_realm }}/clients?clientId={{ keycloak_rotator_client_id }}"
    method: GET
    headers:
      Authorization: "Bearer {{ _kc_rotator_admin_token }}"
    ca_path: /tmp/{{ keycloak_openbao_ca_secret_name }}-rotator-ca.crt
    validate_certs: true
    status_code: 200
  register: _kc_rotator_client_lookup
  changed_when: false
  no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"

- name: Create rotator service-account client
  ansible.builtin.uri:
    url: "{{ _kc_rotator_base_url }}/admin/realms/{{ keycloak_realm }}/clients"
    method: POST
    headers:
      Authorization: "Bearer {{ _kc_rotator_admin_token }}"
      Content-Type: application/json
    body_format: json
    body:
      clientId: "{{ keycloak_rotator_client_id }}"
      name: Realm Admin Password Rotator
      enabled: true
      protocol: openid-connect
      publicClient: false
      standardFlowEnabled: false
      implicitFlowEnabled: false
      directAccessGrantsEnabled: false
      serviceAccountsEnabled: true
    ca_path: /tmp/{{ keycloak_openbao_ca_secret_name }}-rotator-ca.crt
    validate_certs: true
    status_code: 201
  when: (_kc_rotator_client_lookup.json | length) == 0
  register: _kc_rotator_client_create
  no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"

- name: Re-read rotator client after ensure
  ansible.builtin.uri:
    url: "{{ _kc_rotator_base_url }}/admin/realms/{{ keycloak_realm }}/clients?clientId={{ keycloak_rotator_client_id }}"
    method: GET
    headers:
      Authorization: "Bearer {{ _kc_rotator_admin_token }}"
    ca_path: /tmp/{{ keycloak_openbao_ca_secret_name }}-rotator-ca.crt
    validate_certs: true
    status_code: 200
  register: _kc_rotator_client_final
  changed_when: false
  no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"

- name: Set rotator client internal id
  ansible.builtin.set_fact:
    _kc_rotator_client_id_internal: "{{ (_kc_rotator_client_final.json | first).id }}"

- name: Get rotator client service-account user
  ansible.builtin.uri:
    url: "{{ _kc_rotator_base_url }}/admin/realms/{{ keycloak_realm }}/clients/{{ _kc_rotator_client_id_internal }}/service-account-user"
    method: GET
    headers:
      Authorization: "Bearer {{ _kc_rotator_admin_token }}"
    ca_path: /tmp/{{ keycloak_openbao_ca_secret_name }}-rotator-ca.crt
    validate_certs: true
    status_code: 200
  register: _kc_rotator_sa_user
  changed_when: false
  no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"

- name: Look up realm-management client
  ansible.builtin.uri:
    url: "{{ _kc_rotator_base_url }}/admin/realms/{{ keycloak_realm }}/clients?clientId=realm-management"
    method: GET
    headers:
      Authorization: "Bearer {{ _kc_rotator_admin_token }}"
    ca_path: /tmp/{{ keycloak_openbao_ca_secret_name }}-rotator-ca.crt
    validate_certs: true
    status_code: 200
  register: _kc_realm_mgmt_client
  changed_when: false
  no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"

- name: Get manage-users role from realm-management
  ansible.builtin.uri:
    url: "{{ _kc_rotator_base_url }}/admin/realms/{{ keycloak_realm }}/clients/{{ (_kc_realm_mgmt_client.json | first).id }}/roles/manage-users"
    method: GET
    headers:
      Authorization: "Bearer {{ _kc_rotator_admin_token }}"
    ca_path: /tmp/{{ keycloak_openbao_ca_secret_name }}-rotator-ca.crt
    validate_certs: true
    status_code: 200
  register: _kc_manage_users_role
  changed_when: false
  no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"

- name: Assign manage-users to the rotator service account (idempotent)
  ansible.builtin.uri:
    url: "{{ _kc_rotator_base_url }}/admin/realms/{{ keycloak_realm }}/users/{{ _kc_rotator_sa_user.json.id }}/role-mappings/clients/{{ (_kc_realm_mgmt_client.json | first).id }}"
    method: POST
    headers:
      Authorization: "Bearer {{ _kc_rotator_admin_token }}"
      Content-Type: application/json
    body_format: json
    body:
      - id: "{{ _kc_manage_users_role.json.id }}"
        name: "{{ _kc_manage_users_role.json.name }}"
    ca_path: /tmp/{{ keycloak_openbao_ca_secret_name }}-rotator-ca.crt
    validate_certs: true
    status_code: [204]
  register: _kc_rotator_role_assign
  changed_when: true
  no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"

- name: Read rotator client secret
  ansible.builtin.uri:
    url: "{{ _kc_rotator_base_url }}/admin/realms/{{ keycloak_realm }}/clients/{{ _kc_rotator_client_id_internal }}/client-secret"
    method: GET
    headers:
      Authorization: "Bearer {{ _kc_rotator_admin_token }}"
    ca_path: /tmp/{{ keycloak_openbao_ca_secret_name }}-rotator-ca.crt
    validate_certs: true
    status_code: 200
  register: _kc_rotator_client_secret
  changed_when: false
  no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"

- name: Store rotator client credentials in OpenBao
  ansible.builtin.uri:
    url: "{{ keycloak_openbao_api_addr }}/v1/{{ keycloak_openbao_kv_mount }}/data/{{ keycloak_openbao_rotator_path }}"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_provisioner_token }}"
    body_format: json
    body:
      data:
        client_id: "{{ keycloak_rotator_client_id }}"
        client_secret: "{{ _kc_rotator_client_secret.json.value }}"
    status_code: [200, 204]
  no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"

- name: Apply realm-admin rotator manifests (SA, ConfigMap, CronJob)
  ansible.builtin.command:
    cmd: k3s kubectl apply -f -
    stdin: "{{ lookup('template', 'realm_admin_rotator.yaml.j2') }}"
  environment:
    KUBECONFIG: "{{ keycloak_kubeconfig_path }}"
  register: _kc_rotator_apply
  changed_when: >-
    'configured' in (_kc_rotator_apply.stdout | default('')) or
    'created' in (_kc_rotator_apply.stdout | default(''))

- name: Remove temporary Keycloak CA file for rotator setup
  ansible.builtin.file:
    path: /tmp/{{ keycloak_openbao_ca_secret_name }}-rotator-ca.crt
    state: absent
  changed_when: false

- name: Remove temporary Keycloak internal FQDN hosts override for rotator setup
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^.*\s+{{ keycloak_service_name }}\.{{ keycloak_namespace }}\.svc\.cluster\.local(\s|$)'
    state: absent
  become: true
