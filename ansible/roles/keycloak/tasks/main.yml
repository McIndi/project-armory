---
- name: Resolve ARMORY_LOG_NOLOG flag
  ansible.builtin.set_fact:
    armory_log_nolog: "{{ (lookup('ansible.builtin.env', 'ARMORY_LOG_NOLOG') | default('false', true)) | bool }}"
  changed_when: false

- name: Deploy standalone Keycloak (Operator + PostgreSQL StatefulSet)
  tags: [keycloak, keycloak_install, keycloak_oidc]
  block:
    # ── Namespace ──────────────────────────────────────────────────────────────
    - name: Ensure Keycloak namespace exists
      ansible.builtin.command:
        cmd: >-
          k3s kubectl create namespace {{ keycloak_namespace }}
          --dry-run=client -o yaml
      environment:
        KUBECONFIG: "{{ keycloak_kubeconfig_path }}"
      register: _keycloak_namespace_yaml
      changed_when: false
      when: not ansible_check_mode

    - name: Apply Keycloak namespace manifest
      ansible.builtin.command:
        cmd: k3s kubectl apply -f -
        stdin: "{{ _keycloak_namespace_yaml.stdout }}"
      environment:
        KUBECONFIG: "{{ keycloak_kubeconfig_path }}"
      register: _keycloak_namespace_apply
      changed_when: >-
        'created' in (_keycloak_namespace_apply.stdout | default(''))
      when: not ansible_check_mode

    # ── OpenBao: generate + persist credentials ─────────────────────────────────
    - name: Ensure OpenBao provisioner token is available
      ansible.builtin.include_role:
        name: common
        tasks_from: load_openbao_provisioner_token.yml

    - name: Read current Keycloak DB credentials from OpenBao
      ansible.builtin.uri:
        url: "{{ keycloak_openbao_api_addr }}/v1/{{ keycloak_openbao_kv_mount }}/data/{{ keycloak_openbao_db_path }}"
        method: GET
        headers:
          X-Vault-Token: "{{ openbao_provisioner_token }}"
        status_code: [200, 404]
      register: _keycloak_db_creds_current
      no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"
      when: not ansible_check_mode

    - name: Build Keycloak DB credentials (username fixed, password generated once)
      ansible.builtin.set_fact:
        _keycloak_db_creds: >-
          {{
            {
              'username': keycloak_db_username,
              'password': (
                (_keycloak_db_creds_current.json.data.data.password)
                if ((_keycloak_db_creds_current.status | default(404)) == 200
                    and (_keycloak_db_creds_current.json.data.data.password | default('') | length) > 0)
                else lookup('ansible.builtin.password', '/dev/null length=32 chars=ascii_letters,digits')
              )
            }
          }}
      no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"
      when: not ansible_check_mode

    - name: Store Keycloak DB credentials in OpenBao
      ansible.builtin.uri:
        url: "{{ keycloak_openbao_api_addr }}/v1/{{ keycloak_openbao_kv_mount }}/data/{{ keycloak_openbao_db_path }}"
        method: POST
        headers:
          X-Vault-Token: "{{ openbao_provisioner_token }}"
        body_format: json
        body:
          data: "{{ _keycloak_db_creds }}"
        status_code: [200, 204]
      no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"
      when: not ansible_check_mode

    - name: Read current realm-admin password from OpenBao
      ansible.builtin.uri:
        url: "{{ keycloak_openbao_api_addr }}/v1/{{ keycloak_openbao_kv_mount }}/data/{{ keycloak_openbao_realm_admin_path }}"
        method: GET
        headers:
          X-Vault-Token: "{{ openbao_provisioner_token }}"
        status_code: [200, 404]
      register: _keycloak_realm_admin_current
      no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"
      when: not ansible_check_mode

    - name: Build realm-admin password (generated once, persisted)
      ansible.builtin.set_fact:
        _keycloak_realm_admin_password: >-
          {{
            (_keycloak_realm_admin_current.json.data.data.password)
            if ((_keycloak_realm_admin_current.status | default(404)) == 200
                and (_keycloak_realm_admin_current.json.data.data.password | default('') | length) > 0)
            else lookup('ansible.builtin.password', '/dev/null length=24 chars=ascii_letters,digits')
          }}
      no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"
      when: not ansible_check_mode

    - name: Store realm-admin password in OpenBao
      ansible.builtin.uri:
        url: "{{ keycloak_openbao_api_addr }}/v1/{{ keycloak_openbao_kv_mount }}/data/{{ keycloak_openbao_realm_admin_path }}"
        method: POST
        headers:
          X-Vault-Token: "{{ openbao_provisioner_token }}"
        body_format: json
        body:
          data:
            username: "{{ keycloak_realm_admin_username }}"
            password: "{{ _keycloak_realm_admin_password }}"
        status_code: [200, 204]
      no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"
      when: not ansible_check_mode

    # ── Master bootstrap admin: OpenBao-generated, replaces operator temp-admin ──
    - name: Read current master bootstrap-admin password from OpenBao
      ansible.builtin.uri:
        url: "{{ keycloak_openbao_api_addr }}/v1/{{ keycloak_openbao_kv_mount }}/data/{{ keycloak_openbao_bootstrap_admin_path }}"
        method: GET
        headers:
          X-Vault-Token: "{{ openbao_provisioner_token }}"
        status_code: [200, 404]
      register: _keycloak_bootstrap_admin_current
      no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"
      when: not ansible_check_mode

    - name: Build master bootstrap-admin password (generated once, persisted)
      ansible.builtin.set_fact:
        _keycloak_bootstrap_admin_password: >-
          {{
            (_keycloak_bootstrap_admin_current.json.data.data.password)
            if ((_keycloak_bootstrap_admin_current.status | default(404)) == 200
                and (_keycloak_bootstrap_admin_current.json.data.data.password | default('') | length) > 0)
            else lookup('ansible.builtin.password', '/dev/null length=24 chars=ascii_letters,digits')
          }}
      no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"
      when: not ansible_check_mode

    - name: Store master bootstrap-admin credentials in OpenBao
      ansible.builtin.uri:
        url: "{{ keycloak_openbao_api_addr }}/v1/{{ keycloak_openbao_kv_mount }}/data/{{ keycloak_openbao_bootstrap_admin_path }}"
        method: POST
        headers:
          X-Vault-Token: "{{ openbao_provisioner_token }}"
        body_format: json
        body:
          data:
            username: "{{ keycloak_bootstrap_admin_username }}"
            password: "{{ _keycloak_bootstrap_admin_password }}"
        status_code: [200, 204]
      no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"
      when: not ansible_check_mode

    # The Secret must exist before the Keycloak CR is applied: the operator reads
    # spec.bootstrapAdmin.user.secret at first creation. Render via kubectl
    # dry-run|apply so the credentials never touch the host filesystem.
    - name: Generate master bootstrap-admin Secret manifest
      ansible.builtin.command:
        cmd: >-
          k3s kubectl create secret generic {{ keycloak_bootstrap_admin_secret_name }}
          --namespace {{ keycloak_namespace }}
          --from-literal=username={{ keycloak_bootstrap_admin_username }}
          --from-literal=password={{ _keycloak_bootstrap_admin_password }}
          --dry-run=client -o yaml
      environment:
        KUBECONFIG: "{{ keycloak_kubeconfig_path }}"
      register: _keycloak_bootstrap_admin_secret_yaml
      changed_when: false
      no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"
      when: not ansible_check_mode

    - name: Apply master bootstrap-admin Secret in the Keycloak namespace
      ansible.builtin.command:
        cmd: k3s kubectl apply -f -
        stdin: "{{ _keycloak_bootstrap_admin_secret_yaml.stdout }}"
      environment:
        KUBECONFIG: "{{ keycloak_kubeconfig_path }}"
      register: _keycloak_bootstrap_admin_secret_apply
      changed_when: >-
        'configured' in (_keycloak_bootstrap_admin_secret_apply.stdout | default('')) or
        'created' in (_keycloak_bootstrap_admin_secret_apply.stdout | default(''))
      no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"
      when: not ansible_check_mode

    # ── VSO wiring: sync DB secret from OpenBao ─────────────────────────────────
    - name: Ensure OpenBao CA secret exists in the Keycloak namespace
      ansible.builtin.import_role:
        name: common
        tasks_from: copy_openbao_ca_secret.yml
      vars:
        common_kubeconfig_path: "{{ keycloak_kubeconfig_path }}"
        common_ca_secret_name: "{{ keycloak_openbao_ca_secret_name }}"
        common_ca_source_namespace: "{{ keycloak_openbao_namespace }}"
        common_ca_target_namespace: "{{ keycloak_namespace }}"
      when: not (use_declarative_ca_distribution | default(false) | bool)

    - name: Apply Keycloak VaultConnection and VaultAuth resources
      ansible.builtin.command:
        cmd: k3s kubectl apply -f -
        stdin: "{{ lookup('template', 'vaultconnection.yaml.j2') }}\n---\n{{ lookup('template', 'vaultauth.yaml.j2') }}"
      environment:
        KUBECONFIG: "{{ keycloak_kubeconfig_path }}"
      register: _keycloak_vault_auth_apply
      changed_when: >-
        'configured' in (_keycloak_vault_auth_apply.stdout | default('')) or
        'created' in (_keycloak_vault_auth_apply.stdout | default(''))
      when: not ansible_check_mode

    - name: Apply Keycloak VaultStaticSecret (DB credentials)
      ansible.builtin.command:
        cmd: k3s kubectl apply -f -
        stdin: "{{ lookup('template', 'vaultstaticsecret.yaml.j2') }}"
      environment:
        KUBECONFIG: "{{ keycloak_kubeconfig_path }}"
      register: _keycloak_vss_apply
      changed_when: >-
        'configured' in (_keycloak_vss_apply.stdout | default('')) or
        'created' in (_keycloak_vss_apply.stdout | default(''))
      when: not ansible_check_mode

    - name: Apply Keycloak VaultStaticSecret (realm-admin login mirror)
      ansible.builtin.command:
        cmd: k3s kubectl apply -f -
        stdin: "{{ lookup('template', 'vaultstaticsecret_realm_admin.yaml.j2') }}"
      environment:
        KUBECONFIG: "{{ keycloak_kubeconfig_path }}"
      register: _keycloak_realm_admin_vss_apply
      changed_when: >-
        'configured' in (_keycloak_realm_admin_vss_apply.stdout | default('')) or
        'created' in (_keycloak_realm_admin_vss_apply.stdout | default(''))
      when: not ansible_check_mode

    - name: Wait for keycloak-db-secret to be synced by VSO
      ansible.builtin.command:
        cmd: >-
          k3s kubectl get secret {{ keycloak_db_secret_name }}
          --namespace {{ keycloak_namespace }}
      environment:
        KUBECONFIG: "{{ keycloak_kubeconfig_path }}"
      register: _keycloak_db_secret_check
      until: _keycloak_db_secret_check.rc == 0
      retries: 20
      delay: 6
      changed_when: false
      when: not ansible_check_mode

    - name: Ensure PostgreSQL TLS certificate exists and is ready
      ansible.builtin.import_role:
        name: common
        tasks_from: apply_certificate.yml
      vars:
        common_kubeconfig_path: "{{ keycloak_kubeconfig_path }}"
        common_certificate_name: "{{ keycloak_pg_tls_certificate_name }}"
        common_certificate_namespace: "{{ keycloak_namespace }}"
        common_certificate_secret_name: "{{ keycloak_pg_tls_secret_name }}"
        common_certificate_issuer_name: "{{ keycloak_pg_tls_issuer_name }}"
        common_certificate_duration: "{{ keycloak_pg_tls_certificate_duration }}"
        common_certificate_renew_before: "{{ keycloak_pg_tls_certificate_renew_before }}"
        common_certificate_common_name: "{{ keycloak_pg_tls_common_name | default('') }}"
        common_certificate_dns_names: "{{ keycloak_pg_tls_dns_names }}"
      when:
        - not ansible_check_mode
        - keycloak_postgresql_enabled | bool
        - keycloak_pg_tls_enabled | bool

    # ── PostgreSQL StatefulSet ──────────────────────────────────────────────────
    - name: Apply PostgreSQL StatefulSet and Service
      ansible.builtin.command:
        cmd: k3s kubectl apply -f -
        stdin: "{{ lookup('template', 'postgres.yaml.j2') }}"
      environment:
        KUBECONFIG: "{{ keycloak_kubeconfig_path }}"
      register: _keycloak_pg_apply
      changed_when: >-
        'configured' in (_keycloak_pg_apply.stdout | default('')) or
        'created' in (_keycloak_pg_apply.stdout | default(''))
      when:
        - not ansible_check_mode
        - keycloak_postgresql_enabled | bool

    - name: Wait for PostgreSQL StatefulSet rollout
      ansible.builtin.command:
        cmd: >-
          k3s kubectl rollout status statefulset/{{ keycloak_pg_service }}
          --namespace {{ keycloak_namespace }}
          --timeout={{ keycloak_pg_rollout_timeout_seconds }}s
      environment:
        KUBECONFIG: "{{ keycloak_kubeconfig_path }}"
      register: _keycloak_pg_rollout
      changed_when: false
      when:
        - not ansible_check_mode
        - keycloak_postgresql_enabled | bool

    - name: Prepare Postgres CA bundle for Keycloak verify-full DB TLS
      ansible.builtin.import_role:
        name: common
        tasks_from: prepare_internal_https_caller.yml
      vars:
        common_internal_https_kubeconfig_path: "{{ keycloak_kubeconfig_path }}"
        common_internal_https_service_name: "{{ keycloak_pg_service }}"
        common_internal_https_service_namespace: "{{ keycloak_namespace }}"
        common_internal_https_fqdn: "{{ keycloak_pg_service_fqdn }}"
        common_internal_https_openbao_cluster_addr: "{{ keycloak_openbao_cluster_addr }}"
        common_internal_https_openbao_ca_secret_name: "{{ keycloak_pg_tls_ca_secret_name }}"
        common_internal_https_ca_source_namespace: "{{ keycloak_namespace }}"
        common_internal_https_bundle_path: "{{ keycloak_pg_tls_ca_bundle_path }}"
        common_internal_https_openbao_pki_mount: "{{ openbao_pki_internal_mount | default('pki-int') }}"
      when:
        - not ansible_check_mode
        - keycloak_postgresql_enabled | bool
        - keycloak_pg_tls_enabled | bool

    - name: Create Keycloak Postgres CA ConfigMap manifest
      ansible.builtin.command:
        cmd: >-
          k3s kubectl create configmap {{ keycloak_pg_tls_ca_configmap_name }}
          --namespace {{ keycloak_namespace }}
          --from-file={{ keycloak_pg_tls_ca_file_name }}={{ keycloak_pg_tls_ca_bundle_path }}
          --dry-run=client -o yaml
      environment:
        KUBECONFIG: "{{ keycloak_kubeconfig_path }}"
      register: _keycloak_pg_ca_configmap_yaml
      changed_when: false
      when:
        - not ansible_check_mode
        - keycloak_postgresql_enabled | bool
        - keycloak_pg_tls_enabled | bool

    - name: Apply Keycloak Postgres CA ConfigMap
      ansible.builtin.command:
        cmd: k3s kubectl apply -f -
        stdin: "{{ _keycloak_pg_ca_configmap_yaml.stdout }}"
      environment:
        KUBECONFIG: "{{ keycloak_kubeconfig_path }}"
      register: _keycloak_pg_ca_configmap_apply
      changed_when: >-
        'configured' in (_keycloak_pg_ca_configmap_apply.stdout | default('')) or
        'created' in (_keycloak_pg_ca_configmap_apply.stdout | default(''))
      when:
        - not ansible_check_mode
        - keycloak_postgresql_enabled | bool
        - keycloak_pg_tls_enabled | bool

    - name: Remove temporary Keycloak Postgres CA bundle file
      ansible.builtin.file:
        path: "{{ keycloak_pg_tls_ca_bundle_path }}"
        state: absent
      changed_when: false
      when:
        - not ansible_check_mode
        - keycloak_postgresql_enabled | bool
        - keycloak_pg_tls_enabled | bool

    - name: Remove temporary Postgres FQDN hosts override for DB TLS bootstrap
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: '^.*\s+{{ keycloak_pg_service_fqdn | regex_escape }}(\s|$)'
        state: absent
      become: true
      when:
        - not ansible_check_mode
        - keycloak_postgresql_enabled | bool
        - keycloak_pg_tls_enabled | bool

    # ── Keycloak Operator: CRDs + operator Deployment ───────────────────────────
    - name: Install Keycloak CRDs (cluster-scoped, pinned version)
      ansible.builtin.command:
        cmd: "k3s kubectl apply --server-side -f {{ keycloak_k8s_resources_base_url }}/{{ item }}"
      environment:
        KUBECONFIG: "{{ keycloak_kubeconfig_path }}"
      loop:
        - "{{ keycloak_crd_keycloaks }}-v1.yml"
        - "{{ keycloak_crd_realmimports }}-v1.yml"
      register: _keycloak_crd_apply
      changed_when: >-
        'configured' in (_keycloak_crd_apply.stdout | default('')) or
        'created' in (_keycloak_crd_apply.stdout | default(''))
      when: not ansible_check_mode

    - name: Wait for Keycloak CRDs to be established
      ansible.builtin.command:
        cmd: >-
          k3s kubectl wait --for=condition=Established
          crd/{{ item }} --timeout=120s
      environment:
        KUBECONFIG: "{{ keycloak_kubeconfig_path }}"
      loop:
        - "{{ keycloak_crd_keycloaks }}"
        - "{{ keycloak_crd_realmimports }}"
      changed_when: false
      when: not ansible_check_mode

    - name: Install Keycloak Operator into the Keycloak namespace
      ansible.builtin.command:
        cmd: >-
          k3s kubectl apply -n {{ keycloak_namespace }}
          -f {{ keycloak_k8s_resources_base_url }}/kubernetes.yml
      environment:
        KUBECONFIG: "{{ keycloak_kubeconfig_path }}"
      register: _keycloak_operator_apply
      changed_when: >-
        'configured' in (_keycloak_operator_apply.stdout | default('')) or
        'created' in (_keycloak_operator_apply.stdout | default(''))
      when: not ansible_check_mode

    # The upstream operator Deployment ships a short startup probe
    # (delay 5s + 3x10s ~= 35s) and a 700m CPU limit. On slow/CPU-throttled
    # hosts the Quarkus operator boots in ~45s+, so kubelet kills it before it
    # listens, causing an endless restart loop. Raise the startup window and
    # CPU limit so the operator can finish booting.
    - name: Patch Keycloak Operator startup probe and CPU for slow-JVM hosts
      ansible.builtin.command:
        cmd: >-
          k3s kubectl patch deployment {{ keycloak_operator_deployment_name }}
          --namespace {{ keycloak_namespace }}
          --type=strategic
          --patch
          {{ ({
               "spec": {
                 "template": {
                   "spec": {
                     "containers": [{
                       "name": keycloak_operator_deployment_name,
                       "startupProbe": {"failureThreshold": keycloak_operator_startup_probe_failurethreshold},
                       "resources": {"limits": {"cpu": keycloak_operator_cpu_limit}}
                     }]
                   }
                 }
               }
             }) | to_json | quote }}
      environment:
        KUBECONFIG: "{{ keycloak_kubeconfig_path }}"
      register: _keycloak_operator_patch
      changed_when: "'(no change)' not in (_keycloak_operator_patch.stdout | default(''))"
      when: not ansible_check_mode

    - name: Wait for Keycloak Operator deployment to be available
      ansible.builtin.command:
        cmd: >-
          k3s kubectl rollout status deployment/{{ keycloak_operator_deployment_name }}
          --namespace {{ keycloak_namespace }}
          --timeout={{ keycloak_operator_rollout_timeout_seconds }}s
      environment:
        KUBECONFIG: "{{ keycloak_kubeconfig_path }}"
      register: _keycloak_operator_rollout
      changed_when: false
      when: not ansible_check_mode

    - name: Provision Keycloak internal service TLS certificate
      ansible.builtin.import_role:
        name: common
        tasks_from: apply_certificate.yml
      vars:
        common_kubeconfig_path: "{{ keycloak_kubeconfig_path }}"
        common_certificate_name: "{{ keycloak_internal_tls_certificate_name }}"
        common_certificate_namespace: "{{ keycloak_namespace }}"
        common_certificate_secret_name: "{{ keycloak_internal_tls_secret_name }}"
        common_certificate_issuer_name: "{{ keycloak_internal_tls_issuer_name }}"
        common_certificate_duration: "{{ keycloak_internal_tls_certificate_duration }}"
        common_certificate_renew_before: "{{ keycloak_internal_tls_certificate_renew_before }}"
        common_certificate_dns_names: "{{ keycloak_internal_tls_dns_names }}"
      when:
        - not ansible_check_mode

    # ── Keycloak custom resource ────────────────────────────────────────────────
    - name: Apply Keycloak custom resource
      ansible.builtin.command:
        cmd: k3s kubectl apply -f -
        stdin: "{{ lookup('template', 'keycloak.yaml.j2') }}"
      environment:
        KUBECONFIG: "{{ keycloak_kubeconfig_path }}"
      register: _keycloak_cr_apply
      changed_when: >-
        'configured' in (_keycloak_cr_apply.stdout | default('')) or
        'created' in (_keycloak_cr_apply.stdout | default(''))
      when: not ansible_check_mode

    - name: Wait for Keycloak custom resource to become Ready
      block:
        - name: Wait for Keycloak custom resource to become Ready (initial)
          ansible.builtin.command:
            cmd: >-
              k3s kubectl wait --for=condition=Ready
              keycloak/{{ keycloak_cr_name }}
              --namespace {{ keycloak_namespace }}
              --timeout={{ keycloak_ready_timeout_seconds }}s
          environment:
            KUBECONFIG: "{{ keycloak_kubeconfig_path }}"
          register: _keycloak_cr_ready
          changed_when: false
      rescue:
        - name: Read Keycloak StatefulSet rollout revisions
          ansible.builtin.command:
            cmd: >-
              k3s kubectl get statefulset/{{ keycloak_cr_name }}
              --namespace {{ keycloak_namespace }}
              -o jsonpath='{.status.currentRevision} {.status.updateRevision}'
          environment:
            KUBECONFIG: "{{ keycloak_kubeconfig_path }}"
          register: _keycloak_statefulset_revisions
          changed_when: false

        - name: Force restart Keycloak StatefulSet when its revision is stale
          ansible.builtin.command:
            cmd: >-
              k3s kubectl rollout restart statefulset/{{ keycloak_cr_name }}
              --namespace {{ keycloak_namespace }}
          environment:
            KUBECONFIG: "{{ keycloak_kubeconfig_path }}"
          register: _keycloak_force_restart
          changed_when: >-
            'restarted' in (_keycloak_force_restart.stdout | default(''))
          when: >-
            (_keycloak_statefulset_revisions.stdout | default('') | trim | length) > 0 and
            (_keycloak_statefulset_revisions.stdout.split() | length) == 2 and
            (_keycloak_statefulset_revisions.stdout.split()[0] != _keycloak_statefulset_revisions.stdout.split()[1])

        - name: Wait for Keycloak StatefulSet rollout after forced restart
          ansible.builtin.command:
            cmd: >-
              k3s kubectl rollout status statefulset/{{ keycloak_cr_name }}
              --namespace {{ keycloak_namespace }}
              --timeout={{ keycloak_statefulset_rollout_timeout_seconds }}s
          environment:
            KUBECONFIG: "{{ keycloak_kubeconfig_path }}"
          register: _keycloak_cr_rollout_recovery
          changed_when: false
          when: _keycloak_force_restart is defined and (_keycloak_force_restart is changed)

        - name: Wait for Keycloak custom resource to become Ready (recovery)
          ansible.builtin.command:
            cmd: >-
              k3s kubectl wait --for=condition=Ready
              keycloak/{{ keycloak_cr_name }}
              --namespace {{ keycloak_namespace }}
              --timeout={{ keycloak_ready_timeout_seconds }}s
          environment:
            KUBECONFIG: "{{ keycloak_kubeconfig_path }}"
          register: _keycloak_cr_ready
          changed_when: false
      when: not ansible_check_mode

    # ── Realm import ────────────────────────────────────────────────────────────
    - name: Apply Keycloak realm import
      ansible.builtin.command:
        cmd: k3s kubectl apply -f -
        stdin: "{{ lookup('template', 'realmimport.yaml.j2') }}"
      environment:
        KUBECONFIG: "{{ keycloak_kubeconfig_path }}"
      register: _keycloak_realm_apply
      changed_when: >-
        'configured' in (_keycloak_realm_apply.stdout | default('')) or
        'created' in (_keycloak_realm_apply.stdout | default(''))
      no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"
      when: not ansible_check_mode

    - name: Wait for Keycloak realm import to complete
      ansible.builtin.command:
        cmd: >-
          k3s kubectl wait --for=condition=Done
          keycloakrealmimport/{{ keycloak_realm }}-realm
          --namespace {{ keycloak_namespace }}
          --timeout={{ keycloak_ready_timeout_seconds }}s
      environment:
        KUBECONFIG: "{{ keycloak_kubeconfig_path }}"
      register: _keycloak_realm_done
      changed_when: false
      when: not ansible_check_mode

    - name: Ensure configured Keycloak realm groups exist via admin REST
      ansible.builtin.include_tasks: realm_groups.yml
      when: not ansible_check_mode

    - name: Reconcile configured Keycloak realm users via admin REST
      ansible.builtin.include_tasks: realm_users.yml
      when: not ansible_check_mode

    # ── Ingress (edge TLS at nginx) ─────────────────────────────────────────────
    - name: Apply Keycloak Ingress
      ansible.builtin.command:
        cmd: k3s kubectl apply -f -
        stdin: "{{ lookup('template', 'ingress.yaml.j2') }}"
      environment:
        KUBECONFIG: "{{ keycloak_kubeconfig_path }}"
      register: _keycloak_ingress_apply
      changed_when: >-
        'configured' in (_keycloak_ingress_apply.stdout | default('')) or
        'created' in (_keycloak_ingress_apply.stdout | default(''))
      when:
        - not ansible_check_mode
        - keycloak_ingress_enabled | bool

    - name: Wait for Keycloak StatefulSet rollout before rotator provisioning
      ansible.builtin.command:
        cmd: >-
          k3s kubectl rollout status statefulset/{{ keycloak_cr_name }}
          --namespace {{ keycloak_namespace }}
          --timeout={{ keycloak_statefulset_rollout_timeout_seconds }}s
      environment:
        KUBECONFIG: "{{ keycloak_kubeconfig_path }}"
      register: _keycloak_statefulset_rollout
      changed_when: false
      when: not ansible_check_mode

    # ── realm-admin password auto-rotation ──────────────────────────────────────
    - name: Provision realm-admin password rotation CronJob
      ansible.builtin.include_tasks: rotator.yml
      when:
        - not ansible_check_mode
        - keycloak_realm_admin_rotation_enabled | bool
  when: not ansible_check_mode
