---
# Build the armory_dashboard child image locally and import it into k3s
# containerd. No registry: buildah builds -> OCI archive -> `k3s ctr images import`.
# The base (ghcr.io/mcindi/delve) is still pulled from GHCR during the build.

- name: Check whether the delve-armory image is already imported
  ansible.builtin.command:
    cmd: "k3s ctr -n {{ delve_containerd_namespace }} images ls -q"
  environment:
    KUBECONFIG: "{{ delve_kubeconfig_path }}"
  register: _delve_ctr_images
  changed_when: false
  become: true

- name: Build and import the delve-armory image
  when: >-
    delve_image_rebuild | bool
    or (delve_image_repository + ':' + delve_image_tag) not in _delve_ctr_images.stdout
  become: true
  block:
    - name: Build the child image with buildah
      ansible.builtin.command:
        cmd: >-
          buildah bud
          --build-arg DELVE_BASE_TAG={{ delve_base_image_tag }}
          -t {{ delve_image_repository }}:{{ delve_image_tag }}
          {{ delve_image_build_context }}
      register: _delve_buildah
      changed_when: true

    - name: Export the image to an OCI archive
      ansible.builtin.command:
        cmd: >-
          buildah push {{ delve_image_repository }}:{{ delve_image_tag }}
          oci-archive:{{ delve_image_archive_path }}:{{ delve_image_repository }}:{{ delve_image_tag }}
      changed_when: true

    - name: Import the archive into k3s containerd (k8s.io namespace)
      ansible.builtin.command:
        cmd: "k3s ctr -n {{ delve_containerd_namespace }} images import {{ delve_image_archive_path }}"
      environment:
        KUBECONFIG: "{{ delve_kubeconfig_path }}"
      changed_when: true
      register: _delve_ctr_import

    - name: Remove the transient OCI archive
      ansible.builtin.file:
        path: "{{ delve_image_archive_path }}"
        state: absent

    # Same-tag rebuild: Helm sees no spec change, so force pods onto the new image.
    - name: Restart web/worker to pick up the rebuilt image
      ansible.builtin.command:
        cmd: "k3s kubectl -n {{ delve_namespace }} rollout restart deployment/{{ delve_release_name }}-{{ item }}"
      environment:
        KUBECONFIG: "{{ delve_kubeconfig_path }}"
      loop: [web, worker]
      changed_when: true
      when: delve_image_rebuild | bool