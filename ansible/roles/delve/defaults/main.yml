---
# Delve audit-search platform — Phase 1 (local auth, Postgres, GHCR image).
#
# Cross-role identifiers (namespace, VSO service account, OpenBao policy/role
# names, KV paths, the delve_enabled toggle) live in
# inventories/development/group_vars/all.yml — role defaults are invisible to the
# openbao role that writes the matching ACL policy and k8s auth role. Only
# role-local settings live here.

delve_kubeconfig_path: "{{ k3s_kubeconfig_path | default('/etc/rancher/k3s/k3s.yaml') }}"
delve_work_dir: /opt/delve

# Helm release (vendored chart under charts/delve, mirroring vso-hardened).
delve_release_name: delve
delve_chart_path: "{{ (lookup('ansible.builtin.env', 'ARMORY_PROJECT_ROOT') | default('/vagrant/project-armory', true)) }}/charts/delve"
delve_helm_timeout_seconds: 300

# Image. Track :latest in dev per decisions/0005; pinned to a digest at the
# end-of-project pinning step. Pulled from GHCR (public package — no pull
# secret). delve_image_pull_secrets is left as a values-driven hook in case the
# package is later made private.
delve_image_repository: ghcr.io/mcindi/delve
delve_image_tag: "{{ lookup('ansible.builtin.env', 'ARMORY_DELVE_IMAGE_TAG') | default('latest', true) }}"
delve_image_pull_policy: Always
delve_image_pull_secrets: []
# Optional override for DJANGO_SETTINGS_MODULE in chart env. Leave empty for
# upstream Delve defaults; set armory_dashboard.settings for delve-armory images.
delve_django_settings_module: "{{ lookup('ansible.builtin.env', 'ARMORY_DELVE_DJANGO_SETTINGS_MODULE') | default('', true) }}"

# Public route. Edge TLS terminates at the Envoy gateway (consolidated
# armory-tls cert); this role owns only Delve's HTTPRoute + BackendTLSPolicy
# (rendered by the vendored chart).
delve_ingress_host: "{{ lookup('ansible.builtin.env', 'ARMORY_DELVE_HOST') | default('delve.' + (lookup('ansible.builtin.env', 'ARMORY_PUBLIC_DOMAIN') | default('armory.local', true)), true) }}"
delve_ingress_path: /
delve_ingress_ip: "{{ edge_gateway_ip_resolved | default(edge_gateway_ip | default('127.0.0.1')) }}"
delve_route_gateway_name: "{{ edge_gateway_name | default('armory') }}"
delve_route_gateway_namespace: "{{ edge_gateway_namespace | default('envoy-gateway-system') }}"
# ConfigMap mirroring the serving cert's issuing chain (pki-int) for
# BackendTLSPolicy validation; built from delve-internal-tls ca.crt.
delve_backend_ca_configmap: delve-backend-ca
delve_cert_duration: "8760h"
delve_cert_renew_before: "720h"

# PostgreSQL (role-owned StatefulSet — NOT in the Helm chart). Provisioned and
# waited on before the Helm release so the chart's pre-install migrate hook and
# the web/worker pods find a Ready DB and a synced credential secret.
delve_db_name: delve
delve_db_username: delve
delve_pg_service: delve-postgres
delve_pg_image: postgres:17
delve_pg_storage_size: 8Gi
delve_pg_storage_class: ""
delve_pg_rollout_timeout_seconds: 300
delve_db_secret_name: delve-db-secret

# Django app settings consumed by web/worker/migrate (from the VSO-synced
# delve-db-secret + literals).
delve_database_engine: postgresql
delve_database_port: 5432
delve_log_stdout: true

# OpenBao API + KV coordinates (read provisioner token, write secret/delve/db).
delve_openbao_api_addr: "{{ openbao_api_addr | default('https://openbao.openbao.svc.cluster.local:8200') }}"
delve_openbao_kv_mount: "{{ openbao_kv_mount | default('secret') }}"

# VSO sync coordinates for the delve namespace (mirrors the headlamp role).
delve_openbao_cluster_addr: "{{ openbao_cluster_addr | default('https://openbao.openbao.svc.cluster.local:8200') }}"
delve_openbao_tls_server_name: "{{ openbao_tls_server_name | default('openbao.openbao.svc.cluster.local') }}"
delve_openbao_ca_secret_name: >-
  {{
    (trust_manager_internal_ca_target_secret_name | default(openbao_tls_ca_secret_name | default('openbao-ca')))
    if (use_declarative_ca_distribution | default(false) | bool)
    else (openbao_tls_ca_secret_name | default('openbao-ca'))
  }}
delve_openbao_namespace: "{{ openbao_namespace | default('openbao') }}"
delve_vault_connection_name: default
delve_vault_auth_name: delve-vaultauth
# ServiceAccount the web/worker/migrate pods run under. Created role-side (a
# stable object, no per-run churn) so the chart's pre-install migrate hook can
# reference it; the chart is told not to create it (serviceAccount.create=false).
# Phase 2's k8s-audit drop rule covers system:serviceaccount:delve:* (both this
# SA and delve-vso).
delve_pod_sa_name: delve

# --- Phase 3: human SSO (Keycloak OIDC) + internal TLS re-encrypt ------------
# Mirrors the headlamp role's oidc_client.yml / pki.yml. The KV path for the
# OIDC credential (delve_openbao_oidc_path) and the VSO policy/role live in
# group_vars/all.yml so the openbao role can grant read on them.

# Keycloak admin API coordinates (used to create/update the delve client).
delve_keycloak_enabled: true
delve_keycloak_realm: armory
delve_keycloak_namespace: keycloak
delve_keycloak_service_name: keycloak-service
delve_keycloak_service_https_port: 8443
delve_keycloak_internal_fqdn: "{{ delve_keycloak_service_name }}.{{ delve_keycloak_namespace }}.svc.cluster.local"
delve_keycloak_internal_api_url: "https://{{ delve_keycloak_internal_fqdn }}:{{ delve_keycloak_service_https_port }}"
delve_keycloak_admin_secret_name: keycloak-bootstrap-admin
delve_keycloak_admin_password_key: password
delve_keycloak_admin_username_from_secret: true
delve_keycloak_admin_username: admin

# OIDC relying-party (confidential, standard flow) for browser SSO.
delve_oidc_client_id: delve
# If empty, a strong secret is generated once and persisted to OpenBao.
delve_oidc_client_secret: ""
delve_oidc_issuer_url: "{{ (keycloak_public_base_url | default(lookup('ansible.builtin.env', 'ARMORY_PUBLIC_BASE_URL') | default('https://armory.local', true))) + '/realms/' + delve_keycloak_realm }}"
delve_oidc_scopes: "openid profile email"
delve_oidc_ca_pem_url: "{{ delve_openbao_api_addr }}/v1/{{ openbao_pki_external_mount | default('pki-ext') }}/ca/pem"
delve_oidc_secret_name: delve-oidc
# mozilla-django-oidc callback registered with Keycloak.
delve_oidc_redirect_path: /oidc/callback/

# Pod-level OIDC issuer hostname resolution (hostAlias). The web pod must reach
# the public issuer host in-cluster; it resolves to the Envoy gateway Service,
# looked up by owning-gateway labels (common/tasks/lookup_gateway_service.yml).
delve_oidc_resolver_host: "{{ delve_oidc_issuer_url | urlsplit('hostname') }}"

# Internal TLS (cert-manager + OpenBao internal ClusterIssuer) for ingress
# re-encrypt. The web pod serves HTTPS (cherrypy DELVE_SSL_*) from this cert and
# the ingress backend-protocol becomes HTTPS.
delve_oidc_enabled: "{{ delve_keycloak_enabled | bool }}"
delve_internal_tls_secret_name: delve-internal-tls
delve_internal_tls_issuer_name: openbao-pki-internal
delve_internal_fqdn: "{{ delve_release_name }}-web.{{ delve_namespace }}.svc.cluster.local"
delve_internal_tls_mount_path: /etc/delve-tls
delve_oidc_ca_mount_path: /etc/delve-oidc
delve_oidc_ca_file_name: oidc-ca.pem

# --- Phase 2: machine ingestion (delve-ingest client) + audit feed shippers --
# Independent of Phase 3's human SSO: the shippers authenticate with this
# client's client-credentials token, never the browser OIDC path. The KV path
# (delve_openbao_ingest_path) lives in group_vars/all.yml so the openbao role can
# grant VSO read on it.
delve_ingest_enabled: "{{ delve_keycloak_enabled | bool }}"
# Service-accounts (client-credentials) client the shippers authenticate as.
delve_ingest_client_id: delve-ingest
# If empty, a strong secret is generated once and persisted to OpenBao.
delve_ingest_client_secret: ""
# Same public issuer as human SSO (shared realm, different client). The shippers
# and Delve's bearer-JWT auth both reach the issuer via the external cert chain.
delve_ingest_issuer_url: "{{ delve_oidc_issuer_url }}"
delve_ingest_ca_pem_url: "{{ delve_oidc_ca_pem_url }}"
delve_ingest_secret_name: delve-ingest
# Where the web pod mounts the issuer CA (from the ingest secret's OIDC_CA_PEM)
# so server-side JWKS fetches trust the issuer.
delve_ingest_ca_mount_path: /etc/delve-ingest
delve_ingest_ca_file_name: ingest-ca.pem

# --- Phase 2: audit feed shippers --------------------------------------------
# Reuse the Delve image (it already bundles utilities/cli/tail-files.py +
# keycloak-events.py, requests and psycopg2) rather than building a separate
# shipper image. All three shippers run in ns delve under the delve SA (covered
# by the k8s-audit SA drop rule, so they never audit their own reads). Gated with
# the rest of Phase 2 on delve_ingest_enabled.
delve_shipper_image_repository: "{{ delve_image_repository }}"
delve_shipper_image_tag: "{{ delve_image_tag }}"
delve_shipper_image_pull_policy: "{{ delve_image_pull_policy }}"
# Shippers POST to Delve and fetch tokens through the public edge (gateway
# cert), so a single CA (the delve-ingest OIDC_CA_PEM) verifies both. The pods
# carry hostAliases mapping both hosts to the gateway IP (resolved at deploy).
delve_shipper_server_url: "https://{{ delve_ingress_host }}"
delve_shipper_token_url: "{{ delve_ingest_issuer_url }}/protocol/openid-connect/token"
delve_shipper_issuer_host: "{{ delve_ingest_issuer_url | urlsplit('hostname') }}"
delve_shipper_ca_mount_path: /etc/delve-ingest
delve_shipper_ca_file_name: ingest-ca.pem
delve_shipper_resources_requests_cpu: 20m
delve_shipper_resources_requests_memory: 64Mi
delve_shipper_resources_limits_cpu: 150m
delve_shipper_resources_limits_memory: 256Mi

# OpenBao audit feed (file tail). The audit log lives on the openbao
# auditStorage PVC (RWO, ns openbao); on single-node k3s the local-path-backed
# host directory is hostPath-mounted read-only into the shipper (the host path
# is resolved from the PV at deploy time) so the shipper stays in ns delve.
delve_shipper_openbao_pvc_name: "audit-{{ openbao_release_name | default('openbao') }}-0"
delve_shipper_openbao_pvc_namespace: "{{ openbao_namespace | default('openbao') }}"
delve_shipper_openbao_audit_filename: "{{ openbao_audit_log_path | default('/openbao/audit/audit.log') | basename }}"
delve_shipper_openbao_index: openbao
delve_shipper_openbao_sourcetype: openbao_audit

# k8s API-server audit feed (file tail of the host audit log, read-only).
delve_shipper_k8s_audit_host_dir: "{{ k3s_audit_log_path | default('/var/log/k3s/audit/audit.log') | dirname }}"
delve_shipper_k8s_audit_filename: "{{ k3s_audit_log_path | default('/var/log/k3s/audit/audit.log') | basename }}"
delve_shipper_k8s_index: k8s
delve_shipper_k8s_sourcetype: k8s_audit

# Keycloak event feed (scheduled DB query with a persisted cursor).
delve_shipper_keycloak_index: keycloak
delve_shipper_keycloak_sourcetype: keycloak_event
delve_shipper_keycloak_interval: 30
delve_shipper_keycloak_cursor_pvc: delve-keycloak-cursor
delve_shipper_keycloak_cursor_size: 64Mi
delve_shipper_keycloak_cursor_dir: /var/lib/delve-keycloak
# Read-only DB role scoped to event_entity / admin_event_entity (provisioned by
# shippers.yml against the keycloak Postgres). sslmode=require encrypts without
# pinning the server cert — sufficient for the in-cluster demo.
delve_keycloak_db_host: "{{ keycloak_pg_service | default('postgres') }}.{{ keycloak_namespace | default('keycloak') }}.svc.cluster.local"
delve_keycloak_db_port: 5432
delve_keycloak_db_name: "{{ keycloak_db_name | default('keycloak') }}"
delve_keycloak_db_sslmode: require
delve_keycloak_admin_db_secret_name: "{{ keycloak_db_secret_name | default('keycloak-db-secret') }}"
delve_keycloak_admin_db_username: "{{ keycloak_db_username | default('keycloak') }}"
delve_keycloak_pg_statefulset_pod: "{{ keycloak_pg_service | default('postgres') }}-0"
delve_keycloak_reader_secret_name: delve-keycloak-reader
delve_keycloak_reader_username: delve_keycloak_reader

# Optional chart value overrides merged on top of role-managed values.
delve_chart_values_overrides: {}

# When true, disables Ansible no_log redaction for sensitive tasks.
# WARNING: Enabling this will print secrets/tokens into logs and output.
armory_log_nolog: "{{ lookup('ansible.builtin.env', 'ARMORY_LOG_NOLOG') | default('false', true) | bool }}"
