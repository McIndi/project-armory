---
- name: Install systemd unit for transparent hugepage mode
  ansible.builtin.template:
    src: armory-thp-tuning.service.j2
    dest: /etc/systemd/system/armory-thp-tuning.service
    owner: root
    group: root
    mode: "0644"
  become: true
  when: not ansible_check_mode

- name: Enable and start transparent hugepage tuning service
  ansible.builtin.systemd_service:
    name: armory-thp-tuning.service
    daemon_reload: true
    enabled: true
    state: started
  become: true
  when: not ansible_check_mode
