---
- name: Apply kernel sysctl drop-in settings
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    reload: true
    sysctl_file: /etc/sysctl.d/99-armory-tuning.conf
  loop:
    - name: vm.swappiness
      value: "{{ kernel_tuning_swappiness }}"
    - name: vm.dirty_bytes
      value: "{{ kernel_tuning_dirty_bytes }}"
    - name: vm.dirty_background_bytes
      value: "{{ kernel_tuning_dirty_background_bytes }}"
    - name: fs.inotify.max_user_watches
      value: "{{ kernel_tuning_inotify_max_user_watches }}"
    - name: fs.inotify.max_user_instances
      value: "{{ kernel_tuning_inotify_max_user_instances }}"
  when: not ansible_check_mode
