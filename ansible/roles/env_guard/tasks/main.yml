---
- name: Resolve ARMORY_LOG_NOLOG flag
  ansible.builtin.set_fact:
    armory_log_nolog: "{{ (lookup('ansible.builtin.env', 'ARMORY_LOG_NOLOG') | default('false', true)) | bool }}"
  changed_when: false

- name: Validate required environment guard values with diagnostics
  block:
    - name: Read sentry environment variable
      ansible.builtin.set_fact:
        env_guard_sentry_value: "{{ lookup('ansible.builtin.env', env_guard_sentry_var_name) }}"
      changed_when: false

    - name: Ensure sentry environment variable is set
      ansible.builtin.assert:
        that:
          - env_guard_sentry_value | length > 0
        fail_msg: >-
          Missing required environment variable '{{ env_guard_sentry_var_name }}'.
          Source the repo .env before running Ansible:
          cd "${ARMORY_PROJECT_ROOT:-<repo-root>}"; set -a; source .env; set +a
        success_msg: "Environment sentry variable '{{ env_guard_sentry_var_name }}' is set."

    - name: Ensure sentry environment variable has expected value
      ansible.builtin.assert:
        that:
          - env_guard_sentry_value == env_guard_expected_value
        fail_msg: >-
          Environment variable '{{ env_guard_sentry_var_name }}' has value
          '{{ env_guard_sentry_value }}' but expected '{{ env_guard_expected_value }}'.
          Re-copy .env from .env.example and source it again.
        success_msg: "Environment sentry value is valid."
