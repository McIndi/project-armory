---
- name: Provision cert-manager issuer resources with diagnostics
  block:
    - name: Ensure OpenBao CA secret exists in cert-manager namespace
      ansible.builtin.import_role:
        name: common
        tasks_from: copy_openbao_ca_secret.yml
      vars:
        common_kubeconfig_path: /etc/rancher/k3s/k3s.yaml
        common_ca_secret_name: "{{ nginx_openbao_ca_secret_name }}"
        common_ca_source_namespace: "{{ openbao_namespace | default('openbao') }}"
        common_ca_target_namespace: "{{ certmanager_namespace }}"
      when: not (use_declarative_ca_distribution | default(false) | bool)

    - name: Apply cert-manager ClusterIssuer for OpenBao PKI
      ansible.builtin.command:
        cmd: k3s kubectl apply -f -
        stdin: "{{ lookup('template', 'cluster-issuer.yaml.j2') }}"
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: _cluster_issuer_result
      changed_when: "'configured' in _cluster_issuer_result.stdout or 'created' in _cluster_issuer_result.stdout"
      when: not ansible_check_mode

    - name: Wait for OpenBao PKI ClusterIssuer readiness
      ansible.builtin.command:
        cmd: >-
          k3s kubectl wait clusterissuer {{ item.name }}
          --for=condition=Ready
          --timeout=180s
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      loop: "{{ certmanager_openbao_cluster_issuers }}"
      loop_control:
        label: "{{ item.name }}"
      register: _cluster_issuer_wait
      changed_when: false
      when: not ansible_check_mode
