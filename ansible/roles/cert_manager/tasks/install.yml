---
- name: Install cert-manager dependencies with diagnostics
  block:
    - name: Ensure cert-manager working directory exists
      ansible.builtin.file:
        path: "{{ certmanager_tofu_work_dir }}"
        state: directory
        mode: "0755"
      register: _certmanager_tofu_workdir_result

    - name: Render cert-manager Helm values file
      ansible.builtin.copy:
        dest: "{{ certmanager_tofu_work_dir }}/cert-manager-values.yaml"
        mode: "0600"
        content: "{{ certmanager_tofu_chart_values | to_nice_yaml(indent=2) }}"
      register: _certmanager_values_result

    - name: Deploy cert-manager via Helm
      kubernetes.core.helm:
        release_name: "{{ certmanager_release_name }}"
        chart_ref: "{{ certmanager_chart_name }}"
        chart_repo_url: "{{ certmanager_chart_repo }}"
        release_namespace: "{{ certmanager_namespace }}"
        create_namespace: true
        values_files:
          - "{{ certmanager_tofu_work_dir }}/cert-manager-values.yaml"
        chart_version: "{{ certmanager_chart_version if (certmanager_chart_version | length > 0) else omit }}"
        wait: true
        wait_timeout: "{{ (certmanager_tofu_timeout_seconds | int) }}s"
        kubeconfig: /etc/rancher/k3s/k3s.yaml
      register: _certmanager_helm_apply_result
      when: not ansible_check_mode

    - name: Wait for cert-manager webhook to be ready
      ansible.builtin.command:
        cmd: >-
          k3s kubectl wait deployment cert-manager-webhook
          --for=condition=Available
          --namespace {{ certmanager_namespace }}
          --timeout=120s
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: _certmanager_wait_result
      changed_when: false
      when: not ansible_check_mode
