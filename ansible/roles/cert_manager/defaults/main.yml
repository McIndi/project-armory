---
# Working directory for rendered Helm values files.
certmanager_tofu_work_dir: "{{ nginx_tofu_work_dir | default('/opt/nginx-ingress-tofu') }}"

# Namespace for cert-manager installation.
certmanager_namespace: cert-manager

# Helm release name for cert-manager.
certmanager_release_name: cert-manager

# Helm repository URL for cert-manager chart.
certmanager_chart_repo: https://charts.jetstack.io

# Chart name in the cert-manager repository.
certmanager_chart_name: cert-manager

# cert-manager chart version.
# Empty string lets Helm choose the latest available version.
certmanager_chart_version: ""

# Helm wait timeout (seconds) for cert-manager release apply.
certmanager_tofu_timeout_seconds: 600

# Helm values passed to cert-manager release.
certmanager_tofu_chart_values:
  crds:
    enabled: true

# OpenBao in-cluster API address used by cert-manager issuer integration.
# Must match openbao_cluster_addr in openbao defaults.
certmanager_openbao_cluster_addr: "{{ openbao_cluster_addr | default('https://openbao.openbao.svc.cluster.local:8200') }}"
certmanager_openbao_tls_server_name: "{{ openbao_tls_server_name | default('openbao.openbao.svc.cluster.local') }}"
certmanager_openbao_ca_secret_name: "{{ openbao_tls_ca_secret_name | default('openbao-ca') }}"

# Kubernetes auth role in OpenBao bound to cert-manager service account.
# Must align with configuration created by the openbao role.
certmanager_openbao_k8s_role: "{{ openbao_certmanager_k8s_role | default('cert-manager') }}"

# Issuer names exposed to consumer roles.
certmanager_openbao_internal_clusterissuer_name: openbao-pki-internal
certmanager_openbao_external_clusterissuer_name: openbao-pki-external

# OpenBao signing path configuration for each cert-manager ClusterIssuer.
certmanager_openbao_cluster_issuers:
  - name: "{{ certmanager_openbao_internal_clusterissuer_name }}"
    mount: "{{ openbao_pki_internal_mount | default('pki-int') }}"
    role: "{{ openbao_pki_internal_cert_role | default('armory-internal') }}"
  - name: "{{ certmanager_openbao_external_clusterissuer_name }}"
    mount: "{{ openbao_pki_external_mount | default('pki-ext') }}"
    role: "{{ openbao_pki_external_cert_role | default((lookup('ansible.builtin.env', 'ARMORY_PUBLIC_DOMAIN') | default('armory.local', true)) | replace('.', '-dot-')) }}"

# Backward-compatible aliases retained for legacy references.
nginx_openbao_cluster_addr: "{{ certmanager_openbao_cluster_addr }}"
nginx_openbao_tls_server_name: "{{ certmanager_openbao_tls_server_name }}"
nginx_openbao_ca_secret_name: "{{ certmanager_openbao_ca_secret_name }}"
nginx_openbao_pki_mount: "{{ openbao_pki_external_mount | default('pki-ext') }}"
nginx_openbao_pki_cert_role: "{{ openbao_pki_external_cert_role | default((lookup('ansible.builtin.env', 'ARMORY_PUBLIC_DOMAIN') | default('armory.local', true)) | replace('.', '-dot-')) }}"
nginx_openbao_certmanager_k8s_role: "{{ certmanager_openbao_k8s_role }}"

# When true, disables Ansible no_log redaction for sensitive tasks.
# WARNING: Enabling this will print secrets/tokens into logs and output.
armory_log_nolog: "{{ lookup('ansible.builtin.env', 'ARMORY_LOG_NOLOG') | default('false', true) | bool }}"
