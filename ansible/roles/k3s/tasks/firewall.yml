---
# python3-firewall is required by the ansible.posix.firewalld module.
- name: Configure k3s firewall with diagnostics
  block:
    - name: Ensure firewalld and Python bindings are installed
      ansible.builtin.dnf:
        name:
          - firewalld
          - python3-firewall
        state: present
      register: _k3s_firewalld_packages_result

    - name: Debug firewalld package install task
      ansible.builtin.debug:
        msg:
          - "Task: Ensure firewalld and Python bindings are installed"
          - "Task changed: {{ _k3s_firewalld_packages_result.changed | default(false) }}"
          - "Task failed: {{ _k3s_firewalld_packages_result.failed | default(false) }}"
      when: armory_build_debug | default(false) | bool

    - name: Ensure firewalld is enabled and running
      ansible.builtin.systemd:
        name: firewalld
        state: started
        enabled: true
      register: _k3s_firewalld_service_result

    - name: Debug firewalld service task
      ansible.builtin.debug:
        msg:
          - "Task: Ensure firewalld is enabled and running"
          - "Task changed: {{ _k3s_firewalld_service_result.changed | default(false) }}"
          - "Task failed: {{ _k3s_firewalld_service_result.failed | default(false) }}"
      when: armory_build_debug | default(false) | bool

    - name: Open k3s API server port ({{ k3s_api_port }}/tcp)
      ansible.posix.firewalld:
        port: "{{ k3s_api_port }}/tcp"
        zone: "{{ k3s_firewall_zone }}"
        permanent: true
        immediate: true
        state: enabled
      register: _k3s_firewall_api_port_result

    - name: Debug API port firewall task
      ansible.builtin.debug:
        msg:
          - "Task: Open k3s API server port"
          - "Port/zone: {{ k3s_api_port }}/tcp in {{ k3s_firewall_zone }}"
          - "Task changed: {{ _k3s_firewall_api_port_result.changed | default(false) }}"
      when: armory_build_debug | default(false) | bool

    - name: Open kubelet port ({{ k3s_kubelet_port }}/tcp)
      ansible.posix.firewalld:
        port: "{{ k3s_kubelet_port }}/tcp"
        zone: "{{ k3s_firewall_zone }}"
        permanent: true
        immediate: true
        state: enabled
      register: _k3s_firewall_kubelet_port_result

    - name: Debug kubelet port firewall task
      ansible.builtin.debug:
        msg:
          - "Task: Open kubelet port"
          - "Port/zone: {{ k3s_kubelet_port }}/tcp in {{ k3s_firewall_zone }}"
          - "Task changed: {{ _k3s_firewall_kubelet_port_result.changed | default(false) }}"
      when: armory_build_debug | default(false) | bool

    - name: Open Flannel VXLAN port ({{ k3s_flannel_port }}/udp)
      ansible.posix.firewalld:
        port: "{{ k3s_flannel_port }}/udp"
        zone: "{{ k3s_firewall_zone }}"
        permanent: true
        immediate: true
        state: enabled
      register: _k3s_firewall_flannel_port_result

    - name: Debug Flannel port firewall task
      ansible.builtin.debug:
        msg:
          - "Task: Open Flannel VXLAN port"
          - "Port/zone: {{ k3s_flannel_port }}/udp in {{ k3s_firewall_zone }}"
          - "Task changed: {{ _k3s_firewall_flannel_port_result.changed | default(false) }}"
      when: armory_build_debug | default(false) | bool

    - name: Allow k3s pod network CIDR in firewalld
      ansible.posix.firewalld:
        source: "{{ k3s_pod_cidr }}"
        zone: "{{ k3s_firewall_cluster_cidrs_zone }}"
        permanent: true
        immediate: true
        state: enabled
      register: _k3s_firewall_pod_cidr_result
      when: k3s_firewall_allow_cluster_cidrs | default(true) | bool

    - name: Debug k3s pod CIDR firewall task
      ansible.builtin.debug:
        msg:
          - "Task: Allow k3s pod network CIDR in firewalld"
          - "CIDR/zone: {{ k3s_pod_cidr }} in {{ k3s_firewall_cluster_cidrs_zone }}"
          - "Task changed: {{ _k3s_firewall_pod_cidr_result.changed | default(false) }}"
      when:
        - armory_build_debug | default(false) | bool
        - k3s_firewall_allow_cluster_cidrs | default(true) | bool

    - name: Allow k3s service CIDR in firewalld
      ansible.posix.firewalld:
        source: "{{ k3s_service_cidr }}"
        zone: "{{ k3s_firewall_cluster_cidrs_zone }}"
        permanent: true
        immediate: true
        state: enabled
      register: _k3s_firewall_service_cidr_result
      when: k3s_firewall_allow_cluster_cidrs | default(true) | bool

    - name: Debug k3s service CIDR firewall task
      ansible.builtin.debug:
        msg:
          - "Task: Allow k3s service CIDR in firewalld"
          - "CIDR/zone: {{ k3s_service_cidr }} in {{ k3s_firewall_cluster_cidrs_zone }}"
          - "Task changed: {{ _k3s_firewall_service_cidr_result.changed | default(false) }}"
      when:
        - armory_build_debug | default(false) | bool
        - k3s_firewall_allow_cluster_cidrs | default(true) | bool

  rescue:
    - name: Debug k3s firewall failure context
      ansible.builtin.debug:
        msg:
          - "Role: k3s (firewall.yml)"
          - "Failure task: {{ ansible_failed_task.name | default('unknown') }}"
          - "Failure message: {{ ansible_failed_result.msg | default('n/a') }}"
          - "Failure rc: {{ ansible_failed_result.rc | default('n/a') }}"
          - "Failure cmd: {{ ansible_failed_result.cmd | default('n/a') }}"
          - "Failure stderr: {{ ansible_failed_result.stderr | default('n/a') }}"
          - "Failure stdout: {{ ansible_failed_result.stdout | default('n/a') }}"
          - "Failure exception: {{ ansible_failed_result.exception | default('n/a') }}"
      when: armory_build_debug | default(false) | bool

    - name: Fail k3s firewall flow with context
      ansible.builtin.fail:
        msg: >-
          k3s firewall flow failed at '{{ ansible_failed_task.name | default('unknown') }}'.
          Set ARMORY_BUILD_DEBUG=true for companion diagnostics.
