---
- name: List current namespaces after Helm release teardown
  ansible.builtin.command:
    argv:
      - k3s
      - kubectl
      - get
      - namespaces
      - -o
      - jsonpath={range .items[*]}{.metadata.name}{"\n"}{end}
  environment:
    KUBECONFIG: "{{ teardown_kubeconfig_path }}"
  register: _teardown_namespaces_after
  changed_when: false
  failed_when: false

- name: Build remaining application namespace list
  ansible.builtin.set_fact:
    teardown_remaining_namespaces: >-
      {{
        (_teardown_namespaces_after.stdout_lines | default([]))
        | map('trim')
        | reject('equalto', '')
        | difference(teardown_keep_namespaces | default([]))
        | sort
      }}
