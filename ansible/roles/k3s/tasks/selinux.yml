---
# python3-libselinux is required by the ansible.posix.selinux module.
- name: Configure SELinux prerequisites with diagnostics
  block:
    - name: Ensure SELinux Python bindings are installed
      ansible.builtin.dnf:
        name:
          - python3-libselinux
          - container-selinux
        state: present
      register: _k3s_selinux_packages_result

    - name: Ensure SELinux is enforcing
      ansible.posix.selinux:
        policy: targeted
        state: enforcing
      register: _k3s_selinux_state_result
