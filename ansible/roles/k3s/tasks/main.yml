---
- name: Resolve ARMORY_BUILD_DEBUG flag
  ansible.builtin.set_fact:
    armory_build_debug: "{{ (lookup('ansible.builtin.env', 'ARMORY_BUILD_DEBUG') | default('false', true)) | bool }}"
    armory_log_nolog: "{{ (lookup('ansible.builtin.env', 'ARMORY_LOG_NOLOG') | default('false', true)) | bool }}"
  changed_when: false

- name: Debug logging controls for k3s role
  ansible.builtin.debug:
    msg:
      - "Role: k3s"
      - "ARMORY_BUILD_DEBUG: {{ armory_build_debug | default(false) | bool }}"
      - "ARMORY_LOG_NOLOG: {{ armory_log_nolog | default(false) | bool }}"
      - "Sensitive task redaction enabled: {{ not (armory_log_nolog | default(false) | bool) }}"
  when: armory_build_debug | default(false) | bool

- name: Run k3s orchestration with diagnostics
  block:
    - name: SELinux prerequisites
      ansible.builtin.import_tasks: selinux.yml
      tags:
        - k3s
        - k3s_selinux

    - name: Debug SELinux import task
      ansible.builtin.debug:
        msg:
          - "Task: SELinux prerequisites"
          - "Imported file: roles/k3s/tasks/selinux.yml"
      when: armory_build_debug | default(false) | bool

    - name: Firewall configuration
      ansible.builtin.import_tasks: firewall.yml
      tags:
        - k3s
        - k3s_firewall

    - name: Debug firewall import task
      ansible.builtin.debug:
        msg:
          - "Task: Firewall configuration"
          - "Imported file: roles/k3s/tasks/firewall.yml"
      when: armory_build_debug | default(false) | bool

    - name: k3s installation
      ansible.builtin.import_tasks: install.yml
      tags:
        - k3s
        - k3s_install

    - name: Debug install import task
      ansible.builtin.debug:
        msg:
          - "Task: k3s installation"
          - "Imported file: roles/k3s/tasks/install.yml"
          - "Config directory: {{ k3s_config_dir }}"
          - "Install directory: {{ k3s_install_dir }}"
          - "Disabled components: {{ k3s_disable | join(', ') if (k3s_disable | length > 0) else 'none' }}"
      when: armory_build_debug | default(false) | bool

  rescue:
    - name: Debug k3s orchestration failure context
      ansible.builtin.debug:
        msg:
          - "Role: k3s"
          - "Failure task: {{ ansible_failed_task.name | default('unknown') }}"
          - "Failure message: {{ ansible_failed_result.msg | default('n/a') }}"
          - "Failure rc: {{ ansible_failed_result.rc | default('n/a') }}"
          - "Failure cmd: {{ ansible_failed_result.cmd | default('n/a') }}"
          - "Failure stderr: {{ ansible_failed_result.stderr | default('n/a') }}"
          - "Failure stdout: {{ ansible_failed_result.stdout | default('n/a') }}"
          - "Failure exception: {{ ansible_failed_result.exception | default('n/a') }}"
      when: armory_build_debug | default(false) | bool

    - name: Fail k3s orchestration with context
      ansible.builtin.fail:
        msg: >-
          k3s role orchestration failed at '{{ ansible_failed_task.name | default('unknown') }}'.
          Set ARMORY_BUILD_DEBUG=true for companion diagnostics.
