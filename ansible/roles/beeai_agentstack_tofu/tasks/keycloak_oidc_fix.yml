---
# Fix Keycloak OIDC audience mapper so tokens issued to agentstack-ui contain
# `aud: agentstack-server`, which the API server validates via
# AUTH__OIDC__VALIDATE_AUDIENCE / AUTH__OIDC__CLIENT_ID.
#
# The Helm chart provisions all three audience scopes with
# `included.custom.audience = <public_base_url>` (wrong). This file:
#   1. Updates agentstack-server-audience mapper → `included.custom.audience = agentstack-server`
#   2. Assigns agentstack-server-audience as a default scope on agentstack-ui
#
# All tasks are idempotent: GET first, PUT only when the value differs.

# ── Discover Keycloak ClusterIP ───────────────────────────────────────────────

- name: Get Keycloak service ClusterIP
  ansible.builtin.command:
    cmd: >-
      k3s kubectl get svc {{ beeai_keycloak_service_name }}
      -n {{ beeai_tofu_namespace }}
      -o jsonpath={.spec.clusterIP}
  environment:
    KUBECONFIG: "{{ beeai_tofu_kubeconfig_path }}"
  register: _kc_cluster_ip_result
  changed_when: false

- name: Set Keycloak internal base URL fact
  ansible.builtin.set_fact:
    _kc_base_url: "http://{{ _kc_cluster_ip_result.stdout }}:{{ beeai_keycloak_service_port }}"

- name: Get Keycloak admin password from keycloak-secret
  ansible.builtin.command:
    cmd: >-
      k3s kubectl get secret keycloak-secret
      -n {{ beeai_tofu_namespace }}
      -o jsonpath={.data.admin-password}
  environment:
    KUBECONFIG: "{{ beeai_tofu_kubeconfig_path }}"
  register: _kc_admin_pw_b64
  changed_when: false
  no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"

- name: Decode Keycloak admin password
  ansible.builtin.set_fact:
    _kc_admin_password: "{{ _kc_admin_pw_b64.stdout | b64decode }}"
  no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"

- name: Obtain Keycloak admin token (retry until Keycloak is ready)
  ansible.builtin.uri:
    url: "{{ _kc_base_url }}/realms/master/protocol/openid-connect/token"
    method: POST
    body_format: form-urlencoded
    body:
      client_id: admin-cli
      username: admin
      password: "{{ _kc_admin_password }}"
      grant_type: password
    status_code: 200
  register: _kc_token_result
  retries: 10
  delay: 15
  until: _kc_token_result.status == 200
  changed_when: false
  no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"

- name: Set Keycloak admin token fact
  ansible.builtin.set_fact:
    _kc_admin_token: "{{ _kc_token_result.json.access_token }}"
  no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"

# ── Fix agentstack-server-audience scope mapper ───────────────────────────────

- name: List client scopes in agentstack realm
  ansible.builtin.uri:
    url: "{{ _kc_base_url }}/admin/realms/agentstack/client-scopes"
    method: GET
    headers:
      Authorization: "Bearer {{ _kc_admin_token }}"
    status_code: 200
  register: _kc_scopes_result
  changed_when: false
  no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"

- name: Find agentstack-server-audience scope ID
  ansible.builtin.set_fact:
    _kc_server_scope_id: >-
      {{ (_kc_scopes_result.json
        | selectattr('name', 'equalto', 'agentstack-server-audience')
        | map(attribute='id')
        | list | first) | default('') }}

- name: Fail if agentstack-server-audience scope not found
  ansible.builtin.fail:
    msg: "Keycloak scope 'agentstack-server-audience' not found in agentstack realm — Helm chart may have changed scope names."
  when: _kc_server_scope_id == ''

- name: List protocol mappers for agentstack-server-audience scope
  ansible.builtin.uri:
    url: "{{ _kc_base_url }}/admin/realms/agentstack/client-scopes/{{ _kc_server_scope_id }}/protocol-mappers/models"
    method: GET
    headers:
      Authorization: "Bearer {{ _kc_admin_token }}"
    status_code: 200
  register: _kc_scope_mappers_result
  changed_when: false
  no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"

- name: Find oidc-audience-mapper in agentstack-server-audience scope
  ansible.builtin.set_fact:
    _kc_audience_mapper: >-
      {{ (_kc_scope_mappers_result.json
        | selectattr('protocolMapper', 'equalto', 'oidc-audience-mapper')
        | list | first) | default({}) }}

- name: Fail if no oidc-audience-mapper found in scope
  ansible.builtin.fail:
    msg: "No oidc-audience-mapper found in agentstack-server-audience scope — scope definition may have changed."
  when: (_kc_audience_mapper | length) == 0

- name: Record current audience value from mapper config
  ansible.builtin.set_fact:
    _kc_current_audience: "{{ _kc_audience_mapper.config['included.custom.audience'] | default('') }}"

- name: Update audience mapper to agentstack-server (idempotent)
  ansible.builtin.uri:
    url: "{{ _kc_base_url }}/admin/realms/agentstack/client-scopes/{{ _kc_server_scope_id }}/protocol-mappers/models/{{ _kc_audience_mapper.id }}"
    method: PUT
    headers:
      Authorization: "Bearer {{ _kc_admin_token }}"
      Content-Type: application/json
    body_format: json
    body: >-
      {{ _kc_audience_mapper | combine({
        'config': _kc_audience_mapper.config | combine({
          'included.custom.audience': 'agentstack-server'
        })
      }) }}
    status_code: 204
  when: _kc_current_audience != 'agentstack-server'
  register: _kc_mapper_update_result
  no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"

- name: Look up agentstack-ui client in Keycloak
  ansible.builtin.uri:
    url: "{{ _kc_base_url }}/admin/realms/agentstack/clients?clientId=agentstack-ui"
    method: GET
    headers:
      Authorization: "Bearer {{ _kc_admin_token }}"
    status_code: 200
  register: _kc_ui_client_result
  changed_when: false
  no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"

- name: Extract agentstack-ui client internal ID
  ansible.builtin.set_fact:
    _kc_ui_client_id: "{{ (_kc_ui_client_result.json | list | first).id | default('') }}"

- name: Fail if agentstack-ui client not found
  ansible.builtin.fail:
    msg: "Keycloak client 'agentstack-ui' not found in agentstack realm — Helm chart may have changed client names."
  when: _kc_ui_client_id == ''

- name: List current default scopes for agentstack-ui client
  ansible.builtin.uri:
    url: "{{ _kc_base_url }}/admin/realms/agentstack/clients/{{ _kc_ui_client_id }}/default-client-scopes"
    method: GET
    headers:
      Authorization: "Bearer {{ _kc_admin_token }}"
    status_code: 200
  register: _kc_ui_default_scopes_result
  changed_when: false
  no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"

- name: Check if agentstack-server-audience is already a default scope
  ansible.builtin.set_fact:
    _kc_scope_already_assigned: >-
      {{ (_kc_ui_default_scopes_result.json
        | selectattr('id', 'equalto', _kc_server_scope_id)
        | list | length) > 0 }}

- name: Assign agentstack-server-audience as default scope for agentstack-ui (idempotent)
  ansible.builtin.uri:
    url: "{{ _kc_base_url }}/admin/realms/agentstack/clients/{{ _kc_ui_client_id }}/default-client-scopes/{{ _kc_server_scope_id }}"
    method: PUT
    headers:
      Authorization: "Bearer {{ _kc_admin_token }}"
    status_code: 204
  when: not _kc_scope_already_assigned
  register: _kc_scope_assign_result
  no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"
