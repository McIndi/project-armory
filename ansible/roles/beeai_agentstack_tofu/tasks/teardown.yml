---
- name: Register BeeAI namespaces for teardown checks
  ansible.builtin.set_fact:
    teardown_role_target_namespaces: >-
      {{
        (teardown_role_target_namespaces | default([]))
        + [beeai_tofu_namespace, beeai_vso_namespace]
        | unique
      }}

- name: Uninstall BeeAI Agent Stack helm release
  ansible.builtin.command:
    cmd: >-
      helm uninstall {{ beeai_tofu_release_name }}
      --namespace {{ beeai_tofu_namespace }}
      --ignore-not-found
      --kubeconfig {{ beeai_tofu_kubeconfig_path }}
  register: _beeai_helm_uninstall
  changed_when: (_beeai_helm_uninstall.rc | default(1)) == 0
  failed_when: false

- name: Uninstall Vault Secrets Operator helm release
  ansible.builtin.command:
    cmd: >-
      helm uninstall {{ beeai_vso_release_name }}
      --namespace {{ beeai_vso_namespace }}
      --ignore-not-found
      --kubeconfig {{ beeai_tofu_kubeconfig_path }}
  register: _beeai_vso_helm_uninstall
  changed_when: (_beeai_vso_helm_uninstall.rc | default(1)) == 0
  failed_when: false

- name: Debug BeeAI and VSO Helm uninstall tasks
  ansible.builtin.debug:
    msg:
      - "Role teardown: beeai_agentstack_tofu"
      - "BeeAI helm uninstall rc: {{ _beeai_helm_uninstall.rc | default('skipped') }}"
      - "VSO helm uninstall rc: {{ _beeai_vso_helm_uninstall.rc | default('skipped') }}"
  when: (lookup('ansible.builtin.env', 'ARMORY_BUILD_DEBUG') | default('false', true)) | bool
