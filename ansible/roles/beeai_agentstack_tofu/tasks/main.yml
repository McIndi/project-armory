      when: armory_build_debug | default(false) | bool

  rescue:
    - name: Debug API OIDC patch failure context
      ansible.builtin.debug:
        msg:
          - "Role: beeai_agentstack_tofu (API OIDC patch section)"
          - "Failure task: {{ ansible_failed_task.name | default('unknown') }}"
          - "Failure message: {{ ansible_failed_result.msg | default('n/a') }}"
          - "Failure rc: {{ ansible_failed_result.rc | default('n/a') }}"
          - "Failure cmd: {{ ansible_failed_result.cmd | default('n/a') }}"
          - "Failure stderr: {{ ansible_failed_result.stderr | default('n/a') }}"
          - "Failure stdout: {{ ansible_failed_result.stdout | default('n/a') }}"
      when: armory_build_debug | default(false) | bool

    - name: Fail API OIDC patch flow with context
      ansible.builtin.fail:
        msg: >-
          API OIDC patch section failed at '{{ ansible_failed_task.name | default('unknown') }}'.
          Set ARMORY_BUILD_DEBUG=true for companion diagnostics.

  when: not ansible_check_mode

- name: Second-pass BeeAI Helm release apply after Keycloak hostname fix
  tags: [beeai, beeai_tofu, beeai_install]
  block:
    - name: Check BeeAI Helm release status
      ansible.builtin.command:
        cmd: >-
          k3s kubectl get secret
          --namespace {{ beeai_tofu_namespace }}
          -l owner=helm,name={{ beeai_tofu_release_name }}
          -o jsonpath={.items[-1:].metadata.labels.status}
      environment:
        KUBECONFIG: "{{ beeai_tofu_kubeconfig_path }}"
      register: _beeai_helm_release_status
      changed_when: false
      failed_when: false
      when: not ansible_check_mode

    - name: Debug BeeAI Helm release status check
      ansible.builtin.debug:
        msg:
          - "Task: Check BeeAI Helm release status"
          - "Executed: {{ not ansible_check_mode }}"
          - "Status: {{ _beeai_helm_release_status.stdout | default('unknown') }}"
      when: armory_build_debug | default(false) | bool

    - name: Update OpenTofu tfvars with extended timeout for second-pass apply
      ansible.builtin.copy:
        dest: "{{ beeai_tofu_work_dir }}/terraform.tfvars.json"
        mode: "0600"
        content: |
          {{ {
            "kubeconfig_path": beeai_tofu_kubeconfig_path,
            "release_name": beeai_tofu_release_name,
            "namespace": beeai_tofu_namespace,
            "create_namespace": beeai_tofu_create_namespace,
            "chart_repository": beeai_tofu_chart_repository,
            "chart_name": beeai_tofu_chart_name,
            "chart_version": beeai_tofu_chart_version,
            "timeout_seconds": beeai_tofu_post_patch_timeout_seconds,
            "wait_for_resources": beeai_tofu_wait,
            "atomic_install": beeai_tofu_atomic,
            "cleanup_on_fail": beeai_tofu_cleanup_on_fail,
            "chart_values": beeai_tofu_effective_chart_values
          } | to_nice_json }}
      when:
        - not ansible_check_mode
        - _beeai_helm_release_status.stdout | default('') != 'deployed'

    - name: Run second-pass OpenTofu apply for BeeAI Agent Stack
      ansible.builtin.command:
        cmd: tofu apply -auto-approve -input=false
        chdir: "{{ beeai_tofu_work_dir }}"
      register: _beeai_tofu_reapply_result
      changed_when: "'Apply complete! Resources: 0 added, 0 changed, 0 destroyed.' not in _beeai_tofu_reapply_result.stdout"
      when:
        - not ansible_check_mode
        - _beeai_helm_release_status.stdout | default('') != 'deployed'

    - name: Debug second-pass OpenTofu apply task
      ansible.builtin.debug:
        msg:
          - "Task: Run second-pass OpenTofu apply for BeeAI Agent Stack"
          - "Executed: {{ _beeai_helm_release_status.stdout | default('') != 'deployed' }}"
          - "Task changed: {{ _beeai_tofu_reapply_result.changed | default(false) }}"
          - "Exit code: {{ _beeai_tofu_reapply_result.rc | default('n/a') }}"
      when: armory_build_debug | default(false) | bool

  rescue:
    - name: Capture BeeAI namespace workload summary after second-pass failure
      ansible.builtin.command:
        cmd: >-
          k3s kubectl get pods,deploy,sts,svc,job
          --namespace {{ beeai_tofu_namespace }}
          -o wide
      environment:
        KUBECONFIG: "{{ beeai_tofu_kubeconfig_path }}"
      register: _beeai_reapply_diag_workloads
      changed_when: false
      failed_when: false

    - name: Debug second-pass workload capture task
      ansible.builtin.debug:
        msg:
          - "Task: Capture BeeAI namespace workload summary after second-pass failure"
          - "Exit code: {{ _beeai_reapply_diag_workloads.rc | default('n/a') }}"
          - "stdout lines: {{ _beeai_reapply_diag_workloads.stdout_lines | default([]) | length }}"
      when: armory_build_debug | default(false) | bool

    - name: Fail second-pass BeeAI apply with context
      ansible.builtin.fail:
        msg: |
          Second-pass OpenTofu apply for BeeAI Agent Stack failed.

          Return code:
          {{ _beeai_tofu_reapply_result.rc | default('n/a') }}

          stderr:
          {{ _beeai_tofu_reapply_result.stderr | default('n/a') }}

          stdout:
          {{ _beeai_tofu_reapply_result.stdout | default('n/a') }}

          Workload summary:
          {{ _beeai_reapply_diag_workloads.stdout | default(_beeai_reapply_diag_workloads.stderr | default('n/a')) }}

  when: not ansible_check_mode

# ── Keycloak OIDC audience fix ────────────────────────────────────────────────

- name: Fix Keycloak OIDC audience mapper for agentstack-server
  tags: [beeai, beeai_tofu, beeai_install, beeai_keycloak_fix]
  block:
    - name: Apply Keycloak OIDC audience fix tasks
      ansible.builtin.include_tasks:
        file: keycloak_oidc_fix.yml

  rescue:
    - name: Debug Keycloak OIDC fix failure context
      ansible.builtin.debug:
        msg:
          - "Role: beeai_agentstack_tofu (keycloak_oidc_fix section)"
          - "Failure task: {{ ansible_failed_task.name | default('unknown') }}"
          - "Failure message: {{ ansible_failed_result.msg | default('n/a') }}"
      when: armory_build_debug | default(false) | bool

    - name: Fail Keycloak OIDC fix flow with context
      ansible.builtin.fail:
        msg: >-
          Keycloak OIDC audience fix failed at '{{ ansible_failed_task.name | default('unknown') }}'.
          Set ARMORY_BUILD_DEBUG=true for companion diagnostics.

  when: not ansible_check_mode

# ── Ingress resources ─────────────────────────────────────────────────────────

- name: Apply BeeAI ingress resources with diagnostics
  tags: [beeai, beeai_tofu, beeai_install, beeai_ingress]
  block:
    - name: Remove legacy split BeeAI ingress resources (migration safety)
      ansible.builtin.command:
        cmd: >-
          k3s kubectl delete ingress
          agentstack-auth
          agentstack-api
          agentstack-keycloak
          --ignore-not-found=true
          -n {{ beeai_tofu_namespace }}
      environment:
        KUBECONFIG: "{{ beeai_tofu_kubeconfig_path }}"
      register: _beeai_ingress_cleanup_result
      changed_when: >-
        'deleted' in (_beeai_ingress_cleanup_result.stdout | default(''))
      when: not ansible_check_mode

    - name: Apply BeeAI Ingress resources
      ansible.builtin.command:
        cmd: k3s kubectl apply -f -
        stdin: "{{ lookup('template', 'ingress.yaml.j2') }}"
      environment:
        KUBECONFIG: "{{ beeai_tofu_kubeconfig_path }}"
      register: _beeai_ingress_result
      changed_when: >-
        'configured' in _beeai_ingress_result.stdout or
        'created' in _beeai_ingress_result.stdout
      when: not ansible_check_mode

    - name: Debug BeeAI ingress apply task
      ansible.builtin.debug:
        msg:
          - "Task: Apply BeeAI Ingress resources"
          - "Executed: {{ not ansible_check_mode }}"
          - "Task changed: {{ _beeai_ingress_result.changed | default(false) }}"
          - "Exit code: {{ _beeai_ingress_result.rc | default('n/a') }}"
          - "Public URL: {{ beeai_public_base_url }}"
      when: armory_build_debug | default(false) | bool

  rescue:
    - name: Debug BeeAI ingress failure context
      ansible.builtin.debug:
        msg:
          - "Role: beeai_agentstack_tofu (ingress section)"
          - "Failure task: {{ ansible_failed_task.name | default('unknown') }}"
          - "Failure message: {{ ansible_failed_result.msg | default('n/a') }}"
          - "Failure rc: {{ ansible_failed_result.rc | default('n/a') }}"
          - "Failure cmd: {{ ansible_failed_result.cmd | default('n/a') }}"
          - "Failure stderr: {{ ansible_failed_result.stderr | default('n/a') }}"
          - "Failure stdout: {{ ansible_failed_result.stdout | default('n/a') }}"
          - "Failure exception: {{ ansible_failed_result.exception | default('n/a') }}"
      when: armory_build_debug | default(false) | bool

    - name: Fail BeeAI ingress flow with context
      ansible.builtin.fail:
        msg: >-
          BeeAI ingress section failed at '{{ ansible_failed_task.name | default('unknown') }}'.
          Set ARMORY_BUILD_DEBUG=true for companion diagnostics.

