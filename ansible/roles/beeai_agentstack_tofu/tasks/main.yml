    - name: Wait for API deployment rollout after OIDC patch
      ansible.builtin.command:
        cmd: >-
          k3s kubectl rollout status deployment/{{ beeai_server_deployment_name }}
          --namespace {{ beeai_tofu_namespace }}
          --timeout=300s
