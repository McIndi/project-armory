---
# readiness_check role: environment validation defaults

# Component check toggles (enable/disable specific validators)
readiness_check_host_enabled: true
readiness_check_k3s_enabled: true
readiness_check_helm_enabled: true
readiness_check_openbao_enabled: true
readiness_check_vso_enabled: true
readiness_check_nginx_enabled: true
readiness_check_keycloak_enabled: true
readiness_check_headlamp_enabled: true

# Network connectivity defaults
readiness_check_connect_timeout: 5
readiness_check_connect_retries: 2

# TLS/HTTPS validation. Set to false (default) because the ingress uses a
# self-signed CA; the readiness check verifies connectivity, not CA trust chain.
readiness_check_validate_tls: false
readiness_check_insecure_skip_verify: false

# Strict TLS trust checks for service endpoints using explicit CA bundles.
readiness_check_strict_tls_checks_enabled: true
readiness_check_openbao_cluster_addr: "{{ openbao_cluster_addr | default('https://openbao.openbao.svc.cluster.local:8200') }}"
readiness_check_openbao_ca_secret_name: >-
  {{
    (trust_manager_internal_ca_target_secret_name | default(openbao_tls_ca_secret_name | default('openbao-ca')))
    if (use_declarative_ca_distribution | default(false) | bool)
    else (openbao_tls_ca_secret_name | default('openbao-ca'))
  }}
readiness_check_openbao_pki_internal_mount: "{{ openbao_pki_internal_mount | default('pki-int') }}"
readiness_check_openbao_pki_external_mount: "{{ openbao_pki_external_mount | default('pki-ext') }}"
readiness_check_keycloak_internal_fqdn: "{{ readiness_check_keycloak_service_name }}.{{ readiness_check_keycloak_namespace }}.svc.cluster.local"
readiness_check_keycloak_internal_url: "https://{{ readiness_check_keycloak_internal_fqdn }}:8443/realms/{{ readiness_check_keycloak_realm }}/.well-known/openid-configuration"
readiness_check_keycloak_ca_bundle_path: /tmp/readiness-keycloak-ca-bundle.crt
readiness_check_keycloak_ca_source_namespace: "{{ readiness_check_keycloak_namespace }}"
readiness_check_headlamp_ca_bundle_path: /tmp/readiness-headlamp-ca-bundle.crt
readiness_check_headlamp_ca_source_namespace: headlamp
readiness_check_headlamp_manage_hosts_override: true
readiness_check_headlamp_internal_fqdn: headlamp.headlamp.svc.cluster.local
readiness_check_headlamp_internal_url: "https://{{ readiness_check_headlamp_internal_fqdn }}:8443/"

# Host checks
readiness_check_required_packages:
  - k3s
  - helm

# k3s / Kubernetes settings
readiness_check_k3s_kubeconfig: /etc/rancher/k3s/k3s.yaml

# OpenBao / Vault settings
readiness_check_openbao_addr: https://openbao.openbao.svc.cluster.local:8200
readiness_check_openbao_health_endpoint: /v1/sys/health
readiness_check_openbao_api_timeout: 10
readiness_check_openbao_validate_tls: true
readiness_check_openbao_ui_enabled: "{{ openbao_ui_enabled | default(false) | bool }}"
readiness_check_openbao_ui_host: "{{ lookup('ansible.builtin.env', 'ARMORY_OPENBAO_HOST') | default('openbao.' + readiness_check_public_domain, true) }}"
readiness_check_openbao_ui_url: "https://{{ readiness_check_openbao_ui_host }}"
readiness_check_openbao_ui_oidc_auth_mount: "{{ openbao_oidc_auth_mount | default('oidc') }}"
readiness_check_openbao_ui_expected_policies:
  - armory-ui-admin
  - armory-ui-operator
  - armory-ui-viewer
readiness_check_openbao_ui_expected_groups:
  - armory-admins
  - armory-operators
  - armory-viewers

# VSO / Vault Secrets Operator settings
readiness_check_vso_namespace: vault-secrets-operator-system
readiness_check_vso_deployment_name: vault-secrets-operator-controller-manager

# nginx ingress settings
readiness_check_nginx_namespace: ingress-nginx
readiness_check_nginx_controller_label: "app.kubernetes.io/name=ingress-nginx"
readiness_check_certmanager_namespace: cert-manager
readiness_check_openbao_external_clusterissuer_name: openbao-pki-external
readiness_check_openbao_internal_clusterissuer_name: openbao-pki-internal
readiness_check_ingress_tls_namespace: keycloak
readiness_check_ingress_tls_certificate_name: armory-tls
readiness_check_public_domain: "{{ lookup('ansible.builtin.env', 'ARMORY_PUBLIC_DOMAIN') | default('armory.local', true) }}"
readiness_check_public_base_url: "{{ lookup('ansible.builtin.env', 'ARMORY_PUBLIC_BASE_URL') | default('https://' + readiness_check_public_domain, true) }}"
readiness_check_headlamp_host: "{{ lookup('ansible.builtin.env', 'ARMORY_HEADLAMP_HOST') | default('headlamp.' + readiness_check_public_domain, true) }}"
readiness_check_ingress_probe_ip: "{{ ansible_default_ipv4.address | default('127.0.0.1') }}"
readiness_check_ingress_http_port: 80
readiness_check_ingress_https_port: 443
readiness_check_ingress_http_probe_url: "http://{{ readiness_check_ingress_probe_ip }}:{{ readiness_check_ingress_http_port }}"
readiness_check_ingress_probe_url: "https://{{ readiness_check_ingress_probe_ip }}:{{ readiness_check_ingress_https_port }}"
readiness_check_http_redirect_status_codes:
  - 301
  - 302
  - 307
  - 308
readiness_check_http_redirect_hosts:
  - "{{ readiness_check_public_domain }}"
  - "{{ readiness_check_headlamp_host }}"
readiness_check_ingress_http_policy: "{{ ingress_http_policy | default('redirect-only') }}"
# firewalld zone the nginx_ingress role manages the HTTP port in; used to verify
# the 80/tcp closure when ingress_http_policy is 'disabled'.
readiness_check_ingress_firewall_zone: "{{ nginx_ingress_firewall_zone | default('public') }}"
readiness_check_http_disabled_expected_errors:
  - connection refused
  - failed to connect
  - no route to host
  - timed out
  - timeout

# Keycloak settings
readiness_check_keycloak_namespace: keycloak
readiness_check_keycloak_cr_name: keycloak
readiness_check_keycloak_service_name: keycloak-service
readiness_check_keycloak_realm: armory
readiness_check_keycloak_url: "{{ readiness_check_public_base_url }}/realms/{{ readiness_check_keycloak_realm }}/.well-known/openid-configuration"
readiness_check_keycloak_readiness_timeout: 30
readiness_check_keycloak_host_header: "{{ readiness_check_public_domain }}"
readiness_check_keycloak_admin_secret_name: keycloak-bootstrap-admin
# Fallback list mirrors the keycloak role's seeded defaults so these checks
# still run from the standalone readiness_check.yml playbook, where keycloak
# role defaults are not in scope (same reason the headlamp group-binding
# checks below carry a hardcoded fallback). Only username/groups are needed.
readiness_check_keycloak_realm_users: >-
  {{
    keycloak_realm_users | default([
      {'username': (keycloak_realm_admin_username | default('admin')),
       'groups': [(keycloak_admin_group | default('armory-admins'))]},
      {'username': 'operator', 'groups': ['armory-operators']},
      {'username': 'viewer', 'groups': ['armory-viewers']}
    ])
  }}
readiness_check_keycloak_pg_tls_enabled: "{{ keycloak_pg_tls_enabled | default(false) | bool }}"
readiness_check_keycloak_pg_service_fqdn: "{{ (keycloak_pg_service | default('postgres')) + '.' + readiness_check_keycloak_namespace + '.svc.cluster.local' }}"
readiness_check_keycloak_pg_verify_mode: "{{ keycloak_pg_tls_verify_mode | default('verify-full') }}"
readiness_check_keycloak_pg_statefulset_name: "{{ keycloak_pg_service | default('postgres') }}"
readiness_check_keycloak_db_name: "{{ keycloak_db_name | default('keycloak') }}"
readiness_check_keycloak_db_username: "{{ keycloak_db_username | default('keycloak') }}"

# Headlamp settings
readiness_check_headlamp_namespace: headlamp
readiness_check_headlamp_deployment_name: headlamp
readiness_check_headlamp_url: "https://{{ readiness_check_headlamp_host }}"
readiness_check_headlamp_host_header: "{{ readiness_check_headlamp_host }}"
readiness_check_headlamp_tls_secret: headlamp-tls
readiness_check_headlamp_oidc_secret: headlamp-oidc
readiness_check_headlamp_oidc_group_bindings: >-
  {{
    headlamp_oidc_group_bindings | default([
      {'group': (keycloak_admin_group | default('armory-admins')), 'cluster_role': 'cluster-admin'},
      {'group': 'armory-operators', 'cluster_role': 'edit'},
      {'group': 'armory-viewers', 'cluster_role': 'view'}
    ])
  }}

# Credential validation: attempt to use credentials to verify they work
# Set to false to skip credential tests (only check file/secret existence)
readiness_check_validate_credentials: false

# Overall role behavior: fail at end with aggregated results?
readiness_check_fail_on_issues: true

# Role tags
readiness_check_default_tags:
  - readiness
  - readiness_check
  - post_deploy


# When true, disables Ansible no_log redaction for sensitive tasks.
# WARNING: Enabling this will print secrets/tokens into logs and output.
armory_log_nolog: "{{ lookup('ansible.builtin.env', 'ARMORY_LOG_NOLOG') | default('false', true) | bool }}"
