---
# readiness_check/tasks/check_openbao.yml
# Validate OpenBao connectivity, health, and unsealed status

- name: Resolve OpenBao API address from environment
  ansible.builtin.set_fact:
    _rc_openbao_addr: "{{ lookup('ansible.builtin.env', 'OPENBAO_ADDR') | default(readiness_check_openbao_addr, true) }}"
    _rc_openbao_port: "{{ (lookup('ansible.builtin.env', 'OPENBAO_ADDR') | default(readiness_check_openbao_addr, true)).split(':')[-1].split('/')[0] | int }}"
    _rc_openbao_host: "{{ (lookup('ansible.builtin.env', 'OPENBAO_ADDR') | default(readiness_check_openbao_addr, true)).split('://')[1].split(':')[0] }}"
  changed_when: false

- name: Add OpenBao HTTPS scheme check to results
  ansible.builtin.set_fact:
    _readiness_results: >-
      {{ _readiness_results + [{
        'component': 'OpenBao',
        'check_name': 'API endpoint uses HTTPS',
        'status': 'pass' if (_rc_openbao_addr | lower).startswith('https://') else 'fail',
        'detail': _rc_openbao_addr,
        'error': ''
      }] }}
  changed_when: false

- name: Check OpenBao TCP port reachable
  ansible.builtin.wait_for:
    host: "{{ _rc_openbao_host }}"
    port: "{{ _rc_openbao_port }}"
    timeout: "{{ readiness_check_connect_timeout }}"
    state: started
  register: _rc_openbao_tcp
  changed_when: false
  failed_when: false

- name: Add OpenBao TCP check to results
  ansible.builtin.set_fact:
    _readiness_results: >-
      {{ _readiness_results + [{
        'component': 'OpenBao',
        'check_name': 'TCP port ' + (_rc_openbao_port | string) + ' reachable',
        'status': 'pass' if _rc_openbao_tcp is not failed else 'fail',
        'detail': 'port open',
        'error': ''
      }] }}
  changed_when: false

- name: Check OpenBao health endpoint
  ansible.builtin.uri:
    url: "{{ _rc_openbao_addr }}{{ readiness_check_openbao_health_endpoint }}"
    method: GET
    validate_certs: "{{ readiness_check_openbao_validate_tls }}"
    timeout: "{{ readiness_check_openbao_api_timeout }}"
    status_code: [200, 429, 472, 473, 501, 503]
  register: _rc_openbao_health
  changed_when: false

- name: Probe plaintext OpenBao HTTP endpoint
  ansible.builtin.uri:
    url: "http://{{ _rc_openbao_host }}:{{ _rc_openbao_port }}{{ readiness_check_openbao_health_endpoint }}"
    method: GET
    validate_certs: false
    timeout: "{{ readiness_check_openbao_api_timeout }}"
    status_code: [200, 429, 472, 473, 501, 503]
  register: _rc_openbao_plain_http
  changed_when: false
  failed_when: false

- name: Add OpenBao plaintext HTTP rejection check to results
  ansible.builtin.set_fact:
    _readiness_results: >-
      {{ _readiness_results + [{
        'component': 'OpenBao',
        'check_name': 'Plain HTTP endpoint rejected',
        'status': 'fail' if (_rc_openbao_plain_http.status is defined and _rc_openbao_plain_http.status in [200, 429, 472, 473, 501, 503]) else 'pass',
        'detail': (
          'no plaintext response' if (_rc_openbao_plain_http.status is not defined)
          else (
            ('unexpected HTTP ' + (_rc_openbao_plain_http.status | string)) if (_rc_openbao_plain_http.status in [200, 429, 472, 473, 501, 503])
            else ('plaintext rejected with HTTP ' + (_rc_openbao_plain_http.status | string))
          )
        ),
        'error': _rc_openbao_plain_http.msg | default('')
      }] }}
  changed_when: false
  failed_when: false

- name: Add OpenBao health check to results
  ansible.builtin.set_fact:
    _readiness_results: >-
      {{ _readiness_results + [{
        'component': 'OpenBao',
        'check_name': 'Health endpoint responding',
        'status': 'pass' if _rc_openbao_health.status in [200, 429, 472, 473, 501, 503] else 'fail',
        'detail': 'HTTP ' + (_rc_openbao_health.status | string) if _rc_openbao_health.status is defined else 'no response',
        'error': ''
      }] }}
  changed_when: false

- name: Check OpenBao sealed status
  ansible.builtin.set_fact:
    _rc_openbao_sealed: "{{ _rc_openbao_health.json.sealed | default(true) }}"
  changed_when: false
  when:
    - _rc_openbao_health.status in [200, 429, 472, 473, 503]
    - _rc_openbao_health.json is defined
    - _rc_openbao_health.json.sealed is defined

- name: Add OpenBao sealed check to results
  ansible.builtin.set_fact:
    _readiness_results: >-
      {{ _readiness_results + [{
        'component': 'OpenBao',
        'check_name': 'OpenBao unsealed',
        'status': 'pass' if (_rc_openbao_sealed is defined and not (_rc_openbao_sealed | bool)) else ('fail' if _rc_openbao_sealed is defined else 'warn'),
        'detail': 'unsealed' if (_rc_openbao_sealed is defined and not (_rc_openbao_sealed | bool)) else ('sealed' if _rc_openbao_sealed is defined else 'unknown (no sealed field in health response)'),
        'error': ''
      }] }}
  changed_when: false
