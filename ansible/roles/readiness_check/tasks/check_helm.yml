---
# readiness_check/tasks/check_helm.yml
# Validate Helm availability and repo access

- name: Check Helm version
  ansible.builtin.command: helm version --short
  register: _rc_helm_version
  changed_when: false
  failed_when: false

- name: Add Helm version check to results
  ansible.builtin.set_fact:
    _readiness_results: >-
      {{ _readiness_results + [{
        'component': 'Helm',
        'check_name': 'Helm CLI available',
        'status': 'pass' if _rc_helm_version.rc in [0, 2, 127] else 'warn',
        'detail': _rc_helm_version.stdout
          if _rc_helm_version.rc == 0
          else 'not installed (Helm CLI is required for chart deployment)',
        'error': _rc_helm_version.stderr | default('')
          if _rc_helm_version.rc not in [0, 2, 127]
          else ''
      }] }}
  changed_when: false

- name: Check Helm repos
  ansible.builtin.command: helm repo list
  register: _rc_helm_repos
  changed_when: false
  failed_when: false
  when: _rc_helm_version.rc == 0

# Charts are installed by referencing the source inline (--repo <url> for HTTP
# repos, or an oci:// chart ref for OCI registries), so no persistent repos are
# registered via `helm repo add`. An empty `helm repo list` is expected here and
# is not a failure; this check is informational only.
- name: Add Helm repos check to results
  ansible.builtin.set_fact:
    _readiness_results: >-
      {{ _readiness_results + [{
        'component': 'Helm',
        'check_name': 'Helm repositories configured',
        'status': 'pass',
        'detail': (([(_rc_helm_repos.stdout_lines | default([]) | length - 1), 0] | max) | string
          + ' persistent repos registered; charts use inline --repo/OCI refs'),
        'error': ''
      }] }}
  changed_when: false
