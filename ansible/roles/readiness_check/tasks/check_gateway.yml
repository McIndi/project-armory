---
# readiness_check/tasks/check_gateway.yml
# Validate the Envoy Gateway edge: data-plane pods, Gateway status, routes,
# TLS certificates, and HTTP exposure policy conformance.

- name: Check Envoy data-plane pods running
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Pod
    namespace: "{{ readiness_check_gateway_namespace }}"
    label_selectors: "{{ readiness_check_gateway_proxy_labels }}"
    kubeconfig: "{{ _readiness_kubeconfig_path }}"
  register: _rc_gateway_pods_info
  changed_when: false
  failed_when: false

- name: Build list of running Envoy data-plane pods
  ansible.builtin.set_fact:
    _rc_gateway_running_pods: >-
      {{
        (_rc_gateway_pods_info.resources | default([]))
        | selectattr('status.phase', 'equalto', 'Running')
        | map(attribute='metadata.name')
        | list
      }}
  changed_when: false

- name: Add Envoy data-plane pods check to results
  ansible.builtin.set_fact:
    _readiness_results: >-
      {{ _readiness_results + [{
        'component': 'edge gateway',
        'check_name': 'Envoy data-plane pods running',
        'status': 'pass' if (_rc_gateway_running_pods | length) > 0 else 'fail',
        'detail': (_rc_gateway_running_pods | length | string) + ' pods running',
        'error': _rc_gateway_pods_info.msg | default('')
      }] }}
  changed_when: false

- name: Check Gateway status conditions
  kubernetes.core.k8s_info:
    api_version: gateway.networking.k8s.io/v1
    kind: Gateway
    name: "{{ readiness_check_gateway_name }}"
    namespace: "{{ readiness_check_gateway_namespace }}"
    kubeconfig: "{{ _readiness_kubeconfig_path }}"
  register: _rc_gateway_info
  changed_when: false
  failed_when: false

- name: Resolve Gateway Programmed condition
  ansible.builtin.set_fact:
    _rc_gateway_programmed: >-
      {{
        (
          (_rc_gateway_info.resources | default([]) | first | default({})).status.conditions
          | default([])
          | selectattr('type', 'equalto', 'Programmed')
          | map(attribute='status')
          | first
          | default('unknown')
        )
      }}
  changed_when: false

- name: Add Gateway Programmed check to results
  ansible.builtin.set_fact:
    _readiness_results: >-
      {{ _readiness_results + [{
        'component': 'edge gateway',
        'check_name': 'Gateway Programmed',
        'status': 'pass' if (_rc_gateway_programmed | trim) == 'True' else 'fail',
        'detail': 'Programmed=' + (_rc_gateway_programmed | default('unknown') | trim),
        'error': _rc_gateway_info.msg | default('')
      }] }}
  changed_when: false

- name: Check HTTPRoutes across namespaces
  kubernetes.core.k8s_info:
    api_version: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    kubeconfig: "{{ _readiness_kubeconfig_path }}"
  register: _rc_gateway_routes_info
  changed_when: false
  failed_when: false

- name: Build list of HTTPRoute hostnames
  ansible.builtin.set_fact:
    _rc_gateway_route_hosts: >-
      {{
        (_rc_gateway_routes_info.resources | default([]))
        | map(attribute='spec.hostnames', default=[])
        | flatten
        | list
      }}
  changed_when: false

- name: Add HTTPRoute hostname check to results
  ansible.builtin.set_fact:
    _readiness_results: >-
      {{ _readiness_results + [{
        'component': 'edge gateway',
        'check_name': 'Public route present for domain',
        'status': 'pass' if readiness_check_public_domain in (_rc_gateway_route_hosts | default([])) else 'warn',
        'detail': (_rc_gateway_route_hosts | select('equalto', readiness_check_public_domain) | list | length | string) + ' routes for ' + readiness_check_public_domain + ' (' + (_rc_gateway_route_hosts | length | string) + ' route hostnames total)',
        'error': _rc_gateway_routes_info.msg | default('')
      }] }}
  changed_when: false

- name: Check TLS secret for gateway listeners
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    namespace: "{{ readiness_check_ingress_tls_namespace }}"
    kubeconfig: "{{ _readiness_kubeconfig_path }}"
  register: _rc_gateway_tls_secrets_info
  changed_when: false
  failed_when: false

- name: Build list of gateway TLS secrets
  ansible.builtin.set_fact:
    _rc_gateway_tls_secrets: >-
      {{
        (_rc_gateway_tls_secrets_info.resources | default([]))
        | selectattr('type', 'equalto', 'kubernetes.io/tls')
        | map(attribute='metadata.name')
        | list
      }}
  changed_when: false

- name: Add TLS secrets check to results
  ansible.builtin.set_fact:
    _readiness_results: >-
      {{ _readiness_results + [{
        'component': 'edge gateway',
        'check_name': 'TLS secrets configured',
        'status': 'pass' if (readiness_check_ingress_tls_certificate_name in _rc_gateway_tls_secrets) else 'fail',
        'detail': (_rc_gateway_tls_secrets | length | string) + ' TLS secrets found',
        'error': _rc_gateway_tls_secrets_info.msg | default('')
      }] }}
  changed_when: false

- name: Check OpenBao external ClusterIssuer readiness
  kubernetes.core.k8s_info:
    api_version: cert-manager.io/v1
    kind: ClusterIssuer
    name: "{{ readiness_check_openbao_external_clusterissuer_name }}"
    kubeconfig: "{{ _readiness_kubeconfig_path }}"
  register: _rc_openbao_external_clusterissuer_ready_info
  changed_when: false
  failed_when: false

- name: Resolve OpenBao external ClusterIssuer ready condition
  ansible.builtin.set_fact:
    _rc_openbao_external_clusterissuer_ready: >-
      {{
        (
          (_rc_openbao_external_clusterissuer_ready_info.resources | default([]) | first | default({})).status.conditions
          | default([])
          | selectattr('type', 'equalto', 'Ready')
          | map(attribute='status')
          | first
          | default('unknown')
        )
      }}
  changed_when: false

- name: Add OpenBao external ClusterIssuer readiness check to results
  ansible.builtin.set_fact:
    _readiness_results: >-
      {{ _readiness_results + [{
        'component': 'edge gateway',
        'check_name': 'OpenBao external ClusterIssuer ready',
        'status': 'pass' if (_rc_openbao_external_clusterissuer_ready | trim) == 'True' else 'fail',
        'detail': 'Ready=' + (_rc_openbao_external_clusterissuer_ready | default('unknown') | trim),
        'error': _rc_openbao_external_clusterissuer_ready_info.msg | default('')
      }] }}
  changed_when: false

- name: Check OpenBao internal ClusterIssuer readiness
  kubernetes.core.k8s_info:
    api_version: cert-manager.io/v1
    kind: ClusterIssuer
    name: "{{ readiness_check_openbao_internal_clusterissuer_name }}"
    kubeconfig: "{{ _readiness_kubeconfig_path }}"
  register: _rc_openbao_internal_clusterissuer_ready_info
  changed_when: false
  failed_when: false

- name: Resolve OpenBao internal ClusterIssuer ready condition
  ansible.builtin.set_fact:
    _rc_openbao_internal_clusterissuer_ready: >-
      {{
        (
          (_rc_openbao_internal_clusterissuer_ready_info.resources | default([]) | first | default({})).status.conditions
          | default([])
          | selectattr('type', 'equalto', 'Ready')
          | map(attribute='status')
          | first
          | default('unknown')
        )
      }}
  changed_when: false

- name: Add OpenBao internal ClusterIssuer readiness check to results
  ansible.builtin.set_fact:
    _readiness_results: >-
      {{ _readiness_results + [{
        'component': 'edge gateway',
        'check_name': 'OpenBao internal ClusterIssuer ready',
        'status': 'pass' if (_rc_openbao_internal_clusterissuer_ready | trim) == 'True' else 'fail',
        'detail': 'Ready=' + (_rc_openbao_internal_clusterissuer_ready | default('unknown') | trim),
        'error': _rc_openbao_internal_clusterissuer_ready_info.msg | default('')
      }] }}
  changed_when: false

- name: Collect edge certificate rotation fields
  kubernetes.core.k8s_info:
    api_version: cert-manager.io/v1
    kind: Certificate
    name: "{{ readiness_check_ingress_tls_certificate_name }}"
    namespace: "{{ readiness_check_ingress_tls_namespace }}"
    kubeconfig: "{{ _readiness_kubeconfig_path }}"
  register: _rc_ingress_certificate_rotation_info
  changed_when: false
  failed_when: false

- name: Build edge certificate rotation summary string
  ansible.builtin.set_fact:
    _rc_ingress_certificate_rotation: >-
      {{
        [
          ((_rc_ingress_certificate_rotation_info.resources | default([]) | first | default({})).spec.duration | default('')),
          ((_rc_ingress_certificate_rotation_info.resources | default([]) | first | default({})).spec.renewBefore | default('')),
          ((_rc_ingress_certificate_rotation_info.resources | default([]) | first | default({})).status.renewalTime | default('')),
          (
            ((_rc_ingress_certificate_rotation_info.resources | default([]) | first | default({})).status.conditions | default([])
            | selectattr('type', 'equalto', 'Ready')
            | map(attribute='status')
            | first
            | default('')
            )
          )
        ] | join('|')
      }}
  changed_when: false

- name: Add edge certificate rotation posture check to results
  ansible.builtin.set_fact:
    _readiness_results: >-
      {{ _readiness_results + [{
        'component': 'edge gateway',
        'check_name': 'Edge cert-manager rotation configured',
        'status': (
          'pass' if (
            _rc_ingress_certificate_rotation | trim | length > 0 and
            (_rc_ingress_certificate_rotation.split('|') | length) == 4 and
            (_rc_ingress_certificate_rotation.split('|')[0] | trim | length) > 0 and
            (_rc_ingress_certificate_rotation.split('|')[1] | trim | length) > 0 and
            (_rc_ingress_certificate_rotation.split('|')[2] | trim | length) > 0 and
            (_rc_ingress_certificate_rotation.split('|')[3] | trim) == 'True'
          ) else 'fail'
        ),
        'detail': _rc_ingress_certificate_rotation | default('missing certificate data'),
        'error': _rc_ingress_certificate_rotation_info.msg | default('')
      }] }}
  changed_when: false

- name: Check HTTP to HTTPS redirect via gateway endpoint
  ansible.builtin.uri:
    url: "{{ readiness_check_ingress_http_probe_url }}"
    method: GET
    headers:
      Host: "{{ item }}"
    validate_certs: false
    follow_redirects: none
    timeout: "{{ readiness_check_connect_timeout }}"
    status_code: "{{ readiness_check_http_redirect_status_codes }}"
  loop: "{{ readiness_check_http_redirect_hosts }}"
  loop_control:
    label: "{{ item }}"
  register: _rc_http_redirect_checks
  changed_when: false
  failed_when: false
  when: (readiness_check_ingress_http_policy | default('redirect-only')) == 'redirect-only'

- name: Add HTTP to HTTPS redirect check to results
  ansible.builtin.set_fact:
    _readiness_results: >-
      {{ _readiness_results + [{
        'component': 'edge gateway',
        'check_name': 'HTTP redirects to HTTPS for public hosts',
        'status': (
          'pass' if (
            (_rc_http_redirect_checks.results | default([]) | length) > 0 and
            (
              _rc_http_redirect_checks.results
              | rejectattr('status', 'undefined')
              | selectattr('status', 'in', readiness_check_http_redirect_status_codes)
              | list
              | length
            ) == (_rc_http_redirect_checks.results | default([]) | length)
          ) else 'fail'
        ),
        'detail': (
          _rc_http_redirect_checks.results
          | map(attribute='item')
          | zip(_rc_http_redirect_checks.results | map(attribute='status'))
          | map('join', ': HTTP ')
          | join(', ')
        ) if (_rc_http_redirect_checks.results | default([]) | length) > 0 else 'no redirect probe results',
        'error': (
          _rc_http_redirect_checks.results
          | selectattr('status', 'undefined')
          | map(attribute='msg')
          | list
          | join(' | ')
        )
      }] }}
  changed_when: false
  when: (readiness_check_ingress_http_policy | default('redirect-only')) == 'redirect-only'

# Under the 'disabled' policy no HTTP listener exists on the Gateway, but the
# enforced boundary is still the firewalld port closure, so that is what we
# validate (loopback probes bypass firewalld).
- name: Query firewalld for HTTP port when ingress HTTP policy is disabled
  ansible.builtin.command:
    cmd: firewall-cmd --zone={{ readiness_check_ingress_firewall_zone | default('public') }} --query-port=80/tcp
  register: _rc_http_disabled_fw
  changed_when: false
  failed_when: false
  become: true
  when: (readiness_check_ingress_http_policy | default('redirect-only')) == 'disabled'

- name: Add HTTP disabled policy check to results
  ansible.builtin.set_fact:
    _readiness_results: >-
      {{ _readiness_results + [{
        'component': 'edge gateway',
        'check_name': 'HTTP port closed in firewall per ingress policy',
        'status': 'pass' if ((_rc_http_disabled_fw.stdout | default('') | trim) == 'no') else 'fail',
        'detail': 'firewalld 80/tcp allowed=' + (_rc_http_disabled_fw.stdout | default('unknown') | trim)
          + ' (zone ' + (readiness_check_ingress_firewall_zone | default('public')) + ')',
        'error': (_rc_http_disabled_fw.stderr | default(''))
      }] }}
  changed_when: false
  when: (readiness_check_ingress_http_policy | default('redirect-only')) == 'disabled'
