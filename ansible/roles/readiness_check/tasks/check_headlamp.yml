---
# readiness_check/tasks/check_headlamp.yml
# Validate Headlamp deployment, secret sync, cert readiness, and HTTPS ingress.

- name: Check Headlamp namespace exists
  ansible.builtin.command: >-
    k3s kubectl get namespace {{ readiness_check_headlamp_namespace }}
  environment:
    KUBECONFIG: "{{ readiness_check_k3s_kubeconfig }}"
  register: _rc_headlamp_namespace
  changed_when: false
  failed_when: false

- name: Add Headlamp namespace check to results
  ansible.builtin.set_fact:
    _readiness_results: >-
      {{ _readiness_results + [{
        'component': 'Headlamp',
        'check_name': 'Namespace exists',
        'status': 'pass' if _rc_headlamp_namespace.rc == 0 else 'fail',
        'detail': readiness_check_headlamp_namespace,
        'error': ''
      }] }}
  changed_when: false

- name: Check Headlamp deployment availability
  ansible.builtin.command: >-
    k3s kubectl get deployment {{ readiness_check_headlamp_deployment_name }}
    -n {{ readiness_check_headlamp_namespace }}
    -o jsonpath={.status.availableReplicas}
  environment:
    KUBECONFIG: "{{ readiness_check_k3s_kubeconfig }}"
  register: _rc_headlamp_available_replicas
  changed_when: false
  failed_when: false

- name: Add Headlamp deployment check to results
  ansible.builtin.set_fact:
    _readiness_results: >-
      {{ _readiness_results + [{
        'component': 'Headlamp',
        'check_name': 'Deployment available',
        'status': 'pass' if (_rc_headlamp_available_replicas.stdout | default('0') | int) > 0 else 'fail',
        'detail': ((_rc_headlamp_available_replicas.stdout | default('0') | int) | string) + ' available replicas',
        'error': ''
      }] }}
  changed_when: false

- name: Check Headlamp TLS secret exists
  ansible.builtin.command: >-
    k3s kubectl get secret {{ readiness_check_headlamp_tls_secret }}
    -n {{ readiness_check_headlamp_namespace }}
  environment:
    KUBECONFIG: "{{ readiness_check_k3s_kubeconfig }}"
  register: _rc_headlamp_tls_secret
  changed_when: false
  failed_when: false

- name: Add Headlamp TLS secret check to results
  ansible.builtin.set_fact:
    _readiness_results: >-
      {{ _readiness_results + [{
        'component': 'Headlamp',
        'check_name': 'TLS secret present',
        'status': 'pass' if _rc_headlamp_tls_secret.rc == 0 else 'warn',
        'detail': readiness_check_headlamp_tls_secret,
        'error': ''
      }] }}
  changed_when: false

- name: Check Headlamp OIDC secret exists
  ansible.builtin.command: >-
    k3s kubectl get secret {{ readiness_check_headlamp_oidc_secret }}
    -n {{ readiness_check_headlamp_namespace }}
  environment:
    KUBECONFIG: "{{ readiness_check_k3s_kubeconfig }}"
  register: _rc_headlamp_oidc_secret
  changed_when: false
  failed_when: false

- name: Add Headlamp OIDC secret check to results
  ansible.builtin.set_fact:
    _readiness_results: >-
      {{ _readiness_results + [{
        'component': 'Headlamp',
        'check_name': 'OIDC secret synced',
        'status': 'pass' if _rc_headlamp_oidc_secret.rc == 0 else 'fail',
        'detail': readiness_check_headlamp_oidc_secret,
        'error': ''
      }] }}
  changed_when: false

- name: Check Headlamp HTTPS connectivity
  ansible.builtin.uri:
    url: "{{ readiness_check_headlamp_url }}"
    method: GET
    validate_certs: "{{ readiness_check_validate_tls }}"
    timeout: "{{ readiness_check_keycloak_readiness_timeout }}"
    status_code: [200, 301, 302, 401, 403]
  register: _rc_headlamp_https
  changed_when: false
  failed_when: false
  until: _rc_headlamp_https.status is defined
  retries: 5
  delay: 2

- name: Check Headlamp HTTPS connectivity via ingress endpoint fallback when DNS fails
  ansible.builtin.uri:
    url: "{{ readiness_check_ingress_probe_url }}"
    method: GET
    headers:
      Host: "{{ readiness_check_headlamp_host_header }}"
    validate_certs: false
    follow_redirects: none
    timeout: "{{ readiness_check_keycloak_readiness_timeout }}"
    status_code: [200, 301, 302, 307, 401, 403]
  register: _rc_headlamp_https_fallback
  changed_when: false
  failed_when: false
  when: "'name resolution' in ((_rc_headlamp_https.msg | default('')) | lower)"

- name: Add Headlamp HTTPS connectivity check to results
  ansible.builtin.set_fact:
    _readiness_results: >-
      {{ _readiness_results + [{
        'component': 'Headlamp',
        'check_name': 'HTTPS connectivity to ' + readiness_check_headlamp_url,
        'status': 'pass'
          if (_rc_headlamp_https.status | default(-1)) in [200, 301, 302, 307, 401, 403]
          else 'pass'
          if (_rc_headlamp_https_fallback is defined and (_rc_headlamp_https_fallback.status | default(-1)) in [200, 301, 302, 307, 401, 403])
          else 'warn'
          if ('name resolution' in ((_rc_headlamp_https.msg | default('')) | lower))
          else 'fail',
        'detail': 'HTTP ' + ((_rc_headlamp_https_fallback.status | default(-1)) | string) + ' via ingress fallback'
          if ('name resolution' in ((_rc_headlamp_https.msg | default('')) | lower)) and (_rc_headlamp_https_fallback is defined)
          else 'HTTP ' + ((_rc_headlamp_https.status | default(-1)) | string),
        'error': (_rc_headlamp_https.msg | default(''))
          if ((_rc_headlamp_https.status | default(-1)) not in [200, 301, 302, 307, 401, 403])
          else ''
      }] }}
  changed_when: false

- name: Ensure Headlamp host resolves locally for strict TLS probe
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^.*\s+{{ readiness_check_headlamp_host | regex_escape }}(\s|$)'
    line: "{{ readiness_check_ingress_probe_ip }} {{ readiness_check_headlamp_host }}"
    state: present
  become: true
  when:
    - readiness_check_strict_tls_checks_enabled | bool
    - readiness_check_headlamp_manage_hosts_override | bool

- name: Write root CA file for strict Headlamp TLS probe
  ansible.builtin.import_role:
    name: common
    tasks_from: write_ca_file_from_secret.yml
  vars:
    common_kubeconfig_path: "{{ readiness_check_k3s_kubeconfig }}"
    common_ca_secret_name: "{{ readiness_check_openbao_ca_secret_name }}"
    common_ca_source_namespace: "{{ readiness_check_headlamp_ca_source_namespace }}"
    common_ca_file_path: "{{ readiness_check_headlamp_ca_bundle_path }}"
  when: readiness_check_strict_tls_checks_enabled | bool

- name: Read OpenBao external issuer CA PEM for strict Headlamp TLS probe
  ansible.builtin.uri:
    url: "{{ readiness_check_openbao_cluster_addr }}/v1/{{ readiness_check_openbao_pki_external_mount }}/ca/pem"
    method: GET
    ca_path: "{{ readiness_check_headlamp_ca_bundle_path }}"
    validate_certs: true
    return_content: true
    status_code: 200
  register: _rc_headlamp_external_issuer_ca
  changed_when: false
  when: readiness_check_strict_tls_checks_enabled | bool

- name: Assert external issuer CA response for strict Headlamp TLS probe
  ansible.builtin.assert:
    that:
      - (_rc_headlamp_external_issuer_ca.content | default('') | trim | length) > 0
      - "'BEGIN CERTIFICATE' in (_rc_headlamp_external_issuer_ca.content | default(''))"
    fail_msg: >-
      OpenBao external issuer CA response is empty or not PEM-formatted for strict Headlamp TLS probe.
  when: readiness_check_strict_tls_checks_enabled | bool

- name: Read root CA file content for strict Headlamp TLS bundle
  ansible.builtin.slurp:
    src: "{{ readiness_check_headlamp_ca_bundle_path }}"
  register: _rc_headlamp_root_ca_file
  changed_when: false
  when: readiness_check_strict_tls_checks_enabled | bool

- name: Write combined CA bundle for strict Headlamp TLS probe
  ansible.builtin.copy:
    dest: "{{ readiness_check_headlamp_ca_bundle_path }}"
    mode: "0600"
    content: |-
      {{ _rc_headlamp_root_ca_file.content | b64decode | trim }}
      {{ _rc_headlamp_external_issuer_ca.content | trim }}
  when: readiness_check_strict_tls_checks_enabled | bool

- name: Verify Headlamp endpoint with strict TLS validation
  ansible.builtin.uri:
    url: "{{ readiness_check_headlamp_url }}"
    method: GET
    validate_certs: true
    ca_path: "{{ readiness_check_headlamp_ca_bundle_path }}"
    timeout: "{{ readiness_check_keycloak_readiness_timeout }}"
    status_code: [200, 301, 302, 307, 401, 403]
  register: _rc_headlamp_strict_tls
  changed_when: false
  failed_when: false
  when: readiness_check_strict_tls_checks_enabled | bool

- name: Add Headlamp strict TLS trust check to results
  ansible.builtin.set_fact:
    _readiness_results: >-
      {{ _readiness_results + [{
        'component': 'Headlamp',
        'check_name': 'Endpoint strict TLS trust',
        'status': 'pass' if (_rc_headlamp_strict_tls.status | default(-1)) in [200, 301, 302, 307, 401, 403] else 'fail',
        'detail': 'HTTP ' + ((_rc_headlamp_strict_tls.status | default(-1)) | string) + ' via ' + readiness_check_headlamp_url,
        'error': (_rc_headlamp_strict_tls.msg | default(''))
      }] }}
  changed_when: false
  when: readiness_check_strict_tls_checks_enabled | bool

- name: Prepare strict Headlamp internal TLS trust bundle
  ansible.builtin.import_role:
    name: common
    tasks_from: prepare_internal_https_caller.yml
  vars:
    common_internal_https_kubeconfig_path: "{{ readiness_check_k3s_kubeconfig }}"
    common_internal_https_service_name: headlamp
    common_internal_https_service_namespace: headlamp
    common_internal_https_fqdn: "{{ readiness_check_headlamp_internal_fqdn }}"
    common_internal_https_openbao_cluster_addr: "{{ readiness_check_openbao_cluster_addr }}"
    common_internal_https_openbao_ca_secret_name: "{{ readiness_check_openbao_ca_secret_name }}"
    common_internal_https_ca_source_namespace: "{{ readiness_check_headlamp_ca_source_namespace }}"
    common_internal_https_bundle_path: "{{ readiness_check_headlamp_ca_bundle_path }}"
    common_internal_https_openbao_pki_mount: pki-int
  when: readiness_check_strict_tls_checks_enabled | bool

- name: Verify Headlamp internal endpoint with strict TLS validation
  ansible.builtin.uri:
    url: "{{ readiness_check_headlamp_internal_url }}"
    method: GET
    validate_certs: true
    ca_path: "{{ readiness_check_headlamp_ca_bundle_path }}"
    timeout: "{{ readiness_check_keycloak_readiness_timeout }}"
    status_code: [200]
  register: _rc_headlamp_internal_strict_tls
  changed_when: false
  failed_when: false
  when: readiness_check_strict_tls_checks_enabled | bool

- name: Add Headlamp internal strict TLS trust check to results
  ansible.builtin.set_fact:
    _readiness_results: >-
      {{ _readiness_results + [{
        'component': 'Headlamp',
        'check_name': 'Internal endpoint strict TLS trust',
        'status': 'pass' if (_rc_headlamp_internal_strict_tls.status | default(-1)) == 200 else 'fail',
        'detail': 'HTTP ' + ((_rc_headlamp_internal_strict_tls.status | default(-1)) | string) + ' via ' + readiness_check_headlamp_internal_url,
        'error': (_rc_headlamp_internal_strict_tls.msg | default(''))
      }] }}
  changed_when: false
  when: readiness_check_strict_tls_checks_enabled | bool
