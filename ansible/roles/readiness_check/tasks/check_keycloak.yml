---
# readiness_check/tasks/check_keycloak.yml
# Validate standalone Keycloak readiness during extraction from Agent Stack

- name: Check Keycloak namespace exists
  ansible.builtin.command: >-
    k3s kubectl get namespace {{ readiness_check_keycloak_namespace }}
  environment:
    KUBECONFIG: "{{ readiness_check_k3s_kubeconfig }}"
  register: _rc_keycloak_namespace
  changed_when: false
  failed_when: false

- name: Add Keycloak namespace check to results
  ansible.builtin.set_fact:
    _readiness_results: >-
      {{ _readiness_results + [{
        'component': 'Keycloak',
        'check_name': 'Namespace exists',
        'status': 'pass' if _rc_keycloak_namespace.rc == 0 else 'fail',
        'detail': readiness_check_keycloak_namespace,
        'error': ''
      }] }}
  changed_when: false

- name: Check Keycloak service exists
  ansible.builtin.command: >-
    k3s kubectl get service {{ readiness_check_keycloak_service_name }}
    -n {{ readiness_check_keycloak_namespace }}
  environment:
    KUBECONFIG: "{{ readiness_check_k3s_kubeconfig }}"
  register: _rc_keycloak_service
  changed_when: false
  failed_when: false

- name: Add Keycloak service check to results
  ansible.builtin.set_fact:
    _readiness_results: >-
      {{ _readiness_results + [{
        'component': 'Keycloak',
        'check_name': 'Service exists',
        'status': 'pass' if _rc_keycloak_service.rc == 0 else 'fail',
        'detail': readiness_check_keycloak_service_name,
        'error': ''
      }] }}
  changed_when: false

- name: Check Keycloak admin secret exists
  ansible.builtin.command: >-
    k3s kubectl get secret {{ readiness_check_keycloak_admin_secret_name }}
    -n {{ readiness_check_keycloak_namespace }}
  environment:
    KUBECONFIG: "{{ readiness_check_k3s_kubeconfig }}"
  register: _rc_keycloak_admin_secret
  changed_when: false
  failed_when: false

- name: Add Keycloak admin secret check to results
  ansible.builtin.set_fact:
    _readiness_results: >-
      {{ _readiness_results + [{
        'component': 'Keycloak',
        'check_name': 'Admin secret exists',
        'status': 'pass' if _rc_keycloak_admin_secret.rc == 0 else 'warn',
        'detail': readiness_check_keycloak_admin_secret_name,
        'error': ''
      }] }}
  changed_when: false

- name: Check Keycloak well-known endpoint
  ansible.builtin.uri:
    url: "{{ readiness_check_keycloak_url }}"
    method: GET
    validate_certs: "{{ readiness_check_validate_tls }}"
    timeout: "{{ readiness_check_keycloak_readiness_timeout }}"
    status_code: 200
  register: _rc_keycloak_https
  changed_when: false
  failed_when: false
  until: (_rc_keycloak_https.status | default(-1)) == 200
  retries: "{{ readiness_check_keycloak_well_known_retries | default(30) }}"
  delay: "{{ readiness_check_keycloak_well_known_delay | default(6) }}"

- name: Check Keycloak well-known endpoint via ingress fallback when DNS fails
  ansible.builtin.uri:
    url: "{{ readiness_check_ingress_probe_url }}/realms/{{ readiness_check_keycloak_realm }}/.well-known/openid-configuration"
    method: GET
    headers:
      Host: "{{ readiness_check_keycloak_host_header }}"
    validate_certs: false
    follow_redirects: none
    timeout: "{{ readiness_check_keycloak_readiness_timeout }}"
    status_code: [200, 301, 302, 307]
  register: _rc_keycloak_https_fallback
  changed_when: false
  failed_when: false
  when: "'name resolution' in ((_rc_keycloak_https.msg | default('')) | lower)"

- name: Add Keycloak HTTPS check to results
  ansible.builtin.set_fact:
    _readiness_results: >-
      {{ _readiness_results + [{
        'component': 'Keycloak',
        'check_name': 'OIDC well-known endpoint',
        'status': 'pass'
          if (_rc_keycloak_https.status | default(-1)) == 200
          else 'pass'
          if (_rc_keycloak_https_fallback is defined and (_rc_keycloak_https_fallback.status | default(-1)) in [200, 301, 302, 307])
          else 'warn'
          if ('name resolution' in ((_rc_keycloak_https.msg | default('')) | lower))
          else 'fail',
        'detail': 'HTTP ' + ((_rc_keycloak_https_fallback.status | default(-1)) | string) + ' via ingress fallback'
          if ('name resolution' in ((_rc_keycloak_https.msg | default('')) | lower)) and (_rc_keycloak_https_fallback is defined)
          else 'HTTP ' + ((_rc_keycloak_https.status | default(-1)) | string),
        'error': (_rc_keycloak_https.msg | default('')) + ' | ingress fallback HTTP ' + ((_rc_keycloak_https_fallback.status | default(-1)) | string)
          if ('name resolution' in ((_rc_keycloak_https.msg | default('')) | lower)) and (_rc_keycloak_https_fallback is defined)
          and (_rc_keycloak_https_fallback.status | default(-1)) not in [200, 301, 302, 307]
          else (_rc_keycloak_https.msg | default(''))
          if (_rc_keycloak_https.status | default(-1)) != 200
          else ''
      }] }}
  changed_when: false

- name: Prepare Keycloak admin API TLS trust bundle for realm user checks
  ansible.builtin.import_role:
    name: common
    tasks_from: prepare_internal_https_caller.yml
  vars:
    common_internal_https_kubeconfig_path: "{{ readiness_check_k3s_kubeconfig }}"
    common_internal_https_service_name: "{{ readiness_check_keycloak_service_name }}"
    common_internal_https_service_namespace: "{{ readiness_check_keycloak_namespace }}"
    common_internal_https_fqdn: "{{ readiness_check_keycloak_internal_fqdn }}"
    common_internal_https_openbao_cluster_addr: "{{ readiness_check_openbao_cluster_addr }}"
    common_internal_https_openbao_ca_secret_name: "{{ readiness_check_openbao_ca_secret_name }}"
    common_internal_https_ca_source_namespace: "{{ readiness_check_keycloak_ca_source_namespace }}"
    common_internal_https_bundle_path: "{{ readiness_check_keycloak_ca_bundle_path }}"
    common_internal_https_openbao_pki_mount: "{{ readiness_check_openbao_pki_internal_mount }}"
  when: (readiness_check_keycloak_realm_users | length) > 0

- name: Read Keycloak bootstrap admin credentials for realm user checks
  ansible.builtin.command:
    cmd: >-
      k3s kubectl get secret {{ readiness_check_keycloak_admin_secret_name }}
      -n {{ readiness_check_keycloak_namespace }}
      -o jsonpath={.data.{{ item }}}
  environment:
    KUBECONFIG: "{{ readiness_check_k3s_kubeconfig }}"
  loop: [username, password]
  register: _rc_keycloak_admin_creds_b64
  changed_when: false
  failed_when: false
  no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"
  when: (readiness_check_keycloak_realm_users | length) > 0

- name: Obtain Keycloak admin token for realm user checks
  ansible.builtin.uri:
    url: "https://{{ readiness_check_keycloak_internal_fqdn }}:8443/realms/master/protocol/openid-connect/token"
    method: POST
    body_format: form-urlencoded
    body:
      client_id: admin-cli
      username: "{{ _rc_keycloak_admin_creds_b64.results[0].stdout | b64decode }}"
      password: "{{ _rc_keycloak_admin_creds_b64.results[1].stdout | b64decode }}"
      grant_type: password
    ca_path: "{{ readiness_check_keycloak_ca_bundle_path }}"
    validate_certs: true
    status_code: 200
  register: _rc_keycloak_admin_token
  changed_when: false
  failed_when: false
  no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"
  when:
    - (readiness_check_keycloak_realm_users | length) > 0
    - (_rc_keycloak_admin_creds_b64.results | default([]) | selectattr('rc', 'defined') | rejectattr('rc', 'eq', 0) | list | length) == 0

- name: Check configured Keycloak realm users exist
  ansible.builtin.uri:
    url: "https://{{ readiness_check_keycloak_internal_fqdn }}:8443/admin/realms/{{ readiness_check_keycloak_realm }}/users?username={{ item.username }}&exact=true"
    method: GET
    headers:
      Authorization: "Bearer {{ _rc_keycloak_admin_token.json.access_token | default('') }}"
    ca_path: "{{ readiness_check_keycloak_ca_bundle_path }}"
    validate_certs: true
    status_code: 200
  loop: "{{ readiness_check_keycloak_realm_users }}"
  loop_control:
    label: "{{ item.username }}"
  register: _rc_keycloak_realm_users_lookup
  changed_when: false
  failed_when: false
  when:
    - (readiness_check_keycloak_realm_users | length) > 0
    - (_rc_keycloak_admin_token.status | default(-1)) == 200

- name: Add Keycloak realm user existence checks to results
  ansible.builtin.set_fact:
    _readiness_results: >-
      {{ _readiness_results + [{
        'component': 'Keycloak',
        'check_name': 'Realm user exists: ' + item.item.username,
        'status': 'pass' if ((item.status | default(-1)) == 200 and (item.json | default([]) | length) > 0) else 'fail',
        'detail': item.item.username,
        'error': (item.msg | default(''))
      }] }}
  loop: "{{ _rc_keycloak_realm_users_lookup.results | default([]) }}"
  loop_control:
    label: "{{ item.item.username }}"
  changed_when: false

- name: Check configured Keycloak realm user group memberships
  ansible.builtin.uri:
    url: >-
      https://{{ readiness_check_keycloak_internal_fqdn }}:8443/admin/realms/{{ readiness_check_keycloak_realm }}/users/{{ (item.json | first).id }}/groups?briefRepresentation=true&max=1000
    method: GET
    headers:
      Authorization: "Bearer {{ _rc_keycloak_admin_token.json.access_token | default('') }}"
    ca_path: "{{ readiness_check_keycloak_ca_bundle_path }}"
    validate_certs: true
    status_code: 200
  loop: "{{ _rc_keycloak_realm_users_lookup.results | default([]) }}"
  loop_control:
    label: "{{ item.item.username }}"
  register: _rc_keycloak_realm_users_groups
  changed_when: false
  failed_when: false
  when: (item.status | default(-1)) == 200 and (item.json | default([]) | length) > 0

- name: Add Keycloak realm user group membership checks to results
  ansible.builtin.set_fact:
    _readiness_results: >-
      {{ _readiness_results + [{
        'component': 'Keycloak',
        'check_name': 'Realm user groups: ' + item.item.item.username,
        'status': 'pass'
          if (((item.item.item.groups | default([])) | difference((item.json | default([]) | map(attribute='name') | list)) | length) == 0)
          else 'fail',
        'detail': 'expected=' + ((item.item.item.groups | default([])) | join(',')) + '; actual=' + ((item.json | default([]) | map(attribute='name') | list) | join(',')),
        'error': (item.msg | default(''))
      }] }}
  loop: "{{ _rc_keycloak_realm_users_groups.results | default([]) }}"
  loop_control:
    label: "{{ item.item.item.username }}"
  changed_when: false

- name: Prepare strict Keycloak internal TLS trust bundle
  ansible.builtin.import_role:
    name: common
    tasks_from: prepare_internal_https_caller.yml
  vars:
    common_internal_https_kubeconfig_path: "{{ readiness_check_k3s_kubeconfig }}"
    common_internal_https_service_name: "{{ readiness_check_keycloak_service_name }}"
    common_internal_https_service_namespace: "{{ readiness_check_keycloak_namespace }}"
    common_internal_https_fqdn: "{{ readiness_check_keycloak_internal_fqdn }}"
    common_internal_https_openbao_cluster_addr: "{{ readiness_check_openbao_cluster_addr }}"
    common_internal_https_openbao_ca_secret_name: "{{ readiness_check_openbao_ca_secret_name }}"
    common_internal_https_ca_source_namespace: "{{ readiness_check_keycloak_ca_source_namespace }}"
    common_internal_https_bundle_path: "{{ readiness_check_keycloak_ca_bundle_path }}"
    common_internal_https_openbao_pki_mount: "{{ readiness_check_openbao_pki_internal_mount }}"
  when: readiness_check_strict_tls_checks_enabled | bool

- name: Verify Keycloak internal OIDC endpoint with strict TLS validation
  ansible.builtin.uri:
    url: "{{ readiness_check_keycloak_internal_url }}"
    method: GET
    validate_certs: true
    ca_path: "{{ readiness_check_keycloak_ca_bundle_path }}"
    timeout: "{{ readiness_check_keycloak_readiness_timeout }}"
    status_code: 200
  register: _rc_keycloak_strict_tls
  changed_when: false
  failed_when: false
  when: readiness_check_strict_tls_checks_enabled | bool

- name: Add Keycloak strict TLS trust check to results
  ansible.builtin.set_fact:
    _readiness_results: >-
      {{ _readiness_results + [{
        'component': 'Keycloak',
        'check_name': 'Internal OIDC endpoint strict TLS trust',
        'status': 'pass' if (_rc_keycloak_strict_tls.status | default(-1)) == 200 else 'fail',
        'detail': 'HTTP ' + ((_rc_keycloak_strict_tls.status | default(-1)) | string) + ' via ' + readiness_check_keycloak_internal_url,
        'error': (_rc_keycloak_strict_tls.msg | default(''))
      }] }}
  changed_when: false
  when: readiness_check_strict_tls_checks_enabled | bool

- name: Read Keycloak DB URL configuration from CR
  ansible.builtin.command: >-
    k3s kubectl get keycloak {{ readiness_check_keycloak_cr_name }}
    -n {{ readiness_check_keycloak_namespace }}
    -o jsonpath='{.spec.db.url}'
  environment:
    KUBECONFIG: "{{ readiness_check_k3s_kubeconfig }}"
  register: _rc_keycloak_db_url
  changed_when: false
  failed_when: false
  when: readiness_check_keycloak_pg_tls_enabled | bool

- name: Add Keycloak DB verify-full URL check to results
  ansible.builtin.set_fact:
    _readiness_results: >-
      {{ _readiness_results + [{
        'component': 'Keycloak',
        'check_name': 'DB URL enforces verify-full TLS mode',
        'status': 'pass' if ('sslmode=' + readiness_check_keycloak_pg_verify_mode) in (_rc_keycloak_db_url.stdout | default('')) else 'fail',
        'detail': (_rc_keycloak_db_url.stdout | default('missing db.url in Keycloak CR')),
        'error': ''
      }] }}
  changed_when: false
  when: readiness_check_keycloak_pg_tls_enabled | bool

- name: Add Keycloak DB hostname verification target check to results
  ansible.builtin.set_fact:
    _readiness_results: >-
      {{ _readiness_results + [{
        'component': 'Keycloak',
        'check_name': 'DB URL host matches Postgres TLS SAN FQDN',
        'status': 'pass' if readiness_check_keycloak_pg_service_fqdn in (_rc_keycloak_db_url.stdout | default('')) else 'fail',
        'detail': readiness_check_keycloak_pg_service_fqdn,
        'error': ''
      }] }}
  changed_when: false
  when: readiness_check_keycloak_pg_tls_enabled | bool

- name: Check PostgreSQL server TLS setting inside Postgres pod
  ansible.builtin.command: >-
    k3s kubectl exec statefulset/{{ readiness_check_keycloak_pg_statefulset_name }}
    -n {{ readiness_check_keycloak_namespace }}
    -- sh -ec "psql -U '{{ readiness_check_keycloak_db_username }}' -d '{{ readiness_check_keycloak_db_name }}' -tAc 'SHOW ssl;'"
  environment:
    KUBECONFIG: "{{ readiness_check_k3s_kubeconfig }}"
  register: _rc_postgres_ssl_setting
  changed_when: false
  failed_when: false
  when: readiness_check_keycloak_pg_tls_enabled | bool

- name: Add PostgreSQL TLS enabled check to results
  ansible.builtin.set_fact:
    _readiness_results: >-
      {{ _readiness_results + [{
        'component': 'Keycloak',
        'check_name': 'PostgreSQL TLS negotiation enabled',
        'status': 'pass' if (_rc_postgres_ssl_setting.stdout | default('') | trim) == 'on' else 'fail',
        'detail': 'SHOW ssl=' + (_rc_postgres_ssl_setting.stdout | default('unknown') | trim),
        'error': (_rc_postgres_ssl_setting.stderr | default(''))
      }] }}
  changed_when: false
  when: readiness_check_keycloak_pg_tls_enabled | bool
