---
- name: Resolve ARMORY_BUILD_DEBUG flag
  ansible.builtin.set_fact:
    armory_build_debug: "{{ (lookup('ansible.builtin.env', 'ARMORY_BUILD_DEBUG') | default('false', true)) | bool }}"
    armory_log_nolog: "{{ (lookup('ansible.builtin.env', 'ARMORY_LOG_NOLOG') | default('false', true)) | bool }}"
  changed_when: false

- name: Debug logging controls for readiness role
  ansible.builtin.debug:
    msg:
      - "Role: readiness_check"
      - "ARMORY_BUILD_DEBUG: {{ armory_build_debug | default(false) | bool }}"
      - "ARMORY_LOG_NOLOG: {{ armory_log_nolog | default(false) | bool }}"
      - "Sensitive task redaction enabled: {{ not (armory_log_nolog | default(false) | bool) }}"
  when: armory_build_debug | default(false) | bool

- name: Run readiness checks with diagnostics
  tags: [readiness, readiness_check, post_deploy]
  block:
    - name: Initialize readiness check result aggregator
      ansible.builtin.set_fact:
        _readiness_results: []
        _readiness_failed_components: []
      changed_when: false

    - name: Debug initialize task
      ansible.builtin.debug:
        msg:
          - "Task: Initialize readiness check result aggregator"
          - "Result container ready: {{ _readiness_results is defined }}"
      when: armory_build_debug | default(false) | bool

    # ── Component checks (subtask imports) ────────────────────────────────

    - name: Check host readiness
      ansible.builtin.include_tasks: check_host.yml
      when: readiness_check_host_enabled | default(true) | bool

    - name: Check k3s readiness
      ansible.builtin.include_tasks: check_k3s.yml
      when: readiness_check_k3s_enabled | default(true) | bool

    - name: Check Helm readiness
      ansible.builtin.include_tasks: check_helm.yml
      when: readiness_check_helm_enabled | default(true) | bool

    - name: Check OpenBao readiness
      ansible.builtin.include_tasks: check_openbao.yml
      when: readiness_check_openbao_enabled | default(true) | bool

    - name: Check VSO readiness
      ansible.builtin.include_tasks: check_vso.yml
      when: readiness_check_vso_enabled | default(true) | bool

    - name: Check nginx ingress readiness
      ansible.builtin.include_tasks: check_nginx.yml
      when: readiness_check_nginx_enabled | default(true) | bool

    - name: Check BeeAI readiness
      ansible.builtin.include_tasks: check_beeai.yml
      when: readiness_check_beeai_enabled | default(true) | bool

    - name: Check Headlamp readiness
      ansible.builtin.include_tasks: check_headlamp.yml
      when: readiness_check_headlamp_enabled | default(true) | bool

    # ── Report and fail decision ─────────────────────────────────────────

    - name: Render readiness report
      ansible.builtin.set_fact:
        _readiness_report: "{{ lookup('template', 'readiness_report.j2') }}"
      changed_when: false

    - name: Display readiness report
      ansible.builtin.debug:
        msg: "{{ _readiness_report.split('\n') }}"
      changed_when: false

    - name: Determine overall readiness status
      ansible.builtin.set_fact:
        _readiness_has_failures: "{{ _readiness_results | selectattr('status', 'equalto', 'fail') | list | length > 0 }}"
        _readiness_total_checks: "{{ _readiness_results | length }}"
      changed_when: false

    - name: Debug readiness summary
      ansible.builtin.debug:
        msg:
          - "Readiness check complete"
          - "Total checks: {{ _readiness_total_checks }}"
          - "Failed checks: {{ _readiness_results | selectattr('status', 'equalto', 'fail') | list | length }}"
          - "Warned checks: {{ _readiness_results | selectattr('status', 'equalto', 'warn') | list | length }}"
          - "Passed checks: {{ _readiness_results | selectattr('status', 'equalto', 'pass') | list | length }}"
      when: armory_build_debug | default(false) | bool

    - name: Fail if issues detected and fail_on_issues enabled
      ansible.builtin.fail:
        msg: |
          Readiness checks detected critical issues (see report above).
          Set readiness_check_fail_on_issues=false to continue despite failures,
          or set ARMORY_BUILD_DEBUG=true for more detailed diagnostics.
      when:
        - _readiness_has_failures | bool
        - readiness_check_fail_on_issues | default(true) | bool

  rescue:
    - name: Debug readiness check failure context
      ansible.builtin.debug:
        msg:
          - "Role: readiness_check"
          - "Failure task: {{ ansible_failed_task.name | default('unknown') }}"
          - "Failure message: {{ ansible_failed_result.msg | default('n/a') }}"
          - "Failure rc: {{ ansible_failed_result.rc | default('n/a') }}"
          - "Failure cmd: {{ ansible_failed_result.cmd | default('n/a') }}"
          - "Failure stderr: {{ ansible_failed_result.stderr | default('n/a') }}"
          - "Failure stdout: {{ ansible_failed_result.stdout | default('n/a') }}"
          - "Failure exception: {{ ansible_failed_result.exception | default('n/a') }}"
      when: armory_build_debug | default(false) | bool

    - name: Fail readiness check flow with context
      ansible.builtin.fail:
        msg: >-
          readiness_check role failed at '{{ ansible_failed_task.name | default('unknown') }}'.
          Set ARMORY_BUILD_DEBUG=true for companion diagnostics.
