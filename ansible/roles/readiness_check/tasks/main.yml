---
- name: Resolve ARMORY_LOG_NOLOG flag
  ansible.builtin.set_fact:
    armory_log_nolog: "{{ (lookup('ansible.builtin.env', 'ARMORY_LOG_NOLOG') | default('false', true)) | bool }}"
  changed_when: false

- name: Run readiness checks with diagnostics
  tags: [readiness, readiness_check, post_deploy]
  block:
    - name: Initialize readiness check result aggregator
      ansible.builtin.set_fact:
        _readiness_results: []
        _readiness_failed_components: []
      changed_when: false

    - name: Check host readiness
      ansible.builtin.include_tasks: check_host.yml
      when: readiness_check_host_enabled | default(true) | bool

    - name: Check k3s readiness
      ansible.builtin.include_tasks: check_k3s.yml
      when: readiness_check_k3s_enabled | default(true) | bool

    - name: Check Helm readiness
      ansible.builtin.include_tasks: check_helm.yml
      when: readiness_check_helm_enabled | default(true) | bool

    - name: Check OpenBao readiness
      ansible.builtin.include_tasks: check_openbao.yml
      when: readiness_check_openbao_enabled | default(true) | bool

    - name: Check OpenBao UI readiness
      ansible.builtin.include_tasks: check_openbao_ui.yml
      when:
        - readiness_check_openbao_enabled | default(true) | bool
        - readiness_check_openbao_ui_enabled | default(false) | bool

    - name: Check VSO readiness
      ansible.builtin.include_tasks: check_vso.yml
      when: readiness_check_vso_enabled | default(true) | bool

    - name: Check nginx ingress readiness
      ansible.builtin.include_tasks: check_nginx.yml
      when: readiness_check_nginx_enabled | default(true) | bool

    - name: Check Keycloak readiness
      ansible.builtin.include_tasks: check_keycloak.yml
      when: readiness_check_keycloak_enabled | default(false) | bool

    - name: Check Headlamp readiness
      ansible.builtin.include_tasks: check_headlamp.yml
      when: readiness_check_headlamp_enabled | default(true) | bool

    # ── Report and fail decision ─────────────────────────────────────────

    - name: Render readiness report
      ansible.builtin.set_fact:
        _readiness_report: "{{ lookup('template', 'readiness_report.j2') }}"
      changed_when: false

    - name: Determine overall readiness status
      ansible.builtin.set_fact:
        _readiness_has_failures: "{{ _readiness_results | selectattr('status', 'equalto', 'fail') | list | length > 0 }}"
        _readiness_total_checks: "{{ _readiness_results | length }}"
      changed_when: false

    - name: Print readiness report
      ansible.builtin.debug:
        msg: "{{ _readiness_report.splitlines() }}"

    - name: Fail if issues detected and fail_on_issues enabled
      ansible.builtin.fail:
        msg: |
          Readiness checks detected critical issues (see report above).
          Set readiness_check_fail_on_issues=false to continue despite failures,
      when:
        - _readiness_has_failures | bool
        - readiness_check_fail_on_issues | default(true) | bool
