---
# readiness_check/tasks/check_nginx.yml
# Validate nginx ingress controller and TLS certificates

- name: Check nginx ingress controller pods running
  ansible.builtin.command: >-
    k3s kubectl get pods -n {{ readiness_check_nginx_namespace }}
    -l {{ readiness_check_nginx_controller_label }}
    --field-selector=status.phase=Running
    --no-headers
  environment:
    KUBECONFIG: "{{ readiness_check_k3s_kubeconfig }}"
  register: _rc_nginx_pods
  changed_when: false
  failed_when: false

- name: Add nginx controller pods check to results
  ansible.builtin.set_fact:
    _readiness_results: >-
      {{ _readiness_results + [{
        'component': 'nginx ingress',
        'check_name': 'Controller pods running',
        'status': 'pass' if (_rc_nginx_pods.stdout_lines | length) > 0 else 'fail',
        'detail': (_rc_nginx_pods.stdout_lines | length | string) + ' pods running',
        'error': ''
      }] }}
  changed_when: false

- name: Check ingress rules for public domain
  ansible.builtin.command: >-
    k3s kubectl get ingress -n {{ readiness_check_ingress_tls_namespace }}
    -o jsonpath='{range .items[*]}{range .spec.rules[*]}{.host}{"\n"}{end}{end}'
  environment:
    KUBECONFIG: "{{ readiness_check_k3s_kubeconfig }}"
  register: _rc_nginx_ingress_rules
  changed_when: false
  failed_when: false

- name: Add ingress rules check to results
  ansible.builtin.set_fact:
    _readiness_results: >-
      {{ _readiness_results + [{
        'component': 'nginx ingress',
        'check_name': 'Public ingress rules present',
        'status': 'pass' if readiness_check_public_domain in (_rc_nginx_ingress_rules.stdout_lines | default([])) else 'warn',
        'detail': (_rc_nginx_ingress_rules.stdout_lines | select('equalto', readiness_check_public_domain) | list | length | string) + ' ingress rules for ' + readiness_check_public_domain,
        'error': ''
      }] }}
  changed_when: false

- name: Check TLS secret for ingress
  ansible.builtin.command: >-
    k3s kubectl get secret -n {{ readiness_check_ingress_tls_namespace }}
    -o jsonpath='{range .items[?(@.type=="kubernetes.io/tls")]}{.metadata.name}{"\n"}{end}'
  environment:
    KUBECONFIG: "{{ readiness_check_k3s_kubeconfig }}"
  register: _rc_nginx_tls_secrets
  changed_when: false
  failed_when: false

- name: Add TLS secrets check to results
  ansible.builtin.set_fact:
    _readiness_results: >-
      {{ _readiness_results + [{
        'component': 'nginx ingress',
        'check_name': 'TLS secrets configured',
        'status': 'pass' if (_rc_nginx_tls_secrets.stdout_lines | length) > 0 else 'warn',
        'detail': (_rc_nginx_tls_secrets.stdout_lines | length | string) + ' TLS secrets found',
        'error': ''
      }] }}
  changed_when: false

- name: Check OpenBao external ClusterIssuer readiness
  ansible.builtin.command: >-
    k3s kubectl get clusterissuer {{ readiness_check_openbao_external_clusterissuer_name }}
    -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
  environment:
    KUBECONFIG: "{{ readiness_check_k3s_kubeconfig }}"
  register: _rc_openbao_external_clusterissuer_ready
  changed_when: false
  failed_when: false

- name: Add OpenBao external ClusterIssuer readiness check to results
  ansible.builtin.set_fact:
    _readiness_results: >-
      {{ _readiness_results + [{
        'component': 'nginx ingress',
        'check_name': 'OpenBao external ClusterIssuer ready',
        'status': 'pass' if (_rc_openbao_external_clusterissuer_ready.stdout | trim) == 'True' else 'fail',
        'detail': 'Ready=' + (_rc_openbao_external_clusterissuer_ready.stdout | default('unknown') | trim),
        'error': _rc_openbao_external_clusterissuer_ready.stderr | default('')
      }] }}
  changed_when: false

- name: Check OpenBao internal ClusterIssuer readiness
  ansible.builtin.command: >-
    k3s kubectl get clusterissuer {{ readiness_check_openbao_internal_clusterissuer_name }}
    -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
  environment:
    KUBECONFIG: "{{ readiness_check_k3s_kubeconfig }}"
  register: _rc_openbao_internal_clusterissuer_ready
  changed_when: false
  failed_when: false

- name: Add OpenBao internal ClusterIssuer readiness check to results
  ansible.builtin.set_fact:
    _readiness_results: >-
      {{ _readiness_results + [{
        'component': 'nginx ingress',
        'check_name': 'OpenBao internal ClusterIssuer ready',
        'status': 'pass' if (_rc_openbao_internal_clusterissuer_ready.stdout | trim) == 'True' else 'fail',
        'detail': 'Ready=' + (_rc_openbao_internal_clusterissuer_ready.stdout | default('unknown') | trim),
        'error': _rc_openbao_internal_clusterissuer_ready.stderr | default('')
      }] }}
  changed_when: false

- name: Collect ingress certificate rotation fields
  ansible.builtin.command: >-
    k3s kubectl get certificate {{ readiness_check_ingress_tls_certificate_name }}
    -n {{ readiness_check_ingress_tls_namespace }}
    -o jsonpath='{.spec.duration}|{.spec.renewBefore}|{.status.renewalTime}|{.status.conditions[?(@.type=="Ready")].status}'
  environment:
    KUBECONFIG: "{{ readiness_check_k3s_kubeconfig }}"
  register: _rc_ingress_certificate_rotation
  changed_when: false
  failed_when: false

- name: Add ingress certificate rotation posture check to results
  ansible.builtin.set_fact:
    _readiness_results: >-
      {{ _readiness_results + [{
        'component': 'nginx ingress',
        'check_name': 'Ingress cert-manager rotation configured',
        'status': (
          'pass' if (
            _rc_ingress_certificate_rotation.stdout | trim | length > 0 and
            (_rc_ingress_certificate_rotation.stdout.split('|') | length) == 4 and
            (_rc_ingress_certificate_rotation.stdout.split('|')[0] | trim | length) > 0 and
            (_rc_ingress_certificate_rotation.stdout.split('|')[1] | trim | length) > 0 and
            (_rc_ingress_certificate_rotation.stdout.split('|')[2] | trim | length) > 0 and
            (_rc_ingress_certificate_rotation.stdout.split('|')[3] | trim) == 'True'
          ) else 'fail'
        ),
        'detail': _rc_ingress_certificate_rotation.stdout | default('missing certificate data'),
        'error': _rc_ingress_certificate_rotation.stderr | default('')
      }] }}
  changed_when: false
