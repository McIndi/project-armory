---
# readiness_check/tasks/check_k3s.yml
# Validate k3s cluster health: node status, apiserver, service status

- name: Check k3s nodes ready
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Node
    kubeconfig: "{{ _readiness_kubeconfig_path }}"
  register: _rc_k3s_nodes
  changed_when: false
  failed_when: false

- name: Build k3s node readiness status list
  ansible.builtin.set_fact:
    _rc_k3s_nodes_ready_statuses: >-
      {{ (_rc_k3s_nodes_ready_statuses | default([])) + [
        (
          item.status.conditions
          | default([])
          | selectattr('type', 'equalto', 'Ready')
          | map(attribute='status')
          | first
          | default('Unknown')
        )
      ] }}
  loop: "{{ _rc_k3s_nodes.resources | default([]) }}"
  changed_when: false

- name: Add k3s nodes check to results
  ansible.builtin.set_fact:
    _readiness_results: >-
      {{ _readiness_results + [{
        'component': 'k3s',
        'check_name': 'Cluster nodes ready',
        'status': 'pass'
          if ((_rc_k3s_nodes.resources | default([]) | length) > 0
              and ((_rc_k3s_nodes_ready_statuses | default([])) | select('equalto', 'True') | list | length)
                  == (_rc_k3s_nodes.resources | default([]) | length))
          else 'fail',
        'detail': ((_rc_k3s_nodes_ready_statuses | default([])) | join(' '))
          if (_rc_k3s_nodes.resources | default([]) | length) > 0 else 'no nodes',
        'error': _rc_k3s_nodes.msg | default('')
      }] }}
  changed_when: false

- name: Check kube-apiserver accessibility
  ansible.builtin.command: >-
    k3s kubectl cluster-info
  environment:
    KUBECONFIG: "{{ _readiness_kubeconfig_path }}"
  register: _rc_k3s_apiserver
  changed_when: false
  failed_when: false

- name: Add kube-apiserver check to results
  ansible.builtin.set_fact:
    _readiness_results: >-
      {{ _readiness_results + [{
        'component': 'k3s',
        'check_name': 'Kubernetes API server accessible',
        'status': 'pass' if _rc_k3s_apiserver.rc == 0 else 'fail',
        'detail': 'API server responding' if _rc_k3s_apiserver.rc == 0 else 'not responding',
        'error': _rc_k3s_apiserver.stderr | default('')
      }] }}
  changed_when: false

- name: Check kube-system pods running
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Pod
    namespace: kube-system
    kubeconfig: "{{ _readiness_kubeconfig_path }}"
  register: _rc_k3s_kube_system_pods_info
  changed_when: false
  failed_when: false

- name: Build list of kube-system pods not running
  ansible.builtin.set_fact:
    _rc_k3s_kube_system_not_running: >-
      {{
        (_rc_k3s_kube_system_pods_info.resources | default([]))
        | rejectattr('status.phase', 'equalto', 'Running')
        | map(attribute='metadata.name')
        | list
      }}
  changed_when: false

- name: Add kube-system pods check to results
  ansible.builtin.set_fact:
    _readiness_results: >-
      {{ _readiness_results + [{
        'component': 'k3s',
        'check_name': 'kube-system pods running',
        'status': 'pass' if (_rc_k3s_kube_system_not_running | length) == 0 else 'warn',
        'detail': 'All kube-system pods running' if (_rc_k3s_kube_system_not_running | length) == 0 else ((_rc_k3s_kube_system_not_running | length | string) + ' pods not running'),
        'error': _rc_k3s_kube_system_pods_info.msg | default('')
      }] }}
  changed_when: false

- name: Check k3s service status
  ansible.builtin.command: sudo systemctl status k3s
  register: _rc_k3s_service
  changed_when: false
  failed_when: false

- name: Add k3s service check to results
  ansible.builtin.set_fact:
    _readiness_results: >-
      {{ _readiness_results + [{
        'component': 'k3s',
        'check_name': 'k3s service running',
        'status': 'pass' if _rc_k3s_service.rc == 0 and 'active (running)' in _rc_k3s_service.stdout else 'fail',
        'detail': 'running' if _rc_k3s_service.rc == 0 else 'not running',
        'error': ''
      }] }}
  changed_when: false
