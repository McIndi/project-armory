---
# readiness_check/tasks/check_k3s.yml
# Validate k3s cluster health: node status, apiserver, service status

- name: Check k3s nodes ready
  ansible.builtin.command: >-
    k3s kubectl get nodes -o jsonpath='{.items[*].status.conditions[?(@.type=="Ready")].status}'
  environment:
    KUBECONFIG: "{{ readiness_check_k3s_kubeconfig }}"
  register: _rc_k3s_nodes_ready
  changed_when: false
  failed_when: false

- name: Add k3s nodes check to results
  ansible.builtin.set_fact:
    _readiness_results: >-
      {{ _readiness_results + [{
        'component': 'k3s',
        'check_name': 'Cluster nodes ready',
        'status': 'pass' if (_rc_k3s_nodes_ready.stdout | trim | length) > 0 and 'False' not in _rc_k3s_nodes_ready.stdout else 'fail',
        'detail': (_rc_k3s_nodes_ready.stdout | trim) if (_rc_k3s_nodes_ready.stdout | trim | length) > 0 else 'no nodes',
        'error': ''
      }] }}
  changed_when: false

- name: Check kube-apiserver accessibility
  ansible.builtin.command: >-
    k3s kubectl cluster-info
  environment:
    KUBECONFIG: "{{ readiness_check_k3s_kubeconfig }}"
  register: _rc_k3s_apiserver
  changed_when: false
  failed_when: false

- name: Add kube-apiserver check to results
  ansible.builtin.set_fact:
    _readiness_results: >-
      {{ _readiness_results + [{
        'component': 'k3s',
        'check_name': 'Kubernetes API server accessible',
        'status': 'pass' if _rc_k3s_apiserver.rc == 0 else 'fail',
        'detail': 'API server responding' if _rc_k3s_apiserver.rc == 0 else 'not responding',
        'error': _rc_k3s_apiserver.stderr | default('')
      }] }}
  changed_when: false

- name: Check kube-system pods running
  ansible.builtin.command: >-
    k3s kubectl get pods -n kube-system
    -o jsonpath='{range .items[?(@.status.phase!="Running")]}{.metadata.name}{"\n"}{end}'
  environment:
    KUBECONFIG: "{{ readiness_check_k3s_kubeconfig }}"
  register: _rc_k3s_kube_system_pods
  changed_when: false
  failed_when: false

- name: Add kube-system pods check to results
  ansible.builtin.set_fact:
    _readiness_results: >-
      {{ _readiness_results + [{
        'component': 'k3s',
        'check_name': 'kube-system pods running',
        'status': 'pass' if (_rc_k3s_kube_system_pods.stdout_lines | length) == 0 else 'warn',
        'detail': 'All kube-system pods running' if (_rc_k3s_kube_system_pods.stdout_lines | length) == 0 else ((_rc_k3s_kube_system_pods.stdout_lines | length | string) + ' pods not running'),
        'error': ''
      }] }}
  changed_when: false

- name: Check k3s service status
  ansible.builtin.command: sudo systemctl status k3s
  register: _rc_k3s_service
  changed_when: false
  failed_when: false

- name: Add k3s service check to results
  ansible.builtin.set_fact:
    _readiness_results: >-
      {{ _readiness_results + [{
        'component': 'k3s',
        'check_name': 'k3s service running',
        'status': 'pass' if _rc_k3s_service.rc == 0 and 'active (running)' in _rc_k3s_service.stdout else 'fail',
        'detail': 'running' if _rc_k3s_service.rc == 0 else 'not running',
        'error': ''
      }] }}
  changed_when: false

- name: Debug k3s checks
  ansible.builtin.debug:
    msg:
      - "k3s checks aggregated: {{ _readiness_results | selectattr('component', 'equalto', 'k3s') | list | length }} checks"
  when: armory_build_debug | default(false) | bool
