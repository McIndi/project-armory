---
# Base directory used by this role for generated files and local state.
openbao_work_dir: /opt/openbao

# File that stores initialization output (unseal keys and root token metadata).
# Related to openbao_work_dir and consumed by follow-up tasks.
openbao_init_keys_file: "{{ openbao_work_dir }}/init-keys.yml"

# Vault password file used to encrypt/decrypt local vaulted artifacts.
openbao_vault_pass_file: "{{ openbao_work_dir }}/.vault-pass"

# Kubernetes namespace where OpenBao is deployed.
openbao_namespace: openbao

# Helm release name for the OpenBao chart.
# Keep stable unless you intentionally deploy multiple releases.
openbao_release_name: openbao

# Helm repository URL containing the OpenBao chart.
openbao_chart_repo: https://openbao.github.io/openbao-helm

# Chart name in the repository.
openbao_chart_name: openbao

# Chart version to install.
# Empty string allows Helm to resolve the latest available version.
openbao_chart_version: ""

# Timeout for initial pod startup wait checks.
# Accepts duration strings supported by kubectl/Ansible wait operations.
openbao_startup_wait_timeout: 300s

# Timeout for readiness checks before init/unseal/configure steps.
openbao_ready_wait_timeout: 600s

# Readiness probe tuning to avoid tight retry loops on slow VMs.
openbao_readiness_period_seconds: 10
openbao_readiness_timeout_seconds: 10
openbao_readiness_failure_threshold: 6

# Legacy NodePort that older installs may still have opened in firewalld.
# Kept only so the role can remove the obsolete public firewall opening.
openbao_node_port: 32200

# OpenBao server TLS settings.
openbao_tls_enabled: true
openbao_tls_server_name: openbao.openbao.svc.cluster.local
openbao_tls_secret_name: openbao-server-tls
openbao_tls_ca_secret_name: openbao-ca
openbao_tls_cert_common_name: "OpenBao Server"
openbao_tls_ca_common_name: OpenBao-Internal-CA
openbao_tls_cert_validity_days: 3650
openbao_tls_cert_mount_path: /openbao/tls
openbao_tls_cert_file_path: "{{ openbao_tls_cert_mount_path }}/tls.crt"
openbao_tls_key_file_path: "{{ openbao_tls_cert_mount_path }}/tls.key"
openbao_tls_artifacts_dir: "{{ openbao_work_dir }}/tls"
openbao_tls_ca_key_host_path: "{{ openbao_tls_artifacts_dir }}/ca.key"
openbao_tls_key_host_path: "{{ openbao_tls_artifacts_dir }}/tls.key"
openbao_tls_cert_host_path: "{{ openbao_tls_artifacts_dir }}/tls.crt"
openbao_tls_ca_host_path: "{{ openbao_tls_artifacts_dir }}/ca.crt"
openbao_tls_csr_host_path: "{{ openbao_tls_artifacts_dir }}/tls.csr"
openbao_tls_ca_serial_host_path: "{{ openbao_tls_artifacts_dir }}/ca.srl"
openbao_tls_openssl_config_path: "{{ openbao_tls_artifacts_dir }}/openssl.cnf"
openbao_tls_sans:
  - DNS:openbao
  - DNS:openbao.openbao
  - DNS:openbao.openbao.svc
  - DNS:openbao.openbao.svc.cluster.local
  - DNS:localhost
  - IP:127.0.0.1

# API URL used by Ansible tasks running on the VM host.
# The role maps openbao_tls_server_name to the Service ClusterIP in /etc/hosts
# so host-side automation can use the in-cluster TLS endpoint without a NodePort.
openbao_api_addr: "https://{{ openbao_tls_server_name }}:8200"

# In-cluster service URL used by cert-manager, VSO, and application workloads.
# Must align with service/namespace naming in this role.
openbao_cluster_addr: "https://{{ openbao_tls_server_name }}:8200"

# Number of key shares generated during initialization.
# Must be greater than or equal to openbao_key_threshold.
openbao_key_shares: 5

# Minimum number of shares required to unseal OpenBao.
# Must be less than or equal to openbao_key_shares.
openbao_key_threshold: 3

# Mount path for KV secrets engine (used for application credentials).
openbao_kv_mount: secret

# Mount path for PKI secrets engine (used for certificate issuance).
openbao_pki_mount: pki

# Common name for the root certificate authority generated in PKI setup.
openbao_pki_common_name: "Armory Root CA"

# Root CA validity period.
# Default 87600h is approximately 10 years.
openbao_pki_ttl: "87600h"

# Role name used for issuing service/ingress certificates from PKI.
openbao_pki_cert_role: "{{ (lookup('ansible.builtin.env', 'ARMORY_PUBLIC_DOMAIN') | default('armory.local', true)) | replace('.', '-dot-') }}"

# Extra internal DNS suffixes allowed for in-cluster service certificates.
openbao_pki_internal_allowed_domains: "{{ lookup('ansible.builtin.env', 'ARMORY_INTERNAL_PKI_ALLOWED_DOMAINS') | default('svc.cluster.local', true) }}"

# Allowed DNS domain suffix for issued certificates.
openbao_pki_allowed_domains: "{{ (lookup('ansible.builtin.env', 'ARMORY_PUBLIC_DOMAIN') | default('armory.local', true)) ~ ',' ~ openbao_pki_internal_allowed_domains }}"

# Default leaf certificate validity period.
# Default 8760h is approximately 1 year.
openbao_pki_cert_ttl: "8760h"

# Namespace where BeeAI workloads run.
# Must match beeai_tofu_namespace in beeai_agentstack_tofu defaults.
openbao_beeai_namespace: agentstack

# Service account in BeeAI namespace used for VSO authentication to OpenBao.
# Must match beeai_openbao_vso_sa_name in beeai_agentstack_tofu defaults.
openbao_vso_sa_name: beeai-vso

# Namespace where cert-manager runs.
openbao_certmanager_namespace: cert-manager

# cert-manager service account bound to OpenBao Kubernetes auth role.
openbao_certmanager_sa_name: cert-manager

# Whether this role manages firewalld rules for OpenBao access.
# Disable if firewall is managed externally.
openbao_firewall_manage: true

# firewalld zone used when firewall management is enabled.
openbao_firewall_zone: public


# When true, disables Ansible no_log redaction for sensitive tasks.
# WARNING: Enabling this will print secrets/tokens into logs and output.
armory_log_nolog: "{{ lookup('ansible.builtin.env', 'ARMORY_LOG_NOLOG') | default('false', true) | bool }}"
