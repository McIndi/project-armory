---
# configure.yml — Idempotent setup of secrets engines, PKI, Kubernetes auth,
# and policies. Safe to re-run on every Ansible execution.

- name: Configure OpenBao with diagnostics
  block:
    - name: Get current secret mounts
      ansible.builtin.uri:
        url: "{{ openbao_api_addr }}/v1/sys/mounts"
        method: GET
        headers:
          X-Vault-Token: "{{ openbao_root_token }}"
        status_code: 200
      register: _openbao_secret_mounts
      no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"
      when: not ansible_check_mode

    - name: Get current auth methods
      ansible.builtin.uri:
        url: "{{ openbao_api_addr }}/v1/sys/auth"
        method: GET
        headers:
          X-Vault-Token: "{{ openbao_root_token }}"
        status_code: 200
      register: _openbao_auth_mounts
      no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"
      when: not ansible_check_mode

    - name: Enable KV v2 secrets engine
      ansible.builtin.uri:
        url: "{{ openbao_api_addr }}/v1/sys/mounts/{{ openbao_kv_mount }}"
        method: POST
        headers:
          X-Vault-Token: "{{ openbao_root_token }}"
        body_format: json
        body:
          type: kv
          options:
            version: "2"
        status_code: [200, 204]
      register: _openbao_enable_kv_result
      no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"
      when:
        - not ansible_check_mode
        - "(openbao_kv_mount + '/') not in (_openbao_secret_mounts.json | default({}))"

    - name: Check whether init keys are already stored in OpenBao KV
      ansible.builtin.uri:
        url: "{{ openbao_api_addr }}/v1/{{ openbao_kv_mount }}/metadata/openbao/init"
        method: GET
        headers:
          X-Vault-Token: "{{ openbao_root_token }}"
        status_code: [200, 404]
      register: _openbao_init_kv_check
      no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"
      when: not ansible_check_mode

    - name: Write init keys to OpenBao KV for audited human retrieval
      ansible.builtin.uri:
        url: "{{ openbao_api_addr }}/v1/{{ openbao_kv_mount }}/data/openbao/init"
        method: POST
        headers:
          X-Vault-Token: "{{ openbao_root_token }}"
        body_format: json
        body:
          data:
            unseal_keys: "{{ openbao_unseal_keys }}"
            root_token: "{{ openbao_root_token }}"
        status_code: [200, 204]
      register: _openbao_write_init_kv_result
      no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"
      when:
        - not ansible_check_mode
        - _openbao_init_kv_check.status | default(404) == 404
        - openbao_unseal_keys is defined

    - name: Enable PKI secrets engine
      ansible.builtin.uri:
        url: "{{ openbao_api_addr }}/v1/sys/mounts/{{ openbao_pki_mount }}"
        method: POST
        headers:
          X-Vault-Token: "{{ openbao_root_token }}"
        body_format: json
        body:
          type: pki
          config:
            max_lease_ttl: "{{ openbao_pki_ttl }}"
        status_code: [200, 204]
      register: _openbao_enable_pki_result
      no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"
      when:
        - not ansible_check_mode
        - "(openbao_pki_mount + '/') not in (_openbao_secret_mounts.json | default({}))"

    - name: Check whether PKI root CA already exists
      ansible.builtin.uri:
        url: "{{ openbao_api_addr }}/v1/{{ openbao_pki_mount }}/cert/ca"
        method: GET
        headers:
          X-Vault-Token: "{{ openbao_root_token }}"
        status_code: [200, 204, 400, 404]
      register: _openbao_pki_ca_check
      no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"
      when: not ansible_check_mode

    - name: Generate PKI root CA
      ansible.builtin.uri:
        url: "{{ openbao_api_addr }}/v1/{{ openbao_pki_mount }}/root/generate/internal"
        method: POST
        headers:
          X-Vault-Token: "{{ openbao_root_token }}"
        body_format: json
        body:
          common_name: "{{ openbao_pki_common_name }}"
          ttl: "{{ openbao_pki_ttl }}"
          key_type: rsa
          key_bits: 4096
        status_code: [200, 204]
      register: _openbao_generate_ca_result
      no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"
      when:
        - not ansible_check_mode
        - (_openbao_pki_ca_check.status | default(404)) in [400, 404]

    - name: Configure PKI issuing and CRL URLs
      ansible.builtin.uri:
        url: "{{ openbao_api_addr }}/v1/{{ openbao_pki_mount }}/config/urls"
        method: POST
        headers:
          X-Vault-Token: "{{ openbao_root_token }}"
        body_format: json
        body:
          issuing_certificates: "{{ openbao_cluster_addr }}/v1/{{ openbao_pki_mount }}/ca"
          crl_distribution_points: "{{ openbao_cluster_addr }}/v1/{{ openbao_pki_mount }}/crl"
        status_code: [200, 204]
      register: _openbao_pki_urls_result
      no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"
      when: not ansible_check_mode

    - name: Create PKI certificate role
      ansible.builtin.uri:
        url: "{{ openbao_api_addr }}/v1/{{ openbao_pki_mount }}/roles/{{ openbao_pki_cert_role }}"
        method: POST
        headers:
          X-Vault-Token: "{{ openbao_root_token }}"
        body_format: json
        body:
          allowed_domains: "{{ openbao_pki_allowed_domains.split(',') | map('trim') | list }}"
          allow_subdomains: true
          allow_bare_domains: true
          allow_ip_sans: true
          allow_localhost: false
          require_cn: false
          max_ttl: "{{ openbao_pki_cert_ttl }}"
          key_type: rsa
          key_bits: 2048
        status_code: [200, 204]
      register: _openbao_pki_role_result
      no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"
      when: not ansible_check_mode

    - name: Enable Kubernetes auth method
      ansible.builtin.uri:
        url: "{{ openbao_api_addr }}/v1/sys/auth/kubernetes"
        method: POST
        headers:
          X-Vault-Token: "{{ openbao_root_token }}"
        body_format: json
        body:
          type: kubernetes
        status_code: [200, 204]
      register: _openbao_enable_k8s_auth_result
      no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"
      when:
        - not ansible_check_mode
        - "'kubernetes/' not in (_openbao_auth_mounts.json | default({}))"

    - name: Get k3s cluster CA certificate
      ansible.builtin.command:
        cmd: >-
          k3s kubectl get configmap kube-root-ca.crt
          -n kube-public
          -o jsonpath={.data.ca\\.crt}
      register: _k3s_ca_cert
      changed_when: false
      when: not ansible_check_mode

    - name: Create bound service account token for OpenBao token review
      ansible.builtin.command:
        cmd: >-
          k3s kubectl create token openbao
          --namespace {{ openbao_namespace }}
          --duration 87600h
      register: _openbao_sa_token
      changed_when: false
      no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"
      when: not ansible_check_mode

    - name: Configure Kubernetes auth method
      ansible.builtin.uri:
        url: "{{ openbao_api_addr }}/v1/auth/kubernetes/config"
        method: POST
        headers:
          X-Vault-Token: "{{ openbao_root_token }}"
        body_format: json
        body:
          kubernetes_host: "https://kubernetes.default.svc.cluster.local:443"
          kubernetes_ca_cert: "{{ _k3s_ca_cert.stdout }}"
          token_reviewer_jwt: "{{ _openbao_sa_token.stdout | trim }}"
          disable_iss_validation: true
        status_code: [200, 204]
      register: _openbao_k8s_auth_config_result
      no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"
      when: not ansible_check_mode

    - name: Write cert-manager policy (sign certs via PKI)
      ansible.builtin.uri:
        url: "{{ openbao_api_addr }}/v1/sys/policies/acl/cert-manager"
        method: POST
        headers:
          X-Vault-Token: "{{ openbao_root_token }}"
        body_format: json
        body:
          policy: |
            path "{{ openbao_pki_mount }}/sign/{{ openbao_pki_cert_role }}" {
              capabilities = ["create", "update"]
            }
            path "{{ openbao_pki_mount }}/issue/{{ openbao_pki_cert_role }}" {
              capabilities = ["create", "update"]
            }
        status_code: [200, 204]
      register: _openbao_certmanager_policy_result
      no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"
      when: not ansible_check_mode

    - name: Create k8s auth role for cert-manager
      ansible.builtin.uri:
        url: "{{ openbao_api_addr }}/v1/auth/kubernetes/role/cert-manager"
        method: POST
        headers:
          X-Vault-Token: "{{ openbao_root_token }}"
        body_format: json
        body:
          bound_service_account_names:
            - "{{ openbao_certmanager_sa_name }}"
          bound_service_account_namespaces:
            - "{{ openbao_certmanager_namespace }}"
          policies:
            - cert-manager
          ttl: "1h"
        status_code: [200, 204]
      register: _openbao_certmanager_auth_role_result
      no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"
      when: not ansible_check_mode
