---
- name: Resolve ARMORY_BUILD_DEBUG flag
  ansible.builtin.set_fact:
    armory_build_debug: "{{ (lookup('ansible.builtin.env', 'ARMORY_BUILD_DEBUG') | default('false', true)) | bool }}"
    armory_log_nolog: "{{ (lookup('ansible.builtin.env', 'ARMORY_LOG_NOLOG') | default('false', true)) | bool }}"
  changed_when: false

- name: Debug logging controls for openbao role
  ansible.builtin.debug:
    msg:
      - "Role: openbao"
      - "ARMORY_BUILD_DEBUG: {{ armory_build_debug | default(false) | bool }}"
      - "ARMORY_LOG_NOLOG: {{ armory_log_nolog | default(false) | bool }}"
      - "Sensitive task redaction enabled: {{ not (armory_log_nolog | default(false) | bool) }}"
  when: armory_build_debug | default(false) | bool

- name: Enforce TLS-only OpenBao listeners
  ansible.builtin.assert:
    that:
      - openbao_tls_enabled | bool
    fail_msg: >-
      OpenBao TLS must remain enabled. Plaintext listener mode is not supported
      because all OpenBao client integrations require HTTPS with CA trust.
    success_msg: OpenBao TLS enforcement is enabled.

- name: Run OpenBao orchestration with diagnostics
  block:
    - name: Ensure OpenBao work directory exists
      ansible.builtin.file:
        path: "{{ openbao_work_dir }}"
        state: directory
        mode: "0750"
        owner: root
        group: root
      register: _openbao_work_dir_result

    - name: Debug OpenBao work directory task
      ansible.builtin.debug:
        msg:
          - "Task: Ensure OpenBao work directory exists"
          - "Directory: {{ openbao_work_dir }}"
          - "Task changed: {{ _openbao_work_dir_result.changed | default(false) }}"
      when: armory_build_debug | default(false) | bool

    - name: OpenBao installation
      ansible.builtin.import_tasks: install.yml
      tags: [openbao, openbao_install]

    - name: Debug OpenBao install import task
      ansible.builtin.debug:
        msg:
          - "Task: OpenBao installation"
          - "Imported file: roles/openbao/tasks/install.yml"
      when: armory_build_debug | default(false) | bool

    - name: OpenBao initialization
      ansible.builtin.import_tasks: init.yml
      tags: [openbao, openbao_init]

    - name: Debug OpenBao init import task
      ansible.builtin.debug:
        msg:
          - "Task: OpenBao initialization"
          - "Imported file: roles/openbao/tasks/init.yml"
      when: armory_build_debug | default(false) | bool

    - name: OpenBao unseal
      ansible.builtin.import_tasks: unseal.yml
      tags: [openbao, openbao_unseal]

    - name: Debug OpenBao unseal import task
      ansible.builtin.debug:
        msg:
          - "Task: OpenBao unseal"
          - "Imported file: roles/openbao/tasks/unseal.yml"
      when: armory_build_debug | default(false) | bool

    - name: OpenBao configuration
      ansible.builtin.import_tasks: configure.yml
      tags: [openbao, openbao_configure]

    - name: Debug OpenBao configure import task
      ansible.builtin.debug:
        msg:
          - "Task: OpenBao configuration"
          - "Imported file: roles/openbao/tasks/configure.yml"
          - "KV mount: {{ openbao_kv_mount }}"
          - "PKI mount: {{ openbao_pki_mount }}"
      when: armory_build_debug | default(false) | bool

    - name: BeeAI credentials in OpenBao
      ansible.builtin.import_tasks: credentials.yml
      tags: [openbao, openbao_credentials, beeai]

    - name: Debug OpenBao credentials import task
      ansible.builtin.debug:
        msg:
          - "Task: BeeAI credentials in OpenBao"
          - "Imported file: roles/openbao/tasks/credentials.yml"
      when: armory_build_debug | default(false) | bool

  rescue:
    - name: Debug OpenBao orchestration failure context
      ansible.builtin.debug:
        msg:
          - "Role: openbao"
          - "Failure task: {{ ansible_failed_task.name | default('unknown') }}"
          - "Failure message: {{ ansible_failed_result.msg | default('n/a') }}"
          - "Failure rc: {{ ansible_failed_result.rc | default('n/a') }}"
          - "Failure cmd: {{ ansible_failed_result.cmd | default('n/a') }}"
          - "Failure stderr: {{ ansible_failed_result.stderr | default('n/a') }}"
          - "Failure stdout: {{ ansible_failed_result.stdout | default('n/a') }}"
          - "Failure exception: {{ ansible_failed_result.exception | default('n/a') }}"
      when: armory_build_debug | default(false) | bool

    - name: Fail OpenBao orchestration with context
      ansible.builtin.fail:
        msg: >-
          openbao role failed at '{{ ansible_failed_task.name | default('unknown') }}'.
          Set ARMORY_BUILD_DEBUG=true for companion diagnostics.
