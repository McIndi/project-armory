---
- name: Resolve ARMORY_LOG_NOLOG flag
  ansible.builtin.set_fact:
    armory_log_nolog: "{{ (lookup('ansible.builtin.env', 'ARMORY_LOG_NOLOG') | default('false', true)) | bool }}"
  changed_when: false

- name: Enforce TLS-only OpenBao listeners
  ansible.builtin.assert:
    that:
      - openbao_tls_enabled | bool
    fail_msg: >-
      OpenBao TLS must remain enabled. Plaintext listener mode is not supported
      because all OpenBao client integrations require HTTPS with CA trust.
    success_msg: OpenBao TLS enforcement is enabled.

- name: Run OpenBao orchestration with diagnostics
  block:
    - name: Ensure OpenBao work directory exists
      ansible.builtin.file:
        path: "{{ openbao_work_dir }}"
        state: directory
        mode: "0750"
        owner: root
        group: root
      register: _openbao_work_dir_result

    - name: OpenBao installation
      ansible.builtin.import_tasks: install.yml
      tags: [openbao, openbao_install]

    - name: OpenBao initialization
      ansible.builtin.import_tasks: init.yml
      tags: [openbao, openbao_init]

    - name: OpenBao unseal
      ansible.builtin.import_tasks: unseal.yml
      tags: [openbao, openbao_unseal]

    - name: OpenBao configuration
      ansible.builtin.import_tasks: configure.yml
      tags: [openbao, openbao_configure]

    - name: OpenBao consumer wiring
      ansible.builtin.import_tasks: consumer_wiring.yml
      tags: [openbao, openbao_consumer_wiring]

    - name: OpenBao OIDC scaffold
      ansible.builtin.import_tasks: oidc_scaffold.yml
      tags: [openbao, openbao_oidc_scaffold]

    - name: OpenBao provisioner token
      ansible.builtin.import_tasks: provisioner_token.yml
      tags: [openbao, openbao_provisioner]

    - name: OpenBao audit rotation
      ansible.builtin.import_tasks: audit_rotate.yml
      tags: [openbao, openbao_audit_rotate]
