---
# credentials.yml — Generate BeeAI credentials once and store them in
# OpenBao KV at secret/beeai/credentials. Idempotent: skipped when the
# secret already exists.

- name: Provision BeeAI credentials in OpenBao with diagnostics
  block:
    - name: Check whether BeeAI credentials already exist in OpenBao
      ansible.builtin.uri:
        url: "{{ openbao_api_addr }}/v1/{{ openbao_kv_mount }}/metadata/beeai/credentials"
        method: GET
        headers:
          X-Vault-Token: "{{ openbao_root_token }}"
        status_code: [200, 404]
      register: _openbao_beeai_creds_check
      no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"
      when: not ansible_check_mode

    - name: Debug BeeAI credential existence check task
      ansible.builtin.debug:
        msg:
          - "Task: Check whether BeeAI credentials already exist in OpenBao"
          - "Executed: {{ not ansible_check_mode }}"
          - "Exists: {{ (_openbao_beeai_creds_check.status | default(404)) == 200 if _openbao_beeai_creds_check is defined else 'unknown' }}"
      when: armory_build_debug | default(false) | bool

    - name: Generate BeeAI credentials
      ansible.builtin.command:
        cmd: >-
          python3 -c
          "import json, secrets;
          pg_admin_password = secrets.token_urlsafe(24);
          pg_user_password = secrets.token_urlsafe(24);
          print(json.dumps({
            'admin_password':         secrets.token_urlsafe(24),
            'pg_admin_password':      pg_admin_password,
            'pg_user_password':       pg_user_password,
            'sqlConnection':          f'postgresql+psycopg://agentstack-user:{pg_user_password}@postgresql:5432/agentstack',
            'sqlConnectionSuperuser': f'postgresql+psycopg://postgres:{pg_admin_password}@postgresql:5432/agentstack',
            'seaweedfs_secret':       secrets.token_urlsafe(24)
          }))"
      register: _openbao_beeai_creds_generated
      changed_when: true
      no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"
      when:
        - not ansible_check_mode
        - _openbao_beeai_creds_check.status | default(404) == 404

    - name: Debug BeeAI credential generation task
      ansible.builtin.debug:
        msg:
          - "Task: Generate BeeAI credentials"
          - "Executed: {{ (not ansible_check_mode) and ((_openbao_beeai_creds_check.status | default(404)) == 404) }}"
          - "Task changed: {{ _openbao_beeai_creds_generated.changed | default(false) }}"
      when: armory_build_debug | default(false) | bool

    - name: Check whether BeeAI encryption key already exists in OpenBao
      ansible.builtin.uri:
        url: "{{ openbao_api_addr }}/v1/{{ openbao_kv_mount }}/metadata/beeai/encryption-key"
        method: GET
        headers:
          X-Vault-Token: "{{ openbao_root_token }}"
        status_code: [200, 404]
      register: _openbao_beeai_enckey_check
      no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"
      when: not ansible_check_mode

    - name: Debug BeeAI encryption key existence check task
      ansible.builtin.debug:
        msg:
          - "Task: Check whether BeeAI encryption key already exists in OpenBao"
          - "Executed: {{ not ansible_check_mode }}"
          - "Exists: {{ (_openbao_beeai_enckey_check.status | default(404)) == 200 if _openbao_beeai_enckey_check is defined else 'unknown' }}"
      when: armory_build_debug | default(false) | bool

    - name: Generate BeeAI encryption key
      ansible.builtin.command:
        cmd: python3 -c "import base64, os; print(base64.urlsafe_b64encode(os.urandom(32)).decode())"
      register: _openbao_beeai_enckey_generated
      changed_when: true
      no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"
      when:
        - not ansible_check_mode
        - _openbao_beeai_enckey_check.status | default(404) == 404

    - name: Debug BeeAI encryption key generation task
      ansible.builtin.debug:
        msg:
          - "Task: Generate BeeAI encryption key"
          - "Executed: {{ (not ansible_check_mode) and ((_openbao_beeai_enckey_check.status | default(404)) == 404) }}"
          - "Task changed: {{ _openbao_beeai_enckey_generated.changed | default(false) }}"
      when: armory_build_debug | default(false) | bool

    - name: Store BeeAI credentials in OpenBao KV
      ansible.builtin.uri:
        url: "{{ openbao_api_addr }}/v1/{{ openbao_kv_mount }}/data/beeai/credentials"
        method: POST
        headers:
          X-Vault-Token: "{{ openbao_root_token }}"
        body_format: json
        body:
          data: "{{ _openbao_beeai_creds_generated.stdout | from_json }}"
        status_code: [200, 204]
      register: _openbao_store_beeai_creds_result
      no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"
      when:
        - not ansible_check_mode
        - _openbao_beeai_creds_check.status | default(404) == 404

    - name: Debug BeeAI credential store task
      ansible.builtin.debug:
        msg:
          - "Task: Store BeeAI credentials in OpenBao KV"
          - "Executed: {{ (not ansible_check_mode) and ((_openbao_beeai_creds_check.status | default(404)) == 404) }}"
          - "HTTP status: {{ _openbao_store_beeai_creds_result.status | default('n/a') }}"
      when: armory_build_debug | default(false) | bool

    - name: Store BeeAI encryption key in OpenBao KV
      ansible.builtin.uri:
        url: "{{ openbao_api_addr }}/v1/{{ openbao_kv_mount }}/data/beeai/encryption-key"
        method: POST
        headers:
          X-Vault-Token: "{{ openbao_root_token }}"
        body_format: json
        body:
          data:
            value: "{{ _openbao_beeai_enckey_generated.stdout | trim }}"
        status_code: [200, 204]
      register: _openbao_store_beeai_enckey_result
      no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"
      when:
        - not ansible_check_mode
        - _openbao_beeai_enckey_check.status | default(404) == 404

    - name: Debug BeeAI encryption key store task
      ansible.builtin.debug:
        msg:
          - "Task: Store BeeAI encryption key in OpenBao KV"
          - "Executed: {{ (not ansible_check_mode) and ((_openbao_beeai_enckey_check.status | default(404)) == 404) }}"
          - "HTTP status: {{ _openbao_store_beeai_enckey_result.status | default('n/a') }}"
      when: armory_build_debug | default(false) | bool

  rescue:
    - name: Debug OpenBao credential flow failure context
      ansible.builtin.debug:
        msg:
          - "Role: openbao (credentials.yml)"
          - "Failure task: {{ ansible_failed_task.name | default('unknown') }}"
          - "Failure message: {{ ansible_failed_result.msg | default('n/a') }}"
          - "Failure rc: {{ ansible_failed_result.rc | default('n/a') }}"
      when: armory_build_debug | default(false) | bool

    - name: Fail OpenBao credential flow with context
      ansible.builtin.fail:
        msg: >-
          openbao credentials flow failed at '{{ ansible_failed_task.name | default('unknown') }}'.
          Set ARMORY_BUILD_DEBUG=true for companion diagnostics.
