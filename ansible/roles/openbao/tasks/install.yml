---
- name: Ensure OpenBao namespace exists
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ openbao_namespace }}"
    kubeconfig: /etc/rancher/k3s/k3s.yaml
  when: not ansible_check_mode

- name: Ensure OpenBao TLS artifact directory exists
  ansible.builtin.file:
    path: "{{ openbao_tls_artifacts_dir }}"
    state: directory
    mode: "0700"
    owner: root
    group: root
  when: openbao_tls_enabled | bool

- name: Ensure OpenSSL is installed for OpenBao certificate generation
  ansible.builtin.dnf:
    name: openssl
    state: present
  when: openbao_tls_enabled | bool

- name: Render OpenBao TLS OpenSSL config
  ansible.builtin.copy:
    dest: "{{ openbao_tls_openssl_config_path }}"
    mode: "0600"
    owner: root
    group: root
    content: |
      [req]
      default_bits = 4096
      prompt = no
      default_md = sha256
      distinguished_name = dn
      req_extensions = req_ext

      [dn]
      CN = {{ openbao_tls_cert_common_name }}

      [req_ext]
      subjectAltName = {{ openbao_tls_sans | join(',') }}
  when: openbao_tls_enabled | bool

- name: Stat existing OpenBao TLS artifacts
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - "{{ openbao_tls_ca_host_path }}"
    - "{{ openbao_tls_ca_key_host_path }}"
    - "{{ openbao_tls_cert_host_path }}"
    - "{{ openbao_tls_key_host_path }}"
  register: _openbao_tls_stat
  when: openbao_tls_enabled | bool

- name: Read OpenBao CA expiry status
  ansible.builtin.command:
    cmd: >-
      openssl x509
      -in {{ openbao_tls_ca_host_path }}
      -noout
      -checkend {{ (openbao_tls_renew_before_days | int) * 86400 }}
  register: _openbao_ca_checkend
  changed_when: false
  failed_when: false
  when:
    - openbao_tls_enabled | bool
    - (openbao_tls_ca_host_path in (_openbao_tls_stat.results | selectattr('stat.exists', 'equalto', true) | map(attribute='item') | list))

- name: Decide whether OpenBao TLS artifacts must be regenerated
  ansible.builtin.set_fact:
    _openbao_tls_regenerate: >-
      {{ (_openbao_tls_stat.results | selectattr('stat.exists', 'equalto', false) | list | length > 0)
         or (_openbao_ca_checkend.rc | default(1) != 0) }}
  when: openbao_tls_enabled | bool

- name: Generate OpenBao TLS CA certificate and key
  ansible.builtin.command:
    cmd: >-
      openssl req -x509 -nodes -newkey rsa:4096
      -keyout {{ openbao_tls_ca_key_host_path }}
      -out {{ openbao_tls_ca_host_path }}
      -days {{ openbao_tls_cert_validity_days }}
      -subj /CN={{ openbao_tls_ca_common_name }}
      -addext basicConstraints=critical,CA:TRUE
      -addext keyUsage=critical,keyCertSign,cRLSign
  when:
    - openbao_tls_enabled | bool
    - not ansible_check_mode
    - _openbao_tls_regenerate | bool

- name: Generate OpenBao TLS server key and CSR
  ansible.builtin.command:
    cmd: >-
      openssl req -new -nodes -newkey rsa:4096
      -keyout {{ openbao_tls_key_host_path }}
      -out {{ openbao_tls_csr_host_path }}
      -config {{ openbao_tls_openssl_config_path }}
  when:
    - openbao_tls_enabled | bool
    - not ansible_check_mode
    - _openbao_tls_regenerate | bool

- name: Sign OpenBao TLS server certificate with OpenBao CA
  ansible.builtin.command:
    cmd: >-
      openssl x509 -req
      -in {{ openbao_tls_csr_host_path }}
      -CA {{ openbao_tls_ca_host_path }}
      -CAkey {{ openbao_tls_ca_key_host_path }}
      -CAcreateserial
      -CAserial {{ openbao_tls_ca_serial_host_path }}
      -out {{ openbao_tls_cert_host_path }}
      -days {{ openbao_tls_cert_validity_days }}
      -sha256
      -extfile {{ openbao_tls_openssl_config_path }}
      -extensions req_ext
  when:
    - openbao_tls_enabled | bool
    - not ansible_check_mode
    - _openbao_tls_regenerate | bool

- name: Remove OpenBao TLS CSR file
  ansible.builtin.file:
    path: "{{ openbao_tls_csr_host_path }}"
    state: absent
  when:
    - openbao_tls_enabled | bool
    - not ansible_check_mode
    - _openbao_tls_regenerate | bool

- name: Install OpenBao CA into host trust store
  ansible.builtin.copy:
    src: "{{ openbao_tls_ca_host_path }}"
    dest: /etc/pki/ca-trust/source/anchors/openbao-ca.crt
    remote_src: true
    mode: "0644"
    owner: root
    group: root
  register: _openbao_host_ca_install
  when: openbao_tls_enabled | bool

- name: Update host CA trust store
  ansible.builtin.command:
    cmd: update-ca-trust
  changed_when: false
  when:
    - openbao_tls_enabled | bool
    - _openbao_host_ca_install.changed | default(false)
    - not ansible_check_mode

# tls.crt/tls.key live in a 0700 root-owned dir; read them with slurp (runs on the
# target under become), not lookup('file') (controller-side, unprivileged → denied).
# slurp's .content is already base64 — exactly what a Secret's data field needs.
- name: Read OpenBao server TLS cert/key for Secret (privileged read under become)
  ansible.builtin.slurp:
    src: "{{ item }}"
  loop:
    - "{{ openbao_tls_cert_host_path }}"
    - "{{ openbao_tls_key_host_path }}"
  register: _openbao_tls_secret_files
  no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"
  when:
    - openbao_tls_enabled | bool
    - not ansible_check_mode

- name: Apply OpenBao server TLS secret
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ openbao_tls_secret_name }}"
        namespace: "{{ openbao_namespace }}"
      type: kubernetes.io/tls
      data:
        tls.crt: "{{ _openbao_tls_secret_files.results[0].content }}"
        tls.key: "{{ _openbao_tls_secret_files.results[1].content }}"
    kubeconfig: /etc/rancher/k3s/k3s.yaml
  register: _openbao_tls_secret_apply
  no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"
  when:
    - openbao_tls_enabled | bool
    - not ansible_check_mode

- name: Read OpenBao CA cert for Secret (privileged read under become)
  ansible.builtin.slurp:
    src: "{{ openbao_tls_ca_host_path }}"
  register: _openbao_ca_secret_file
  when:
    - openbao_tls_enabled | bool
    - not ansible_check_mode

- name: Apply OpenBao CA secret
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ openbao_tls_ca_secret_name }}"
        namespace: "{{ openbao_namespace }}"
      data:
        ca.crt: "{{ _openbao_ca_secret_file.content }}"
    kubeconfig: /etc/rancher/k3s/k3s.yaml
  when:
    - openbao_tls_enabled | bool
    - not ansible_check_mode

- name: Render OpenBao Helm values
  ansible.builtin.template:
    src: values.yaml.j2
    dest: "{{ openbao_work_dir }}/values.yaml"
    mode: "0644"
  register: _openbao_values_rendered

- name: Deploy OpenBao via Helm
  kubernetes.core.helm:
    release_name: "{{ openbao_release_name }}"
    chart_ref: "{{ openbao_chart_name }}"
    chart_repo_url: "{{ openbao_chart_repo }}"
    release_namespace: "{{ openbao_namespace }}"
    create_namespace: true
    values_files:
      - "{{ openbao_work_dir }}/values.yaml"
    chart_version: "{{ openbao_chart_version if (openbao_chart_version | length > 0) else omit }}"
    wait: true
    wait_timeout: 300s
    kubeconfig: /etc/rancher/k3s/k3s.yaml
  register: _openbao_helm_apply_result
  when: not ansible_check_mode

- name: Read OpenBao service ClusterIP for host-local access
  ansible.builtin.command:
    cmd: >-
      k3s kubectl get service {{ openbao_release_name }}
      --namespace {{ openbao_namespace }}
      -o jsonpath='{.spec.clusterIP}'
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: _openbao_service_cluster_ip
  changed_when: false
  until: (_openbao_service_cluster_ip.stdout | trim | length) > 0
  retries: 30
  delay: 2
  when: not ansible_check_mode

- name: Ensure OpenBao service DNS resolves locally on the VM host
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^\S+\s+{{ openbao_tls_server_name | regex_escape }}\s*$'
    line: "{{ _openbao_service_cluster_ip.stdout | trim }} {{ openbao_tls_server_name }}"
    owner: root
    group: root
    mode: "0644"
  become: true
  register: _openbao_hosts_result
  when: not ansible_check_mode

# The gateway Service carries the node address as an externalIP, so the
# public UI host maps straight to the node IP.
- name: Resolve effective gateway IP for OpenBao UI host mapping
  ansible.builtin.set_fact:
    openbao_ingress_ip_effective: "{{ edge_gateway_ip_resolved | default(edge_gateway_ip | default('127.0.0.1')) }}"
  changed_when: false
  when:
    - not ansible_check_mode
    - openbao_ingress_enabled | bool

# The HTTPRoute itself is applied by roles/openbao/tasks/route.yml, invoked
# from the openbao_oidc role: this role runs before the Gateway API CRDs
# exist on a fresh cluster.
- name: Ensure OpenBao UI host resolves to gateway IP locally
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^\S+\s+{{ openbao_ingress_host | regex_escape }}\s*$'
    line: "{{ openbao_ingress_ip_effective }} {{ openbao_ingress_host }}"
    owner: root
    group: root
    mode: "0644"
  become: true
  register: _openbao_ui_hosts_result
  when:
    - not ansible_check_mode
    - openbao_ingress_enabled | bool

- name: Recreate OpenBao pod after Helm apply
  ansible.builtin.command:
    cmd: >-
      k3s kubectl delete pod
      --selector app.kubernetes.io/name=openbao
      --namespace {{ openbao_namespace }}
      --ignore-not-found=true
      --wait=true
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: true
  when:
    - not ansible_check_mode
    - openbao_tls_enabled | bool
    - _openbao_tls_regenerate | default(false) | bool or _openbao_tls_secret_apply.changed | default(false)

- name: Apply ClusterRoleBinding for OpenBao SA (token review)
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: openbao-tokenreview
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: system:auth-delegator
      subjects:
        - kind: ServiceAccount
          name: openbao
          namespace: "{{ openbao_namespace }}"
    kubeconfig: /etc/rancher/k3s/k3s.yaml
  when: not ansible_check_mode

- name: Wait for OpenBao pod to be ready
  block:
    - name: Wait for OpenBao pod to be created
      ansible.builtin.command:
        cmd: >-
          k3s kubectl get pod
          --selector app.kubernetes.io/name=openbao
          --namespace {{ openbao_namespace }}
          -o name
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: _openbao_pod_names
      changed_when: false
      until: (_openbao_pod_names.stdout | trim) != ''
      retries: 60
      delay: 5

    - name: Wait for OpenBao pod phase Running
      ansible.builtin.command:
        cmd: >-
          k3s kubectl wait pod
          --for=jsonpath='{.status.phase}'=Running
          --selector app.kubernetes.io/name=openbao
          --namespace {{ openbao_namespace }}
          --timeout={{ openbao_startup_wait_timeout }}
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: _openbao_wait_running
      changed_when: false

    - name: Wait for OpenBao API to respond before init
      ansible.builtin.uri:
        url: "{{ openbao_api_addr }}/v1/sys/seal-status"
        method: GET
        status_code: [200, 429, 472, 473, 501, 503]
      register: _openbao_api_preinit_status
      until: _openbao_api_preinit_status.status in [200, 429, 472, 473, 501, 503]
      retries: 60
      delay: 5
      changed_when: false
  when: not ansible_check_mode

- name: Remove legacy OpenBao firewall port exposure
  ansible.posix.firewalld:
    zone: "{{ openbao_firewall_zone }}"
    port: "{{ openbao_node_port }}/tcp"
    permanent: true
    immediate: true
    state: disabled
  register: _openbao_firewall_port_result
  when: openbao_firewall_manage | bool
