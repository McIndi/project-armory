---
- name: Render OpenTofu configuration for OpenBao Helm release
  ansible.builtin.template:
    src: main.tf.j2
    dest: "{{ openbao_work_dir }}/main.tf"
    mode: "0644"
  register: _openbao_main_tf_result

- name: Debug OpenBao OpenTofu configuration render task
  ansible.builtin.debug:
    msg:
      - "Task: Render OpenTofu configuration for OpenBao Helm release"
      - "File: {{ openbao_work_dir }}/main.tf"
      - "Task changed: {{ _openbao_main_tf_result.changed | default(false) }}"
  when: armory_build_debug | default(false) | bool

- name: Generate OpenBao namespace manifest
  ansible.builtin.command:
    cmd: k3s kubectl create namespace {{ openbao_namespace }} --dry-run=client -o yaml
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: _openbao_ns_yaml
  changed_when: false
  when: not ansible_check_mode

- name: Apply OpenBao namespace manifest
  ansible.builtin.command:
    cmd: k3s kubectl apply -f -
    stdin: "{{ _openbao_ns_yaml.stdout }}"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: _openbao_ns_apply
  changed_when: "'created' in (_openbao_ns_apply.stdout | default(''))"
  when: not ansible_check_mode

- name: Ensure OpenBao TLS artifact directory exists
  ansible.builtin.file:
    path: "{{ openbao_tls_artifacts_dir }}"
    state: directory
    mode: "0700"
    owner: root
    group: root
  when: openbao_tls_enabled | bool

- name: Ensure OpenSSL is installed for OpenBao certificate generation
  ansible.builtin.dnf:
    name: openssl
    state: present
  when: openbao_tls_enabled | bool

- name: Render OpenBao TLS OpenSSL config
  ansible.builtin.copy:
    dest: "{{ openbao_tls_openssl_config_path }}"
    mode: "0600"
    owner: root
    group: root
    content: |
      [req]
      default_bits = 4096
      prompt = no
      default_md = sha256
      distinguished_name = dn
      req_extensions = req_ext

      [dn]
      CN = {{ openbao_tls_cert_common_name }}

      [req_ext]
      subjectAltName = {{ openbao_tls_sans | join(',') }}
  when: openbao_tls_enabled | bool

- name: Generate OpenBao TLS CA certificate and key
  ansible.builtin.command:
    cmd: >-
      openssl req -x509 -nodes -newkey rsa:4096
      -keyout {{ openbao_tls_ca_key_host_path }}
      -out {{ openbao_tls_ca_host_path }}
      -days {{ openbao_tls_cert_validity_days }}
      -subj /CN={{ openbao_tls_ca_common_name }}
      -addext basicConstraints=critical,CA:TRUE
      -addext keyUsage=critical,keyCertSign,cRLSign
  when:
    - openbao_tls_enabled | bool
    - not ansible_check_mode

- name: Generate OpenBao TLS server key and CSR
  ansible.builtin.command:
    cmd: >-
      openssl req -new -nodes -newkey rsa:4096
      -keyout {{ openbao_tls_key_host_path }}
      -out {{ openbao_tls_csr_host_path }}
      -config {{ openbao_tls_openssl_config_path }}
  when:
    - openbao_tls_enabled | bool
    - not ansible_check_mode

- name: Sign OpenBao TLS server certificate with OpenBao CA
  ansible.builtin.command:
    cmd: >-
      openssl x509 -req
      -in {{ openbao_tls_csr_host_path }}
      -CA {{ openbao_tls_ca_host_path }}
      -CAkey {{ openbao_tls_ca_key_host_path }}
      -CAcreateserial
      -CAserial {{ openbao_tls_ca_serial_host_path }}
      -out {{ openbao_tls_cert_host_path }}
      -days {{ openbao_tls_cert_validity_days }}
      -sha256
      -extfile {{ openbao_tls_openssl_config_path }}
      -extensions req_ext
  when:
    - openbao_tls_enabled | bool
    - not ansible_check_mode

- name: Remove OpenBao TLS CSR file
  ansible.builtin.file:
    path: "{{ openbao_tls_csr_host_path }}"
    state: absent
  when:
    - openbao_tls_enabled | bool
    - not ansible_check_mode

- name: Install OpenBao CA into host trust store
  ansible.builtin.copy:
    src: "{{ openbao_tls_ca_host_path }}"
    dest: /etc/pki/ca-trust/source/anchors/openbao-ca.crt
    remote_src: true
    mode: "0644"
    owner: root
    group: root
  register: _openbao_host_ca_install
  when: openbao_tls_enabled | bool

- name: Update host CA trust store
  ansible.builtin.command:
    cmd: update-ca-trust
  changed_when: false
  when:
    - openbao_tls_enabled | bool
    - _openbao_host_ca_install.changed | default(false)
    - not ansible_check_mode

- name: Generate OpenBao server TLS secret manifest
  ansible.builtin.command:
    cmd: >-
      k3s kubectl create secret tls {{ openbao_tls_secret_name }}
      --namespace {{ openbao_namespace }}
      --cert={{ openbao_tls_cert_host_path }}
      --key={{ openbao_tls_key_host_path }}
      --dry-run=client -o yaml
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: _openbao_tls_secret_yaml
  changed_when: false
  when:
    - openbao_tls_enabled | bool
    - not ansible_check_mode

- name: Apply OpenBao server TLS secret
  ansible.builtin.command:
    cmd: k3s kubectl apply -f -
    stdin: "{{ _openbao_tls_secret_yaml.stdout }}"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: _openbao_tls_secret_apply
  changed_when: >-
    'created' in (_openbao_tls_secret_apply.stdout | default('')) or
    'configured' in (_openbao_tls_secret_apply.stdout | default(''))
  when:
    - openbao_tls_enabled | bool
    - not ansible_check_mode

- name: Generate OpenBao CA secret manifest
  ansible.builtin.command:
    cmd: >-
      k3s kubectl create secret generic {{ openbao_tls_ca_secret_name }}
      --namespace {{ openbao_namespace }}
      --from-file=ca.crt={{ openbao_tls_ca_host_path }}
      --dry-run=client -o yaml
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: _openbao_ca_secret_yaml
  changed_when: false
  when:
    - openbao_tls_enabled | bool
    - not ansible_check_mode

- name: Apply OpenBao CA secret
  ansible.builtin.command:
    cmd: k3s kubectl apply -f -
    stdin: "{{ _openbao_ca_secret_yaml.stdout }}"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: _openbao_ca_secret_apply
  changed_when: >-
    'created' in (_openbao_ca_secret_apply.stdout | default('')) or
    'configured' in (_openbao_ca_secret_apply.stdout | default(''))
  when:
    - openbao_tls_enabled | bool
    - not ansible_check_mode

- name: Render OpenBao Helm values
  ansible.builtin.template:
    src: values.yaml.j2
    dest: "{{ openbao_work_dir }}/values.yaml"
    mode: "0644"
  register: _openbao_values_rendered

- name: Debug OpenBao values render task
  ansible.builtin.debug:
    msg:
      - "Task: Render OpenBao Helm values"
      - "File: {{ openbao_work_dir }}/values.yaml"
      - "Task changed: {{ _openbao_values_rendered.changed | default(false) }}"
  when: armory_build_debug | default(false) | bool

- name: Render OpenTofu variables file for OpenBao
  ansible.builtin.copy:
    dest: "{{ openbao_work_dir }}/terraform.tfvars.json"
    mode: "0600"
    content: |
      {{ {
        "kubeconfig_path": "/etc/rancher/k3s/k3s.yaml",
        "release_name": openbao_release_name,
        "namespace": openbao_namespace,
        "chart_repository": openbao_chart_repo,
        "chart_name": openbao_chart_name,
        "chart_version": openbao_chart_version,
        "values_file_path": openbao_work_dir ~ "/values.yaml"
      } | to_nice_json }}
  register: _openbao_tfvars_result

- name: Debug OpenBao tfvars render task
  ansible.builtin.debug:
    msg:
      - "Task: Render OpenTofu variables file for OpenBao"
      - "File: {{ openbao_work_dir }}/terraform.tfvars.json"
      - "Task changed: {{ _openbao_tfvars_result.changed | default(false) }}"
  when: armory_build_debug | default(false) | bool

- name: Initialize OpenTofu in OpenBao working directory
  ansible.builtin.command:
    cmd: tofu init -input=false
    chdir: "{{ openbao_work_dir }}"
  register: _openbao_tofu_init_result
  changed_when: "'Terraform has been successfully initialized' in _openbao_tofu_init_result.stdout"
  when: not ansible_check_mode

- name: Debug OpenBao OpenTofu init task
  ansible.builtin.debug:
    msg:
      - "Task: Initialize OpenTofu in OpenBao working directory"
      - "Executed: {{ not ansible_check_mode }}"
      - "Task changed: {{ _openbao_tofu_init_result.changed | default(false) }}"
      - "Exit code: {{ _openbao_tofu_init_result.rc | default('n/a') }}"
  when: armory_build_debug | default(false) | bool

- name: Deploy OpenBao via OpenTofu helm provider
  ansible.builtin.command:
    cmd: tofu apply -auto-approve -input=false
    chdir: "{{ openbao_work_dir }}"
  register: _openbao_tofu_apply_result
  changed_when: "'Apply complete! Resources: 0 added, 0 changed, 0 destroyed.' not in _openbao_tofu_apply_result.stdout"
  when: not ansible_check_mode

- name: Debug OpenBao OpenTofu apply task
  ansible.builtin.debug:
    msg:
      - "Task: Deploy OpenBao via OpenTofu helm provider"
      - "Executed: {{ not ansible_check_mode }}"
      - "Release/namespace: {{ openbao_release_name }}/{{ openbao_namespace }}"
      - "Task changed: {{ _openbao_tofu_apply_result.changed | default(false) }}"
      - "Exit code: {{ _openbao_tofu_apply_result.rc | default('n/a') }}"
  when: armory_build_debug | default(false) | bool

- name: Recreate OpenBao pod after Helm apply
  ansible.builtin.command:
    cmd: >-
      k3s kubectl delete pod
      --selector app.kubernetes.io/name=openbao
      --namespace {{ openbao_namespace }}
      --ignore-not-found=true
      --wait=true
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: true
  when: not ansible_check_mode

- name: Create ClusterRoleBinding for OpenBao SA (token review)
  ansible.builtin.command:
    cmd: >-
      k3s kubectl create clusterrolebinding openbao-tokenreview
      --clusterrole=system:auth-delegator
      --serviceaccount={{ openbao_namespace }}:openbao
      --dry-run=client -o yaml
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: _openbao_crb_yaml
  changed_when: false
  when: not ansible_check_mode

- name: Debug OpenBao ClusterRoleBinding generation task
  ansible.builtin.debug:
    msg:
      - "Task: Create ClusterRoleBinding for OpenBao SA"
      - "Executed: {{ not ansible_check_mode }}"
      - "Exit code: {{ _openbao_crb_yaml.rc | default('n/a') }}"
  when: armory_build_debug | default(false) | bool

- name: Apply ClusterRoleBinding for OpenBao SA
  ansible.builtin.command:
    cmd: >-
      k3s kubectl apply -f -
    stdin: "{{ _openbao_crb_yaml.stdout }}"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: _openbao_crb_apply
  changed_when: false
  when: not ansible_check_mode

- name: Debug OpenBao ClusterRoleBinding apply task
  ansible.builtin.debug:
    msg:
      - "Task: Apply ClusterRoleBinding for OpenBao SA"
      - "Executed: {{ not ansible_check_mode }}"
      - "Exit code: {{ _openbao_crb_apply.rc | default('n/a') }}"
  when: armory_build_debug | default(false) | bool

- name: Wait for OpenBao pod to be ready
  block:
    - name: Wait for OpenBao pod to be created
      ansible.builtin.command:
        cmd: >-
          k3s kubectl get pod
          --selector app.kubernetes.io/name=openbao
          --namespace {{ openbao_namespace }}
          -o name
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: _openbao_pod_names
      changed_when: false
      until: (_openbao_pod_names.stdout | trim) != ''
      retries: 60
      delay: 5

    - name: Debug OpenBao pod creation wait task
      ansible.builtin.debug:
        msg:
          - "Task: Wait for OpenBao pod to be created"
          - "Pod selector output length: {{ (_openbao_pod_names.stdout | default('') | length) }}"
          - "Exit code: {{ _openbao_pod_names.rc | default('n/a') }}"
      when: armory_build_debug | default(false) | bool

    - name: Wait for OpenBao pod phase Running
      ansible.builtin.command:
        cmd: >-
          k3s kubectl wait pod
          --for=jsonpath='{.status.phase}'=Running
          --selector app.kubernetes.io/name=openbao
          --namespace {{ openbao_namespace }}
          --timeout={{ openbao_startup_wait_timeout }}
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: _openbao_wait_running
      changed_when: false

    - name: Debug OpenBao pod running wait task
      ansible.builtin.debug:
        msg:
          - "Task: Wait for OpenBao pod phase Running"
          - "Exit code: {{ _openbao_wait_running.rc | default('n/a') }}"
      when: armory_build_debug | default(false) | bool

    - name: Wait for OpenBao API to respond before init
      ansible.builtin.uri:
        url: "{{ openbao_api_addr }}/v1/sys/seal-status"
        method: GET
        status_code: [200, 429, 472, 473, 501, 503]
      register: _openbao_api_preinit_status
      until: _openbao_api_preinit_status.status in [200, 429, 472, 473, 501, 503]
      retries: 60
      delay: 5
      changed_when: false

    - name: Debug OpenBao API readiness task
      ansible.builtin.debug:
        msg:
          - "Task: Wait for OpenBao API to respond before init"
          - "HTTP status: {{ _openbao_api_preinit_status.status | default('n/a') }}"
      when: armory_build_debug | default(false) | bool

  rescue:
    - name: Capture OpenBao pod details after readiness timeout
      ansible.builtin.command:
        cmd: >-
          k3s kubectl describe pod
          --selector app.kubernetes.io/name=openbao
          --namespace {{ openbao_namespace }}
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: _openbao_pod_describe
      changed_when: false
      failed_when: false

    - name: Debug OpenBao pod describe capture task
      ansible.builtin.debug:
        msg:
          - "Task: Capture OpenBao pod details after readiness timeout"
          - "Exit code: {{ _openbao_pod_describe.rc | default('n/a') }}"
      when: armory_build_debug | default(false) | bool

    - name: Capture OpenBao logs after readiness timeout
      ansible.builtin.command:
        cmd: >-
          k3s kubectl logs
          --selector app.kubernetes.io/name=openbao
          --namespace {{ openbao_namespace }}
          --all-containers=true
          --tail=200
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: _openbao_pod_logs
      changed_when: false
      failed_when: false

    - name: Debug OpenBao pod log capture task
      ansible.builtin.debug:
        msg:
          - "Task: Capture OpenBao logs after readiness timeout"
          - "Exit code: {{ _openbao_pod_logs.rc | default('n/a') }}"
      when: armory_build_debug | default(false) | bool

    - name: Fail with OpenBao readiness diagnostics
      ansible.builtin.fail:
        msg: |
          OpenBao pod did not become reachable for bootstrap within {{ openbao_startup_wait_timeout }}.

          Pod describe output:
          {{ _openbao_pod_describe.stdout | default('n/a') }}

          Pod logs (last 200 lines):
          {{ _openbao_pod_logs.stdout | default('n/a') }}
  when: not ansible_check_mode

- name: Open OpenBao firewall port
  ansible.posix.firewalld:
    zone: "{{ openbao_firewall_zone }}"
    port: "{{ openbao_node_port }}/tcp"
    permanent: true
    immediate: true
    state: enabled
  register: _openbao_firewall_port_result
  when: openbao_firewall_manage | bool

- name: Debug OpenBao firewall task
  ansible.builtin.debug:
    msg:
      - "Task: Open OpenBao firewall port"
      - "Executed: {{ openbao_firewall_manage | bool }}"
      - "Zone/port: {{ openbao_firewall_zone }} / {{ openbao_node_port }}/tcp"
      - "Task changed: {{ _openbao_firewall_port_result.changed | default(false) }}"
  when: armory_build_debug | default(false) | bool

