---
- name: Register OpenBao namespace for teardown checks
  ansible.builtin.set_fact:
    teardown_role_target_namespaces: >-
      {{
        (teardown_role_target_namespaces | default([]))
        + [openbao_namespace]
        | unique
      }}

- name: Uninstall OpenBao helm release
  ansible.builtin.command:
    cmd: >-
      helm uninstall {{ openbao_release_name }}
      --namespace {{ openbao_namespace }}
      --ignore-not-found
      --kubeconfig /etc/rancher/k3s/k3s.yaml
  register: _openbao_helm_uninstall
  changed_when: (_openbao_helm_uninstall.rc | default(1)) == 0
  failed_when: false
