---
# unseal.yml — Runs on every Ansible execution. Decrypts init-keys from the
# Vault-encrypted file on disk and submits unseal shards via the REST API.
# No-ops when OpenBao is already unsealed.

- name: Unseal OpenBao with diagnostics
  block:
    - name: Check current seal status
      ansible.builtin.uri:
        url: "{{ openbao_api_addr }}/v1/sys/seal-status"
        method: GET
        status_code: [200, 429, 472, 473, 503]
      register: _openbao_current_seal
      when: not ansible_check_mode

    - name: Set sealed fact
      ansible.builtin.set_fact:
        openbao_is_sealed: "{{ _openbao_current_seal.json.sealed | default(true) }}"
      when: not ansible_check_mode

    - name: Decrypt init-keys file
      ansible.builtin.command:
        cmd: >-
          ansible-vault decrypt
          --vault-password-file {{ openbao_vault_pass_file }}
          --output -
          {{ openbao_init_keys_file }}
      register: _openbao_decrypted
      no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"
      changed_when: false
      when:
        - openbao_is_sealed | default(true)
        - openbao_unseal_keys is not defined
        - not ansible_check_mode

    - name: Set unseal key and root token facts from decrypted file
      ansible.builtin.set_fact:
        openbao_unseal_keys: "{{ (_openbao_decrypted.stdout | from_yaml).unseal_keys }}"
        openbao_root_token: "{{ (_openbao_decrypted.stdout | from_yaml).root_token }}"
      no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"
      when:
        - openbao_is_sealed | default(true)
        - openbao_unseal_keys is not defined
        - not ansible_check_mode

    - name: Submit unseal shards
      ansible.builtin.uri:
        url: "{{ openbao_api_addr }}/v1/sys/unseal"
        method: POST
        body_format: json
        body:
          key: "{{ item }}"
        status_code: 200
      loop: "{{ openbao_unseal_keys[:openbao_key_threshold] }}"
      register: _openbao_unseal_submit_result
      no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"
      when:
        - openbao_is_sealed | default(false)
        - not ansible_check_mode

    - name: Decrypt init-keys to load root token (vault already unsealed)
      ansible.builtin.command:
        cmd: >-
          ansible-vault decrypt
          --vault-password-file {{ openbao_vault_pass_file }}
          --output -
          {{ openbao_init_keys_file }}
      register: _openbao_decrypted_for_token
      no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"
      changed_when: false
      when:
        - not (openbao_is_sealed | default(true))
        - openbao_root_token is not defined
        - not ansible_check_mode

    - name: Set root token fact (vault already unsealed path)
      ansible.builtin.set_fact:
        openbao_root_token: "{{ (_openbao_decrypted_for_token.stdout | from_yaml).root_token }}"
      no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"
      when:
        - not (openbao_is_sealed | default(true))
        - openbao_root_token is not defined
        - not ansible_check_mode
