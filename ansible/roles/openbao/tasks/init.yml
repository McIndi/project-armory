---
# init.yml — Run once on first deploy. Idempotent: skipped when already initialized.

- name: Initialize OpenBao with diagnostics
  block:
    - name: Check OpenBao initialization status
      ansible.builtin.uri:
        url: "{{ openbao_api_addr }}/v1/sys/seal-status"
        method: GET
        status_code: [200, 429, 472, 473, 501, 503]
      register: _openbao_seal_status
      until: _openbao_seal_status.status in [200, 501]
      retries: 20
      delay: 6
      when: not ansible_check_mode

    - name: Set initialized fact
      ansible.builtin.set_fact:
        openbao_initialized: "{{ _openbao_seal_status.json.initialized | default(false) }}"
      when: not ansible_check_mode

    - name: Generate OpenBao vault password
      ansible.builtin.command:
        cmd: python3 -c "import secrets; print(secrets.token_urlsafe(48))"
      register: _openbao_vault_pass_gen
      changed_when: true
      no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"
      when:
        - not (openbao_initialized | default(true))
        - not ansible_check_mode

    - name: Write vault password file (root-only, stays on VM)
      ansible.builtin.copy:
        dest: "{{ openbao_vault_pass_file }}"
        content: "{{ _openbao_vault_pass_gen.stdout | trim }}\n"
        mode: "0400"
        owner: root
        group: root
      register: _openbao_vault_pass_file_result
      no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"
      when:
        - not (openbao_initialized | default(true))
        - not ansible_check_mode

    - name: Initialize OpenBao
      ansible.builtin.uri:
        url: "{{ openbao_api_addr }}/v1/sys/init"
        method: POST
        body_format: json
        body:
          secret_shares: "{{ openbao_key_shares }}"
          secret_threshold: "{{ openbao_key_threshold }}"
        status_code: 200
      register: _openbao_init_result
      no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"
      when:
        - not (openbao_initialized | default(true))
        - not ansible_check_mode

    - name: Set init key facts
      ansible.builtin.set_fact:
        openbao_unseal_keys: "{{ _openbao_init_result.json.keys_base64 }}"
        openbao_root_token: "{{ _openbao_init_result.json.root_token }}"
      no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"
      when:
        - not (openbao_initialized | default(true))
        - not ansible_check_mode

    - name: Write plaintext init-keys to temp file
      ansible.builtin.copy:
        dest: "{{ openbao_init_keys_file }}.plain"
        content: |
          ---
          unseal_keys:
          {% for key in openbao_unseal_keys %}
            - {{ key }}
          {% endfor %}
          root_token: {{ openbao_root_token }}
        mode: "0400"
        owner: root
        group: root
      register: _openbao_plain_keys_file_result
      no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"
      when:
        - not (openbao_initialized | default(true))
        - not ansible_check_mode

    - name: Encrypt init-keys file with Ansible Vault
      ansible.builtin.command:
        cmd: >-
          ansible-vault encrypt
          --vault-password-file {{ openbao_vault_pass_file }}
          --output {{ openbao_init_keys_file }}
          {{ openbao_init_keys_file }}.plain
      register: _openbao_encrypt_keys_result
      no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"
      when:
        - not (openbao_initialized | default(true))
        - not ansible_check_mode

    - name: Remove plaintext temp file
      ansible.builtin.file:
        path: "{{ openbao_init_keys_file }}.plain"
        state: absent
      register: _openbao_remove_plain_file_result
      when:
        - not (openbao_initialized | default(true))
        - not ansible_check_mode

    - name: Unseal OpenBao immediately after init
      ansible.builtin.uri:
        url: "{{ openbao_api_addr }}/v1/sys/unseal"
        method: POST
        body_format: json
        body:
          key: "{{ item }}"
        status_code: 200
      loop: "{{ openbao_unseal_keys[:openbao_key_threshold] }}"
      register: _openbao_initial_unseal_result
      no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"
      when:
        - not (openbao_initialized | default(true))
        - not ansible_check_mode
