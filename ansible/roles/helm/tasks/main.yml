---
- name: Resolve ARMORY_LOG_NOLOG flag
  ansible.builtin.set_fact:
    armory_log_nolog: "{{ (lookup('ansible.builtin.env', 'ARMORY_LOG_NOLOG') | default('false', true)) | bool }}"
  changed_when: false

- name: Install and validate Helm with diagnostics
  block:
    - name: Ensure Helm is installed
      tags:
        - helm
        - helm_install
      ansible.builtin.dnf:
        name: "{{ helm_package_name }}"
        state: "{{ helm_package_state }}"
      register: _helm_install_result

    - name: Check Helm version
      tags:
        - helm
        - helm_install
      ansible.builtin.command: helm version --short
      register: helm_version_result
      changed_when: false
      when: not ansible_check_mode

    - name: List Helm plugins
      tags:
        - helm
        - helm_install
      ansible.builtin.command: helm plugin list
      register: helm_plugin_list_result
      changed_when: false
      when: not ansible_check_mode

    - name: Install Helm diff plugin
      tags:
        - helm
        - helm_install
      ansible.builtin.command:
        cmd: helm plugin install https://github.com/databus23/helm-diff --verify=false
      changed_when: true
      when:
        - not ansible_check_mode
        - "'diff' not in helm_plugin_list_result.stdout"
