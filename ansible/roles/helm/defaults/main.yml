---
# Helm package name installed by the distribution package manager.
# Override only when the package is named differently on another platform.
helm_package_name: helm

# Desired package state.
# Typical values: present, latest, absent.
# Default keeps Helm installed without forcing upgrades on every run.
helm_package_state: present


# When true, disables Ansible no_log redaction for sensitive tasks.
# WARNING: Enabling this will print secrets/tokens into logs and output.
armory_log_nolog: "{{ lookup('ansible.builtin.env', 'ARMORY_LOG_NOLOG') | default('false', true) | bool }}"
