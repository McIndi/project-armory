---
- name: Install nginx ingress dependencies with diagnostics
  block:
    - name: Validate ingress HTTP policy
      ansible.builtin.assert:
        that:
          - (ingress_http_policy | default('redirect-only')) in ['redirect-only', 'disabled']
        fail_msg: "ingress_http_policy must be one of: redirect-only, disabled"

    - name: Build effective ingress-nginx Helm values from HTTP policy
      ansible.builtin.set_fact:
        _nginx_effective_chart_values: >-
          {{
            nginx_tofu_chart_values
            | combine({
                'controller': {
                  'service': {
                    'enableHttp': ((ingress_http_policy | default('redirect-only')) == 'redirect-only')
                  }
                }
              }, recursive=True)
            | combine(
                {'controller': {'config': {'server-snippet': ''}}}
                if ((ingress_http_policy | default('redirect-only')) == 'disabled')
                else {},
                recursive=True
              )
          }}
      changed_when: false

    - name: Ensure nginx ingress working directory exists
      ansible.builtin.file:
        path: "{{ nginx_tofu_work_dir }}"
        state: directory
        mode: "0755"
      register: _nginx_tofu_workdir_result

    - name: Render ingress-nginx Helm values file
      ansible.builtin.copy:
        dest: "{{ nginx_tofu_work_dir }}/ingress-nginx-values.yaml"
        mode: "0600"
        content: "{{ _nginx_effective_chart_values | to_nice_yaml(indent=2) }}"
      register: _nginx_values_result

    - name: Deploy ingress-nginx via Helm
      kubernetes.core.helm:
        release_name: "{{ nginx_ingress_release_name }}"
        chart_ref: "{{ nginx_ingress_chart_name }}"
        chart_repo_url: "{{ nginx_ingress_chart_repo }}"
        release_namespace: "{{ nginx_ingress_namespace }}"
        create_namespace: true
        values_files:
          - "{{ nginx_tofu_work_dir }}/ingress-nginx-values.yaml"
        chart_version: "{{ nginx_ingress_chart_version if (nginx_ingress_chart_version | length > 0) else omit }}"
        wait: true
        wait_timeout: "{{ (nginx_tofu_timeout_seconds | int) }}s"
        kubeconfig: /etc/rancher/k3s/k3s.yaml
      register: _nginx_helm_apply_result
      when: not ansible_check_mode

    - name: Open HTTP firewall port (80/tcp)
      ansible.posix.firewalld:
        zone: "{{ nginx_ingress_firewall_zone }}"
        port: "80/tcp"
        permanent: true
        immediate: true
        state: "{{ 'enabled' if ((ingress_http_policy | default('redirect-only')) == 'redirect-only') else 'disabled' }}"
      register: _nginx_http_port_result
      when: nginx_ingress_firewall_manage | bool

    - name: Open HTTPS firewall port (443/tcp)
      ansible.posix.firewalld:
        zone: "{{ nginx_ingress_firewall_zone }}"
        port: "443/tcp"
        permanent: true
        immediate: true
        state: enabled
      register: _nginx_https_port_result
      when: nginx_ingress_firewall_manage | bool
