---
- name: Install nginx ingress dependencies with diagnostics
  block:
    - name: Ensure nginx ingress working directory exists
      ansible.builtin.file:
        path: "{{ nginx_tofu_work_dir }}"
        state: directory
        mode: "0755"
      register: _nginx_tofu_workdir_result

    - name: Render ingress-nginx Helm values file
      ansible.builtin.copy:
        dest: "{{ nginx_tofu_work_dir }}/ingress-nginx-values.yaml"
        mode: "0600"
        content: "{{ nginx_tofu_chart_values | to_nice_yaml(indent=2) }}"
      register: _nginx_values_result

    - name: Deploy ingress-nginx via Helm
      ansible.builtin.command:
        cmd: >-
          helm upgrade --install {{ nginx_ingress_release_name }} {{ nginx_ingress_chart_name }}
          --namespace {{ nginx_ingress_namespace }}
          --create-namespace
          --repo {{ nginx_ingress_chart_repo }}
          {% if nginx_ingress_chart_version | length > 0 %}--version {{ nginx_ingress_chart_version }}{% endif %}
          -f {{ nginx_tofu_work_dir }}/ingress-nginx-values.yaml
          --wait
          --timeout {{ nginx_tofu_timeout_seconds }}s
          --kubeconfig /etc/rancher/k3s/k3s.yaml
      register: _nginx_helm_apply_result
      changed_when: true
      when: not ansible_check_mode

    - name: Open HTTP firewall port (80/tcp)
      ansible.posix.firewalld:
        zone: "{{ nginx_ingress_firewall_zone }}"
        port: "80/tcp"
        permanent: true
        immediate: true
        state: enabled
      register: _nginx_http_port_result
      when: nginx_ingress_firewall_manage | bool

    - name: Open HTTPS firewall port (443/tcp)
      ansible.posix.firewalld:
        zone: "{{ nginx_ingress_firewall_zone }}"
        port: "443/tcp"
        permanent: true
        immediate: true
        state: enabled
      register: _nginx_https_port_result
      when: nginx_ingress_firewall_manage | bool
