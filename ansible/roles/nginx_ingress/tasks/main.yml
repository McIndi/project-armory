---
- name: Resolve ARMORY_LOG_NOLOG flag
  ansible.builtin.set_fact:
    armory_log_nolog: "{{ (lookup('ansible.builtin.env', 'ARMORY_LOG_NOLOG') | default('false', true)) | bool }}"
  changed_when: false

- name: Run nginx ingress orchestration with diagnostics
  block:
    - name: nginx Ingress installation
      ansible.builtin.import_tasks: install.yml
      tags: [nginx_ingress, nginx_ingress_install]

    - name: Read ingress controller LoadBalancer IP
      ansible.builtin.command:
        cmd: >-
          k3s kubectl get service {{ nginx_ingress_release_name }}-controller
          --namespace {{ nginx_ingress_namespace }}
          -o jsonpath='{.status.loadBalancer.ingress[0].ip}'
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: _nginx_lb_ip_result
      changed_when: false
      failed_when: false

    - name: Resolve effective ingress IP for local host routing
      ansible.builtin.set_fact:
        nginx_ingress_ip: >-
          {{ (_nginx_lb_ip_result.stdout | trim)
             if (_nginx_lb_ip_result.stdout | trim | length) > 0
             else nginx_ingress_ip }}
      changed_when: false

    - name: TLS certificate provisioning
      ansible.builtin.import_tasks: tls.yml
      tags: [nginx_ingress, nginx_ingress_tls]

    - name: Ensure /etc/hosts routes ingress domain to nginx externalIP
      tags: [nginx_ingress, nginx_ingress_install]
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: '^\S+\s+{{ nginx_ingress_domain | regex_escape }}\s*$'
        line: "{{ nginx_ingress_ip }} {{ nginx_ingress_domain }}"
        owner: root
        group: root
        mode: "0644"
      register: _nginx_hosts_result
      become: true
