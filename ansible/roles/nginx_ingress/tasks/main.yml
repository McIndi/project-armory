---
- name: Resolve ARMORY_BUILD_DEBUG flag
  ansible.builtin.set_fact:
    armory_build_debug: "{{ (lookup('ansible.builtin.env', 'ARMORY_BUILD_DEBUG') | default('false', true)) | bool }}"
    armory_log_nolog: "{{ (lookup('ansible.builtin.env', 'ARMORY_LOG_NOLOG') | default('false', true)) | bool }}"
  changed_when: false

- name: Debug logging controls for nginx ingress role
  ansible.builtin.debug:
    msg:
      - "Role: nginx_ingress"
      - "ARMORY_BUILD_DEBUG: {{ armory_build_debug | default(false) | bool }}"
      - "ARMORY_LOG_NOLOG: {{ armory_log_nolog | default(false) | bool }}"
      - "Sensitive task redaction enabled: {{ not (armory_log_nolog | default(false) | bool) }}"
  when: armory_build_debug | default(false) | bool

- name: Run nginx ingress orchestration with diagnostics
  block:
    - name: nginx Ingress installation
      ansible.builtin.import_tasks: install.yml
      tags: [nginx_ingress, nginx_ingress_install]

    - name: Debug nginx install import task
      ansible.builtin.debug:
        msg:
          - "Task: nginx Ingress installation"
          - "Imported file: roles/nginx_ingress/tasks/install.yml"
          - "Ingress namespace/release: {{ nginx_ingress_namespace }}/{{ nginx_ingress_release_name }}"
      when: armory_build_debug | default(false) | bool

    - name: TLS certificate provisioning
      ansible.builtin.import_tasks: tls.yml
      tags: [nginx_ingress, nginx_ingress_tls]

    - name: Debug nginx TLS import task
      ansible.builtin.debug:
        msg:
          - "Task: TLS certificate provisioning"
          - "Imported file: roles/nginx_ingress/tasks/tls.yml"
          - "Public endpoint: https://{{ nginx_ingress_domain }} (IP SAN {{ nginx_ingress_ip }})"
      when: armory_build_debug | default(false) | bool

    - name: Ensure /etc/hosts routes ingress domain to nginx externalIP
      tags: [nginx_ingress, nginx_ingress_install]
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: '^\S+\s+{{ nginx_ingress_domain | regex_escape }}\s*$'
        line: "{{ nginx_ingress_ip }} {{ nginx_ingress_domain }}"
        owner: root
        group: root
        mode: "0644"
      register: _nginx_hosts_result
      become: true

    - name: Debug /etc/hosts management task
      ansible.builtin.debug:
        msg:
          - "Task: Ensure /etc/hosts routes ingress domain to nginx externalIP"
          - "Entry: {{ nginx_ingress_ip }} {{ nginx_ingress_domain }}"
          - "Task changed: {{ _nginx_hosts_result.changed | default(false) }}"
      when: armory_build_debug | default(false) | bool

  rescue:
    - name: Debug nginx ingress orchestration failure context
      ansible.builtin.debug:
        msg:
          - "Role: nginx_ingress"
          - "Failure task: {{ ansible_failed_task.name | default('unknown') }}"
          - "Failure message: {{ ansible_failed_result.msg | default('n/a') }}"
          - "Failure rc: {{ ansible_failed_result.rc | default('n/a') }}"
          - "Failure cmd: {{ ansible_failed_result.cmd | default('n/a') }}"
          - "Failure stderr: {{ ansible_failed_result.stderr | default('n/a') }}"
          - "Failure stdout: {{ ansible_failed_result.stdout | default('n/a') }}"
          - "Failure exception: {{ ansible_failed_result.exception | default('n/a') }}"
      when: armory_build_debug | default(false) | bool

    - name: Fail nginx ingress orchestration with context
      ansible.builtin.fail:
        msg: >-
          nginx_ingress role failed at '{{ ansible_failed_task.name | default('unknown') }}'.
          Set ARMORY_BUILD_DEBUG=true for companion diagnostics.
