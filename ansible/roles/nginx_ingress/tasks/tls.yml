---
- name: Provision TLS resources with diagnostics
  block:
    - name: Generate TLS target namespace manifest
      ansible.builtin.command:
        cmd: k3s kubectl create namespace {{ nginx_ingress_tls_namespace }} --dry-run=client -o yaml
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: _nginx_tls_ns_yaml
      changed_when: false
      when: not ansible_check_mode

    - name: Apply TLS target namespace
      ansible.builtin.command:
        cmd: k3s kubectl apply -f -
        stdin: "{{ _nginx_tls_ns_yaml.stdout }}"
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: _nginx_tls_ns_apply
      changed_when: "'created' in _nginx_tls_ns_apply.stdout"
      when: not ansible_check_mode

    - name: Read OpenBao CA secret from OpenBao namespace
      ansible.builtin.command:
        cmd: >-
          k3s kubectl get secret {{ nginx_openbao_ca_secret_name }}
          --namespace openbao
          -o jsonpath={.data.ca\\.crt}
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: _nginx_openbao_ca_data
      changed_when: false
      when: not ansible_check_mode

    - name: Write OpenBao CA certificate file for cert-manager
      ansible.builtin.copy:
        dest: /tmp/openbao-ca-certmanager.crt
        content: "{{ (_nginx_openbao_ca_data.stdout | trim) | b64decode }}"
        mode: "0600"
      when: not ansible_check_mode

    - name: Generate OpenBao CA secret manifest for cert-manager namespace
      ansible.builtin.command:
        cmd: >-
          k3s kubectl create secret generic {{ nginx_openbao_ca_secret_name }}
          --namespace {{ certmanager_namespace }}
          --from-file=ca.crt=/tmp/openbao-ca-certmanager.crt
          --dry-run=client -o yaml
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: _nginx_openbao_ca_secret_yaml
      changed_when: false
      when: not ansible_check_mode

    - name: Apply OpenBao CA secret in cert-manager namespace
      ansible.builtin.command:
        cmd: k3s kubectl apply -f -
        stdin: "{{ _nginx_openbao_ca_secret_yaml.stdout }}"
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: _nginx_openbao_ca_secret_apply
      changed_when: >-
        'configured' in (_nginx_openbao_ca_secret_apply.stdout | default('')) or
        'created' in (_nginx_openbao_ca_secret_apply.stdout | default(''))
      when: not ansible_check_mode

    - name: Remove temporary OpenBao CA certificate file for cert-manager
      ansible.builtin.file:
        path: /tmp/openbao-ca-certmanager.crt
        state: absent
      when: not ansible_check_mode

    - name: Apply cert-manager ClusterIssuer for OpenBao PKI
      ansible.builtin.command:
        cmd: k3s kubectl apply -f -
        stdin: "{{ lookup('template', 'cluster-issuer.yaml.j2') }}"
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: _cluster_issuer_result
      changed_when: "'configured' in _cluster_issuer_result.stdout or 'created' in _cluster_issuer_result.stdout"
      when: not ansible_check_mode

    - name: Wait for OpenBao PKI ClusterIssuer readiness
      ansible.builtin.command:
        cmd: >-
          k3s kubectl wait clusterissuer openbao-pki
          --for=condition=Ready
          --timeout=180s
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: _cluster_issuer_wait
      changed_when: false
      when: not ansible_check_mode

    - name: Apply TLS Certificate resource for armory.local
      ansible.builtin.command:
        cmd: k3s kubectl apply -f -
        stdin: "{{ lookup('template', 'certificate.yaml.j2') }}"
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: _certificate_result
      changed_when: "'configured' in _certificate_result.stdout or 'created' in _certificate_result.stdout"
      when: not ansible_check_mode

    - name: Wait for TLS certificate to be issued
      ansible.builtin.command:
        cmd: >-
          k3s kubectl wait certificate armory-tls
          --for=condition=Ready
          --namespace {{ nginx_ingress_tls_namespace }}
          --timeout=120s
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: _certificate_wait_result
      changed_when: false
      when: not ansible_check_mode
