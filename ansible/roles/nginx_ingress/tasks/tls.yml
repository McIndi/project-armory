---
- name: Provision TLS resources with diagnostics
  block:
    - name: Ensure TLS target namespace exists
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ nginx_ingress_tls_namespace }}"
        kubeconfig: /etc/rancher/k3s/k3s.yaml
      when: not ansible_check_mode

    - name: Ensure ingress TLS certificate exists and is ready
      ansible.builtin.import_role:
        name: common
        tasks_from: apply_certificate.yml
      vars:
        common_kubeconfig_path: /etc/rancher/k3s/k3s.yaml
        common_certificate_name: armory-tls
        common_certificate_namespace: "{{ nginx_ingress_tls_namespace }}"
        common_certificate_secret_name: armory-tls
        common_certificate_issuer_name: "{{ nginx_ingress_tls_issuer_name }}"
        common_certificate_duration: "{{ nginx_ingress_cert_duration }}"
        common_certificate_renew_before: "{{ nginx_ingress_cert_renew_before }}"
        common_certificate_common_name: "{{ nginx_ingress_domain }}"
        common_certificate_dns_names:
          - "{{ nginx_ingress_domain }}"
        common_certificate_ip_addresses:
          - "{{ nginx_ingress_ip }}"
        common_certificate_wait_timeout_seconds: 120
