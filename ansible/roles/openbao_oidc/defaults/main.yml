---
# openbao_oidc role defaults
openbao_oidc_kubeconfig_path: "{{ k3s_kubeconfig_path | default('/etc/rancher/k3s/k3s.yaml') }}"
openbao_oidc_role_enabled: "{{ openbao_ui_enabled | default(false) | bool }}"

# OpenBao deployment coordinates
openbao_oidc_namespace: "{{ openbao_namespace | default('openbao') }}"
openbao_oidc_release_name: "{{ openbao_release_name | default('openbao') }}"
openbao_oidc_api_addr: "{{ openbao_api_addr | default('https://openbao.openbao.svc.cluster.local:8200') }}"
openbao_oidc_kv_mount: "{{ openbao_kv_mount | default('secret') }}"
openbao_oidc_secret_path: openbao/ui-oidc
openbao_oidc_auth_mount: oidc
openbao_oidc_default_role_name: armory-ui

# Public URL / issuer settings
openbao_oidc_ingress_host: "{{ openbao_ingress_host | default(lookup('ansible.builtin.env', 'ARMORY_OPENBAO_HOST') | default('openbao.' + (lookup('ansible.builtin.env', 'ARMORY_PUBLIC_DOMAIN') | default('armory.local', true)), true)) }}"
openbao_oidc_issuer_url: "{{ (keycloak_public_base_url | default(lookup('ansible.builtin.env', 'ARMORY_PUBLIC_BASE_URL') | default('https://armory.local', true))) + '/realms/' + openbao_oidc_keycloak_realm }}"
openbao_oidc_discovery_url: "{{ openbao_oidc_issuer_url }}"
openbao_oidc_resolver_host: "{{ openbao_oidc_issuer_url | urlsplit('hostname') }}"
openbao_oidc_resolver_service_namespace: ingress-nginx
openbao_oidc_resolver_service_name: ingress-nginx-controller

# Keycloak settings
openbao_oidc_keycloak_realm: "{{ keycloak_realm | default('armory') }}"
openbao_oidc_keycloak_namespace: "{{ keycloak_namespace | default('keycloak') }}"
openbao_oidc_keycloak_service_name: "{{ keycloak_service_name | default('keycloak-service') }}"
openbao_oidc_keycloak_service_https_port: "{{ keycloak_service_https_port | default(8443) }}"
openbao_oidc_keycloak_internal_fqdn: "{{ openbao_oidc_keycloak_service_name }}.{{ openbao_oidc_keycloak_namespace }}.svc.cluster.local"
openbao_oidc_keycloak_internal_api_url: "https://{{ openbao_oidc_keycloak_internal_fqdn }}:{{ openbao_oidc_keycloak_service_https_port }}"
openbao_oidc_keycloak_admin_secret_name: "{{ keycloak_bootstrap_admin_secret_name | default('keycloak-bootstrap-admin') }}"
openbao_oidc_keycloak_admin_password_key: password
openbao_oidc_keycloak_admin_username_from_secret: true
openbao_oidc_keycloak_admin_username: admin

# OpenBao OIDC Keycloak client settings
openbao_oidc_client_id: openbao
openbao_oidc_client_secret: ""
openbao_oidc_redirect_uris:
  - "https://{{ openbao_oidc_ingress_host }}/ui/vault/auth/oidc/oidc/callback"
  - "https://{{ openbao_oidc_ingress_host }}/oidc/callback"
openbao_oidc_web_origins:
  - "https://{{ openbao_oidc_ingress_host }}"
openbao_oidc_scopes:
  - openid
  - profile
  - email
openbao_oidc_user_claim: preferred_username
openbao_oidc_groups_claim: groups
openbao_oidc_token_policies:
  - default

# CA and trust wiring for API callers
openbao_oidc_openbao_cluster_addr: "{{ openbao_cluster_addr | default('https://openbao.openbao.svc.cluster.local:8200') }}"
openbao_oidc_openbao_ca_secret_name: >-
  {{
    (trust_manager_internal_ca_target_secret_name | default(openbao_tls_ca_secret_name | default('openbao-ca')))
    if (use_declarative_ca_distribution | default(false) | bool)
    else (openbao_tls_ca_secret_name | default('openbao-ca'))
  }}
openbao_oidc_ca_pem_url: "{{ openbao_oidc_api_addr }}/v1/{{ openbao_pki_external_mount | default('pki-ext') }}/ca/pem"

# When true, disables Ansible no_log redaction for sensitive tasks.
armory_log_nolog: "{{ lookup('ansible.builtin.env', 'ARMORY_LOG_NOLOG') | default('false', true) | bool }}"
