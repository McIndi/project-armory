---
- name: Resolve ARMORY_LOG_NOLOG flag
  ansible.builtin.set_fact:
    armory_log_nolog: "{{ (lookup('ansible.builtin.env', 'ARMORY_LOG_NOLOG') | default('false', true)) | bool }}"
  changed_when: false

- name: Install and configure trust-manager
  tags: [trust_manager, trust_manager_install]
  block:
    - name: Deploy trust-manager via Helm
      kubernetes.core.helm:
        release_name: "{{ trust_manager_release_name }}"
        chart_ref: "{{ trust_manager_chart_ref }}"
        release_namespace: "{{ trust_manager_namespace }}"
        create_namespace: true
        chart_version: "{{ trust_manager_chart_version if (trust_manager_chart_version | length > 0) else omit }}"
        release_values:
          app:
            trust:
              namespace: "{{ trust_manager_trust_namespace }}"
          secretTargets:
            enabled: "{{ trust_manager_secret_targets_enabled | bool }}"
            authorizedSecretsAll: "{{ trust_manager_secret_targets_authorized_all | bool }}"
        wait: true
        wait_timeout: "{{ (trust_manager_helm_timeout_seconds | int) }}s"
        kubeconfig: "{{ trust_manager_kubeconfig_path }}"
      register: _trust_manager_helm_apply
      when: not ansible_check_mode

    - name: Apply internal CA Bundle for declarative CA distribution
      ansible.builtin.command:
        cmd: k3s kubectl apply -f -
        stdin: "{{ lookup('template', 'bundle-internal-ca.yaml.j2') }}"
      environment:
        KUBECONFIG: "{{ trust_manager_kubeconfig_path }}"
      register: _trust_manager_internal_bundle_apply
      changed_when: >-
        'configured' in (_trust_manager_internal_bundle_apply.stdout | default('')) or
        'created' in (_trust_manager_internal_bundle_apply.stdout | default(''))
      when:
        - not ansible_check_mode

    - name: Apply external CA Bundle for declarative CA distribution
      ansible.builtin.command:
        cmd: k3s kubectl apply -f -
        stdin: "{{ lookup('template', 'bundle-external-ca.yaml.j2') }}"
      environment:
        KUBECONFIG: "{{ trust_manager_kubeconfig_path }}"
      register: _trust_manager_external_bundle_apply
      changed_when: >-
        'configured' in (_trust_manager_external_bundle_apply.stdout | default('')) or
        'created' in (_trust_manager_external_bundle_apply.stdout | default(''))
      when:
        - not ansible_check_mode
        - use_declarative_ca_distribution | bool
        - trust_manager_external_ca_bundle_enabled | bool

# Target namespaces are created by their owning roles (vso, keycloak, headlamp),
    # most of which run AFTER trust_manager in site.yml. trust-manager watches
    # namespace creation and syncs Bundle targets into late-created namespaces
    # within seconds, so here we only verify sync into namespaces that already
    # exist; consumers created later are covered by the controller's watch.
    - name: List existing target namespaces for Bundle sync verification
      ansible.builtin.command:
        cmd: k3s kubectl get namespace -o jsonpath='{.items[*].metadata.name}'
      environment:
        KUBECONFIG: "{{ trust_manager_kubeconfig_path }}"
      register: _trust_manager_existing_namespaces
      changed_when: false
      when: not ansible_check_mode

    - name: Wait for internal CA Bundle target secret in existing namespaces
      ansible.builtin.command:
        cmd: >-
          k3s kubectl get secret {{ trust_manager_internal_ca_target_secret_name }}
          -n {{ item }}
      environment:
        KUBECONFIG: "{{ trust_manager_kubeconfig_path }}"
      register: _trust_manager_internal_bundle_secret_wait
      changed_when: false
      retries: 20
      delay: 6
      until: _trust_manager_internal_bundle_secret_wait.rc == 0
      loop: >-
        {{
          trust_manager_internal_ca_target_namespaces
          | intersect(_trust_manager_existing_namespaces.stdout | default('') | split)
        }}
      loop_control:
        label: "{{ item }}"
      when:
        - not ansible_check_mode
        - (trust_manager_internal_ca_target_namespaces | default([]) | length) > 0
