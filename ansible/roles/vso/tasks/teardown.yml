---
- name: Register VSO namespace for teardown checks
  ansible.builtin.set_fact:
    teardown_role_target_namespaces: >-
      {{
        (teardown_role_target_namespaces | default([]))
        + [vso_namespace]
        | unique
      }}

- name: Uninstall Vault Secrets Operator helm release
  ansible.builtin.command:
    cmd: >-
      helm uninstall {{ vso_release_name }}
      --namespace {{ vso_namespace }}
      --ignore-not-found
      --kubeconfig {{ vso_kubeconfig_path }}
  register: _vso_helm_uninstall
  changed_when: (_vso_helm_uninstall.rc | default(1)) == 0
  failed_when: false
