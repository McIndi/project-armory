---
- name: Resolve ARMORY_LOG_NOLOG flag
  ansible.builtin.set_fact:
    armory_log_nolog: "{{ (lookup('ansible.builtin.env', 'ARMORY_LOG_NOLOG') | default('false', true)) | bool }}"
  changed_when: false

- name: Install Vault Secrets Operator (hardened chart)
  tags: [vso, vso_install]
  block:
    - name: Validate hardened VSO chart configuration
      ansible.builtin.assert:
        that:
          - >-
            (
              (vso_chart_path | default('') | trim) | length > 0
            )
            or
            (
              ((vso_chart_repo | default('') | trim) | length > 0)
              and ((vso_chart_name | default('') | trim) | length > 0)
              and ((vso_chart_version | default('') | trim) | length > 0)
              and ((vso_chart_repo | trim) != 'https://helm.releases.hashicorp.com')
            )
        fail_msg: >-
          Hardened VSO chart is required. Set VSO_CHART_PATH to a local hardened
          chart directory, or set VSO_CHART_REPO, VSO_CHART_NAME, and
          VSO_CHART_VERSION to a pinned forked chart that supports explicit
          kube-rbac-proxy TLS cert/key flags.
      when: vso_require_hardened_chart | bool

    - name: Ensure VSO working directory exists
      ansible.builtin.file:
        path: "{{ vso_work_dir }}"
        state: directory
        mode: "0755"

    - name: Build effective VSO Helm values
      ansible.builtin.set_fact:
        _vso_effective_chart_values: >-
          {{
            vso_chart_values | combine({
              "controller": {
                "kubeRbacProxy": {
                  "tls": {
                    "enabled": vso_kube_rbac_proxy_tls_enabled | bool
                  }
                }
              },
              "defaultVaultConnection": {
                "enabled": true,
                "address": vso_openbao_cluster_addr,
                "tlsServerName": vso_openbao_tls_server_name,
                "caCertSecret": vso_openbao_ca_secret_name,
                "caCertSecretRef": vso_openbao_ca_secret_name,
                "skipTLSVerify": false
              }
            }, recursive=true)
          }}
      changed_when: false

    - name: Render VSO Helm values file
      ansible.builtin.copy:
        dest: "{{ vso_work_dir }}/values.yaml"
        mode: "0600"
        content: "{{ _vso_effective_chart_values | to_nice_yaml(indent=2) }}"

    - name: Ensure VSO namespace exists
      ansible.builtin.command:
        cmd: >-
          k3s kubectl create namespace {{ vso_namespace }}
          --dry-run=client -o yaml
      environment:
        KUBECONFIG: "{{ vso_kubeconfig_path }}"
      register: _vso_namespace_yaml
      changed_when: false
      when: not ansible_check_mode

    - name: Apply VSO namespace manifest
      ansible.builtin.command:
        cmd: k3s kubectl apply -f -
        stdin: "{{ _vso_namespace_yaml.stdout }}"
      environment:
        KUBECONFIG: "{{ vso_kubeconfig_path }}"
      register: _vso_namespace_apply
      changed_when: >-
        'created' in (_vso_namespace_apply.stdout | default(''))
      when: not ansible_check_mode

    - name: Ensure OpenBao CA secret exists in VSO namespace
      ansible.builtin.import_role:
        name: common
        tasks_from: copy_openbao_ca_secret.yml
      vars:
        common_kubeconfig_path: "{{ vso_kubeconfig_path }}"
        common_ca_secret_name: "{{ vso_openbao_ca_secret_name }}"
        common_ca_source_namespace: "{{ vso_openbao_namespace }}"
        common_ca_target_namespace: "{{ vso_namespace }}"
      when: not (use_declarative_ca_distribution | default(false) | bool)

    - name: Ensure VSO kube-rbac-proxy certificate exists and is ready
      ansible.builtin.import_role:
        name: common
        tasks_from: apply_certificate.yml
      vars:
        common_kubeconfig_path: "{{ vso_kubeconfig_path }}"
        common_certificate_name: "{{ vso_kube_rbac_proxy_cert_name }}"
        common_certificate_namespace: "{{ vso_namespace }}"
        common_certificate_secret_name: "{{ vso_kube_rbac_proxy_tls_secret_name }}"
        common_certificate_issuer_name: "{{ vso_kube_rbac_proxy_cert_issuer_name }}"
        common_certificate_issuer_kind: "{{ vso_kube_rbac_proxy_cert_issuer_kind }}"
        common_certificate_issuer_group: "{{ vso_kube_rbac_proxy_cert_issuer_group }}"
        common_certificate_duration: "{{ vso_kube_rbac_proxy_cert_duration }}"
        common_certificate_renew_before: "{{ vso_kube_rbac_proxy_cert_renew_before }}"
        common_certificate_common_name: "{{ vso_kube_rbac_proxy_cert_common_name | default('') }}"
        common_certificate_dns_names: "{{ vso_kube_rbac_proxy_cert_dns_names }}"
      when:
        - not ansible_check_mode
        - vso_kube_rbac_proxy_tls_enabled | bool

    - name: Wait for VSO kube-rbac-proxy TLS Secret
      ansible.builtin.command:
        cmd: >-
          k3s kubectl get secret {{ vso_kube_rbac_proxy_tls_secret_name }}
          --namespace {{ vso_namespace }}
      environment:
        KUBECONFIG: "{{ vso_kubeconfig_path }}"
      register: _vso_kube_rbac_proxy_tls_secret_wait
      changed_when: false
      retries: 20
      delay: 6
      until: _vso_kube_rbac_proxy_tls_secret_wait.rc == 0
      when:
        - not ansible_check_mode
        - vso_kube_rbac_proxy_tls_enabled | bool

    - name: Deploy Vault Secrets Operator via Helm
      kubernetes.core.helm:
        release_name: "{{ vso_release_name }}"
        chart_ref: "{{ (vso_chart_path | trim) if ((vso_chart_path | default('') | trim) | length > 0) else vso_chart_name }}"
        chart_repo_url: "{{ vso_chart_repo if ((vso_chart_path | default('') | trim) | length == 0) else omit }}"
        release_namespace: "{{ vso_namespace }}"
        create_namespace: true
        values_files:
          - "{{ vso_work_dir }}/values.yaml"
        chart_version: "{{ vso_chart_version if (((vso_chart_path | default('') | trim) | length == 0) and (vso_chart_version | length > 0)) else omit }}"
        wait: true
        wait_timeout: "{{ (vso_helm_timeout_seconds | int) }}s"
        kubeconfig: "{{ vso_kubeconfig_path }}"
      register: _vso_helm_apply_result
      when: not ansible_check_mode
  when: not ansible_check_mode
