---
# Deploy Headlamp with Helm and sync OIDC secret from OpenBao via VSO.

- name: Load OpenBao root token
  ansible.builtin.import_role:
    name: common
    tasks_from: load_openbao_root_token.yml

- name: Write OpenBao ACL policy for Headlamp OIDC secret
  ansible.builtin.uri:
    url: "{{ headlamp_openbao_api_addr }}/v1/sys/policies/acl/{{ headlamp_openbao_policy_name }}"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_root_token }}"
    body_format: json
    body:
      policy: |
        path "{{ headlamp_openbao_kv_mount }}/data/{{ headlamp_openbao_oidc_path }}" {
          capabilities = ["read"]
        }

        path "{{ headlamp_openbao_kv_mount }}/metadata/{{ headlamp_openbao_oidc_path }}" {
          capabilities = ["read"]
        }
    status_code: [200, 204]
  register: _headlamp_openbao_policy_result
  when: not ansible_check_mode
  no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"

- name: Configure OpenBao Kubernetes auth role for Headlamp VSO sync
  ansible.builtin.uri:
    url: "{{ headlamp_openbao_api_addr }}/v1/auth/kubernetes/role/{{ headlamp_openbao_k8s_role }}"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_root_token }}"
    body_format: json
    body:
      bound_service_account_names:
        - "{{ headlamp_vso_sa_name }}"
      bound_service_account_namespaces:
        - "{{ headlamp_namespace }}"
      policies:
        - "{{ headlamp_openbao_policy_name }}"
      ttl: 24h
    status_code: [200, 204]
  register: _headlamp_openbao_k8s_role_result
  when: not ansible_check_mode
  no_log: "{{ not (armory_log_nolog | default(false) | bool) }}"

- name: Ensure OpenBao CA secret exists in Headlamp namespace
  ansible.builtin.import_role:
    name: common
    tasks_from: copy_openbao_ca_secret.yml
  vars:
    common_kubeconfig_path: "{{ headlamp_kubeconfig_path }}"
    common_ca_secret_name: "{{ headlamp_openbao_ca_secret_name }}"
    common_ca_source_namespace: "{{ headlamp_openbao_namespace | default(openbao_namespace | default('openbao')) }}"
    common_ca_target_namespace: "{{ headlamp_namespace }}"
  when: not (use_declarative_ca_distribution | default(false) | bool)

- name: Apply Headlamp VaultConnection and VaultAuth resources
  ansible.builtin.command:
    cmd: k3s kubectl apply -f -
    stdin: "{{ lookup('template', 'headlamp_vaultconnection.yaml.j2') }}\n---\n{{ lookup('template', 'headlamp_vaultauth.yaml.j2') }}"
  environment:
    KUBECONFIG: "{{ headlamp_kubeconfig_path }}"
  register: _headlamp_vault_auth_apply
  changed_when: >-
    'configured' in (_headlamp_vault_auth_apply.stdout | default('')) or
    'created' in (_headlamp_vault_auth_apply.stdout | default(''))
  when: not ansible_check_mode

- name: Apply Headlamp VaultStaticSecret resource
  ansible.builtin.command:
    cmd: k3s kubectl apply -f -
    stdin: "{{ lookup('template', 'headlamp_vaultstaticsecret.yaml.j2') }}"
  environment:
    KUBECONFIG: "{{ headlamp_kubeconfig_path }}"
  register: _headlamp_vss_apply
  changed_when: >-
    'configured' in (_headlamp_vss_apply.stdout | default('')) or
    'created' in (_headlamp_vss_apply.stdout | default(''))
  when: not ansible_check_mode

- name: Wait for Headlamp OIDC secret to be synced by VSO
  ansible.builtin.command:
    cmd: >-
      k3s kubectl get secret {{ headlamp_oidc_secret_name }}
      --namespace {{ headlamp_namespace }}
  environment:
    KUBECONFIG: "{{ headlamp_kubeconfig_path }}"
  register: _headlamp_oidc_secret_check
  until: _headlamp_oidc_secret_check.rc == 0
  retries: 20
  delay: 6
  changed_when: false
  when: not ansible_check_mode

- name: Read ingress controller LoadBalancer IP for Headlamp host mapping
  ansible.builtin.command:
    cmd: >-
      k3s kubectl get service ingress-nginx-controller
      --namespace ingress-nginx
      -o jsonpath='{.status.loadBalancer.ingress[0].ip}'
  environment:
    KUBECONFIG: "{{ headlamp_kubeconfig_path }}"
  register: _headlamp_lb_ip_result
  changed_when: false
  failed_when: false

- name: Resolve effective Headlamp ingress IP for local hosts entry
  ansible.builtin.set_fact:
    headlamp_ingress_ip_effective: >-
      {{ (_headlamp_lb_ip_result.stdout | trim)
         if (_headlamp_lb_ip_result.stdout | trim | length) > 0
         else headlamp_ingress_ip }}
  changed_when: false

- name: Ensure Headlamp host resolves to ingress IP locally
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^\S+\s+{{ headlamp_ingress_host | regex_escape }}\s*$'
    line: "{{ headlamp_ingress_ip_effective }} {{ headlamp_ingress_host }}"
    owner: root
    group: root
    mode: "0644"
  become: true
  register: _headlamp_hosts_result

- name: Ensure Headlamp working directory exists
  ansible.builtin.file:
    path: "{{ headlamp_tofu_work_dir }}"
    state: directory
    mode: "0755"
  register: _headlamp_work_dir_result

- name: Build Headlamp chart values payload
  ansible.builtin.set_fact:
    _headlamp_chart_values: >-
      {{ {
          'clusterRoleBinding': {
            'create': False
          },
          'config': {
            'enableHelm': True,
            'tlsCertPath': headlamp_internal_tls_mount_path + '/tls.crt',
            'tlsKeyPath': headlamp_internal_tls_mount_path + '/tls.key',
            'extraArgs': [
              '-oidc-ca-file=' + headlamp_oidc_ca_file_path
            ],
            'oidc': {
              'secret': {
                'create': False
              },
              'externalSecret': {
                'enabled': True,
                'name': headlamp_oidc_secret_name,
                'hasScopes': True
              }
            },
            'watchPlugins': ((headlamp_plugins_manager_enabled | bool) and ((headlamp_plugins | length) > 0))
          },
          'probes': {
            'scheme': 'HTTPS'
          },
          'service': {
            'port': 8443
          },
          'volumes': [{
            'name': 'headlamp-oidc-ca',
            'secret': {
              'secretName': headlamp_oidc_secret_name,
              'items': [{
                'key': headlamp_oidc_ca_secret_key,
                'path': headlamp_oidc_ca_file_name
              }]
            }
          }, {
            'name': 'headlamp-internal-tls',
            'secret': {
              'secretName': headlamp_internal_tls_secret_name
            }
          }],
          'volumeMounts': [{
            'name': 'headlamp-oidc-ca',
            'mountPath': headlamp_oidc_ca_mount_path,
            'readOnly': True
          }, {
            'name': 'headlamp-internal-tls',
            'mountPath': headlamp_internal_tls_mount_path,
            'readOnly': True
          }],
          'pluginsManager': {
            'enabled': ((headlamp_plugins_manager_enabled | bool) and ((headlamp_plugins | length) > 0)),
            'configContent': ({
              'plugins': headlamp_plugins,
              'installOptions': {
                'parallel': (headlamp_plugins_manager_install_parallel | bool),
                'maxConcurrent': (headlamp_plugins_manager_max_concurrent | int)
              }
            } | to_nice_yaml(indent=2)),
            'version': 'latest'
          },
          'ingress': {
            'enabled': True,
            'ingressClassName': headlamp_ingress_class,
            'annotations': {
              'nginx.ingress.kubernetes.io/backend-protocol': 'HTTPS',
              'nginx.ingress.kubernetes.io/ssl-redirect': 'true'
            },
            'hosts': [{
              'host': headlamp_ingress_host,
              'paths': [{
                'path': headlamp_ingress_path,
                'type': headlamp_ingress_path_type
              }]
            }],
            'tls': [{
              'secretName': headlamp_tls_secret_name,
              'hosts': [headlamp_ingress_host]
            }]
          }
        } | combine(headlamp_chart_values_overrides | default({}), recursive=True)
      }}
  changed_when: false

- name: Render Headlamp Helm values file
  ansible.builtin.copy:
    dest: "{{ headlamp_tofu_work_dir }}/values.yaml"
    mode: "0600"
    content: "{{ _headlamp_chart_values | to_nice_yaml(indent=2) }}"
  register: _headlamp_values_result

- name: Deploy Headlamp via Helm
  ansible.builtin.command:
    cmd: >-
      helm upgrade --install {{ headlamp_release_name }} {{ headlamp_chart_name }}
      --namespace {{ headlamp_namespace }}
      --create-namespace
      --repo {{ headlamp_chart_repo }}
      {% if headlamp_chart_version | length > 0 %}--version {{ headlamp_chart_version }}{% endif %}
      -f {{ headlamp_tofu_work_dir }}/values.yaml
      --kubeconfig {{ headlamp_kubeconfig_path }}
  register: _headlamp_helm_apply_result
  changed_when: true
  when: not ansible_check_mode

- name: Read Headlamp probe schemes
  ansible.builtin.command:
    cmd: >-
      k3s kubectl get deployment {{ headlamp_release_name }}
      --namespace {{ headlamp_namespace }}
      -o jsonpath='{.spec.template.spec.containers[?(@.name=="headlamp")].livenessProbe.httpGet.scheme}|{.spec.template.spec.containers[?(@.name=="headlamp")].readinessProbe.httpGet.scheme}'
  environment:
    KUBECONFIG: "{{ headlamp_kubeconfig_path }}"
  register: _headlamp_probe_schemes
  changed_when: false
  when: not ansible_check_mode

- name: Patch Headlamp deployment probes to HTTPS
  ansible.builtin.command:
    cmd: >-
      k3s kubectl patch deployment {{ headlamp_release_name }}
      --namespace {{ headlamp_namespace }}
      --type=strategic
      --patch
      {{ ({
          'spec': {
            'template': {
              'spec': {
                'containers': [{
                  'name': 'headlamp',
                  'livenessProbe': {
                    'httpGet': {
                      'scheme': 'HTTPS'
                    }
                  },
                  'readinessProbe': {
                    'httpGet': {
                      'scheme': 'HTTPS'
                    }
                  }
                }]
              }
            }
          }
        }) | to_json | quote }}
  environment:
    KUBECONFIG: "{{ headlamp_kubeconfig_path }}"
  register: _headlamp_probe_scheme_patch_result
  changed_when: true
  when:
    - not ansible_check_mode
    - (_headlamp_probe_schemes.stdout | default('')) != 'HTTPS|HTTPS'

- name: Resolve in-cluster ingress IP for Headlamp OIDC issuer hostname
  ansible.builtin.command:
    cmd: >-
      k3s kubectl get svc {{ headlamp_oidc_resolver_service_name }}
      --namespace {{ headlamp_oidc_resolver_service_namespace }}
      -o jsonpath={.spec.clusterIP}
  environment:
    KUBECONFIG: "{{ headlamp_kubeconfig_path }}"
  register: _headlamp_oidc_resolver_ip_result
  changed_when: false
  when: not ansible_check_mode

- name: Patch Headlamp deployment with OIDC issuer hostAlias
  ansible.builtin.command:
    cmd: >-
      k3s kubectl patch deployment {{ headlamp_release_name }}
      --namespace {{ headlamp_namespace }}
      --type=strategic
      --patch
      {{ ({
           'spec': {
             'template': {
               'spec': {
                 'hostAliases': [{
                   'ip': _headlamp_oidc_resolver_ip_result.stdout,
                   'hostnames': [headlamp_oidc_resolver_host]
                 }]
               }
             }
           }
         }) | to_json | quote }}
  environment:
    KUBECONFIG: "{{ headlamp_kubeconfig_path }}"
  register: _headlamp_oidc_hostalias_patch_result
  changed_when: "'(no change)' not in (_headlamp_oidc_hostalias_patch_result.stdout | default(''))"
  when:
    - not ansible_check_mode
    - (_headlamp_oidc_resolver_ip_result.stdout | default('') | length) > 0

- name: Wait for Headlamp deployment rollout
  ansible.builtin.command:
    cmd: >-
      k3s kubectl rollout status deployment/{{ headlamp_release_name }}
      --namespace {{ headlamp_namespace }}
      --timeout=300s
  environment:
    KUBECONFIG: "{{ headlamp_kubeconfig_path }}"
  register: _headlamp_rollout_result
  changed_when: false
  when: not ansible_check_mode
