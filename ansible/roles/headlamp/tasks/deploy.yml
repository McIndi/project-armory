---
# Deploy Headlamp with Helm and sync OIDC secret from OpenBao via VSO.

- name: Ensure OpenBao CA secret exists in Headlamp namespace
  ansible.builtin.import_role:
    name: common
    tasks_from: copy_openbao_ca_secret.yml
  vars:
    common_kubeconfig_path: "{{ headlamp_kubeconfig_path }}"
    common_ca_secret_name: "{{ headlamp_openbao_ca_secret_name }}"
    common_ca_source_namespace: "{{ headlamp_openbao_namespace | default(openbao_namespace | default('openbao')) }}"
    common_ca_target_namespace: "{{ headlamp_namespace }}"
  when: not (use_declarative_ca_distribution | default(false) | bool)

- name: Apply Headlamp VaultConnection resource
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'headlamp_vaultconnection.yaml.j2') | from_yaml_all | list }}"
    kubeconfig: "{{ headlamp_kubeconfig_path }}"
  when: not ansible_check_mode

- name: Apply Headlamp VaultAuth resource
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'headlamp_vaultauth.yaml.j2') | from_yaml_all | list }}"
    kubeconfig: "{{ headlamp_kubeconfig_path }}"
  when: not ansible_check_mode

- name: Apply Headlamp VaultStaticSecret resource
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'headlamp_vaultstaticsecret.yaml.j2') | from_yaml_all | list }}"
    kubeconfig: "{{ headlamp_kubeconfig_path }}"
  when: not ansible_check_mode

- name: Wait for Headlamp OIDC secret to be synced by VSO
  ansible.builtin.command:
    cmd: >-
      k3s kubectl get secret {{ headlamp_oidc_secret_name }}
      --namespace {{ headlamp_namespace }}
  environment:
    KUBECONFIG: "{{ headlamp_kubeconfig_path }}"
  register: _headlamp_oidc_secret_check
  until: _headlamp_oidc_secret_check.rc == 0
  retries: 20
  delay: 6
  changed_when: false
  when: not ansible_check_mode

# The gateway Service carries the node address as an externalIP, so the
# public host maps straight to the node IP.
- name: Ensure Headlamp host resolves to gateway IP locally
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^\S+\s+{{ headlamp_ingress_host | regex_escape }}\s*$'
    line: "{{ headlamp_ingress_ip }} {{ headlamp_ingress_host }}"
    owner: root
    group: root
    mode: "0644"
  become: true
  register: _headlamp_hosts_result

- name: Ensure Headlamp working directory exists
  ansible.builtin.file:
    path: "{{ headlamp_tofu_work_dir }}"
    state: directory
    mode: "0755"
  register: _headlamp_work_dir_result

- name: Build Headlamp chart values payload
  ansible.builtin.set_fact:
    _headlamp_chart_values: >-
      {{ {
          'clusterRoleBinding': {
            'create': False
          },
          'config': {
            'enableHelm': True,
            'tlsCertPath': headlamp_internal_tls_mount_path + '/tls.crt',
            'tlsKeyPath': headlamp_internal_tls_mount_path + '/tls.key',
            'extraArgs': [
              '-oidc-ca-file=' + headlamp_oidc_ca_file_path
            ],
            'oidc': {
              'secret': {
                'create': False
              },
              'externalSecret': {
                'enabled': True,
                'name': headlamp_oidc_secret_name,
                'hasScopes': True
              }
            },
            'watchPlugins': ((headlamp_plugins_manager_enabled | bool) and ((headlamp_plugins | length) > 0))
          },
          'probes': {
            'scheme': 'HTTPS'
          },
          'service': {
            'port': 8443
          },
          'resources': {
            'requests': {
              'cpu': headlamp_resources_requests_cpu,
              'memory': headlamp_resources_requests_memory
            },
            'limits': {
              'cpu': headlamp_resources_limits_cpu,
              'memory': headlamp_resources_limits_memory
            }
          },
          'volumes': [{
            'name': 'headlamp-oidc-ca',
            'secret': {
              'secretName': headlamp_oidc_secret_name,
              'items': [{
                'key': headlamp_oidc_ca_secret_key,
                'path': headlamp_oidc_ca_file_name
              }]
            }
          }, {
            'name': 'headlamp-internal-tls',
            'secret': {
              'secretName': headlamp_internal_tls_secret_name
            }
          }],
          'volumeMounts': [{
            'name': 'headlamp-oidc-ca',
            'mountPath': headlamp_oidc_ca_mount_path,
            'readOnly': True
          }, {
            'name': 'headlamp-internal-tls',
            'mountPath': headlamp_internal_tls_mount_path,
            'readOnly': True
          }],
          'pluginsManager': {
            'enabled': ((headlamp_plugins_manager_enabled | bool) and ((headlamp_plugins | length) > 0)),
            'configContent': ({
              'plugins': headlamp_plugins,
              'installOptions': {
                'parallel': (headlamp_plugins_manager_install_parallel | bool),
                'maxConcurrent': (headlamp_plugins_manager_max_concurrent | int)
              }
            } | to_nice_yaml(indent=2)),
            'version': 'latest'
          },
          'ingress': {
            'enabled': False
          }
        } | combine(headlamp_chart_values_overrides | default({}), recursive=True)
      }}
  changed_when: false

- name: Render Headlamp Helm values file
  ansible.builtin.copy:
    dest: "{{ headlamp_tofu_work_dir }}/values.yaml"
    mode: "0600"
    content: "{{ _headlamp_chart_values | to_nice_yaml(indent=2) }}"
  register: _headlamp_values_result

- name: Deploy Headlamp via Helm
  kubernetes.core.helm:
    release_name: "{{ headlamp_release_name }}"
    chart_ref: "{{ headlamp_chart_name }}"
    chart_repo_url: "{{ headlamp_chart_repo }}"
    release_namespace: "{{ headlamp_namespace }}"
    create_namespace: true
    values_files:
      - "{{ headlamp_tofu_work_dir }}/values.yaml"
    chart_version: "{{ headlamp_chart_version if (headlamp_chart_version | length > 0) else omit }}"
    kubeconfig: "{{ headlamp_kubeconfig_path }}"
  register: _headlamp_helm_apply_result
  when: not ansible_check_mode

- name: Read Headlamp probe schemes
  ansible.builtin.command:
    cmd: >-
      k3s kubectl get deployment {{ headlamp_release_name }}
      --namespace {{ headlamp_namespace }}
      -o jsonpath='{.spec.template.spec.containers[?(@.name=="headlamp")].livenessProbe.httpGet.scheme}|{.spec.template.spec.containers[?(@.name=="headlamp")].readinessProbe.httpGet.scheme}'
  environment:
    KUBECONFIG: "{{ headlamp_kubeconfig_path }}"
  register: _headlamp_probe_schemes
  changed_when: false
  when: not ansible_check_mode

- name: Patch Headlamp deployment probes to HTTPS
  kubernetes.core.k8s:
    state: present
    apply: true
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: "{{ headlamp_release_name }}"
        namespace: "{{ headlamp_namespace }}"
      spec:
        template:
          spec:
            containers:
              - name: headlamp
                livenessProbe:
                  httpGet:
                    scheme: HTTPS
                readinessProbe:
                  httpGet:
                    scheme: HTTPS
    server_side_apply:
      field_manager: armory-ansible
      force_conflicts: true
    kubeconfig: "{{ headlamp_kubeconfig_path }}"
  when:
    - not ansible_check_mode
    - (_headlamp_probe_schemes.stdout | default('')) != 'HTTPS|HTTPS'

- name: Mirror Headlamp serving CA into BackendTLSPolicy ConfigMap
  ansible.builtin.import_role:
    name: common
    tasks_from: apply_backend_ca_configmap.yml
  vars:
    common_kubeconfig_path: "{{ headlamp_kubeconfig_path }}"
    common_backend_ca_namespace: "{{ headlamp_namespace }}"
    common_backend_ca_secret_name: "{{ headlamp_internal_tls_secret_name }}"
    common_backend_ca_configmap_name: "{{ headlamp_backend_ca_configmap }}"

- name: Apply Headlamp HTTPRoute and BackendTLSPolicy
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'headlamp_httproute.yaml.j2') | from_yaml_all | list }}"
    kubeconfig: "{{ headlamp_kubeconfig_path }}"
  when: not ansible_check_mode

- name: Resolve gateway Service for Headlamp OIDC issuer hostname
  ansible.builtin.import_role:
    name: common
    tasks_from: lookup_gateway_service.yml
  vars:
    common_kubeconfig_path: "{{ headlamp_kubeconfig_path }}"

- name: Patch Headlamp deployment with OIDC issuer hostAlias
  ansible.builtin.command:
    cmd: >-
      k3s kubectl patch deployment {{ headlamp_release_name }}
      --namespace {{ headlamp_namespace }}
      --type=strategic
      --patch
      {{ ({
           'spec': {
             'template': {
               'spec': {
                 'hostAliases': [{
                   'ip': edge_gateway_service_cluster_ip,
                   'hostnames': [headlamp_oidc_resolver_host]
                 }]
               }
             }
           }
         }) | to_json | quote }}
  environment:
    KUBECONFIG: "{{ headlamp_kubeconfig_path }}"
  register: _headlamp_oidc_hostalias_patch_result
  changed_when: "'(no change)' not in (_headlamp_oidc_hostalias_patch_result.stdout | default(''))"
  when:
    - not ansible_check_mode
    - (edge_gateway_service_cluster_ip | default('') | length) > 0

- name: Wait for Headlamp deployment rollout
  ansible.builtin.command:
    cmd: >-
      k3s kubectl rollout status deployment/{{ headlamp_release_name }}
      --namespace {{ headlamp_namespace }}
      --timeout=300s
  environment:
    KUBECONFIG: "{{ headlamp_kubeconfig_path }}"
  register: _headlamp_rollout_result
  changed_when: false
  when: not ansible_check_mode
