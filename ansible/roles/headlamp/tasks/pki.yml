---
# Provision cert-manager Certificate for the Headlamp ingress host.

- name: Generate Headlamp namespace manifest
  ansible.builtin.command:
    cmd: k3s kubectl create namespace {{ headlamp_namespace }} --dry-run=client -o yaml
  environment:
    KUBECONFIG: "{{ headlamp_kubeconfig_path }}"
  register: _headlamp_ns_yaml
  changed_when: false
  when: not ansible_check_mode

- name: Apply Headlamp namespace
  ansible.builtin.command:
    cmd: k3s kubectl apply -f -
    stdin: "{{ _headlamp_ns_yaml.stdout }}"
  environment:
    KUBECONFIG: "{{ headlamp_kubeconfig_path }}"
  register: _headlamp_ns_apply
  changed_when: "'created' in (_headlamp_ns_apply.stdout | default(''))"
  when: not ansible_check_mode

- name: Ensure Headlamp TLS certificate exists and is ready
  ansible.builtin.import_role:
    name: common
    tasks_from: apply_certificate.yml
  vars:
    common_kubeconfig_path: "{{ headlamp_kubeconfig_path }}"
    common_certificate_name: "{{ headlamp_tls_secret_name }}"
    common_certificate_namespace: "{{ headlamp_namespace }}"
    common_certificate_secret_name: "{{ headlamp_tls_secret_name }}"
    common_certificate_issuer_name: "{{ headlamp_tls_issuer_name }}"
    common_certificate_duration: "{{ headlamp_cert_duration }}"
    common_certificate_renew_before: "{{ headlamp_cert_renew_before }}"
    common_certificate_common_name: "{{ headlamp_ingress_host }}"
    common_certificate_dns_names:
      - "{{ headlamp_ingress_host }}"

- name: Ensure Headlamp internal TLS certificate exists and is ready
  ansible.builtin.import_role:
    name: common
    tasks_from: apply_certificate.yml
  vars:
    common_kubeconfig_path: "{{ headlamp_kubeconfig_path }}"
    common_certificate_name: "{{ headlamp_internal_tls_secret_name }}"
    common_certificate_namespace: "{{ headlamp_namespace }}"
    common_certificate_secret_name: "{{ headlamp_internal_tls_secret_name }}"
    common_certificate_issuer_name: "{{ headlamp_internal_tls_issuer_name }}"
    common_certificate_duration: "{{ headlamp_cert_duration }}"
    common_certificate_renew_before: "{{ headlamp_cert_renew_before }}"
    common_certificate_dns_names:
      - "{{ headlamp_internal_fqdn }}"
