---
# Apply Kubernetes RBAC bindings for OIDC groups

- name: Apply ClusterRole for Headlamp pod log access
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRole
      metadata:
        name: headlamp-pod-logs
      rules:
        - apiGroups: [""]
          resources:
            - pods
            - pods/log
          verbs:
            - get
            - list
            - watch
    kubeconfig: "{{ headlamp_kubeconfig_path }}"
  when: not ansible_check_mode

- name: Apply ClusterRoleBindings for Headlamp OIDC groups
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: "headlamp-oidc-{{ item.group | regex_replace('[^a-z0-9.-]', '-') }}"
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: "{{ item.cluster_role }}"
      subjects:
        - kind: Group
          name: "{{ (k3s_oidc_groups_prefix | default('oidc:')) + item.group }}"
          apiGroup: rbac.authorization.k8s.io
    kubeconfig: "{{ headlamp_kubeconfig_path }}"
  loop: "{{ headlamp_oidc_group_bindings }}"
  loop_control:
    label: "{{ item.group }} -> {{ item.cluster_role }}"
  when: not ansible_check_mode

- name: Apply ClusterRoleBindings for Headlamp pod log access
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: "headlamp-oidc-{{ item.group | regex_replace('[^a-z0-9.-]', '-') }}-pod-logs"
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: headlamp-pod-logs
      subjects:
        - kind: Group
          name: "{{ (k3s_oidc_groups_prefix | default('oidc:')) + item.group }}"
          apiGroup: rbac.authorization.k8s.io
    kubeconfig: "{{ headlamp_kubeconfig_path }}"
  loop: "{{ headlamp_oidc_group_bindings }}"
  loop_control:
    label: "{{ item.group }} -> headlamp-pod-logs"
  when: not ansible_check_mode
