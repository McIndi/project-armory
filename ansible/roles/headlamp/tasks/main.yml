---
- name: Resolve ARMORY_LOG_NOLOG flag
  ansible.builtin.set_fact:
    armory_log_nolog: "{{ (lookup('ansible.builtin.env', 'ARMORY_LOG_NOLOG') | default('false', true)) | bool }}"
  changed_when: false

- name: Run Headlamp orchestration with diagnostics
  tags: [headlamp, headlamp_install]
  block:
    - name: Automate Keycloak OIDC client setup for Headlamp
      ansible.builtin.import_tasks: oidc_client.yml
      tags: [headlamp, headlamp_oidc, keycloak, openbao]
      when: not ansible_check_mode

    - name: Provision Headlamp TLS certificate resources
      ansible.builtin.import_tasks: pki.yml
      tags: [headlamp, headlamp_pki, openbao, cert_manager]

    - name: Deploy Headlamp and VSO sync resources
      ansible.builtin.import_tasks: deploy.yml
      tags: [headlamp, headlamp_deploy, openbao, vso]

    - name: Apply Kubernetes RBAC for Headlamp access
      ansible.builtin.import_tasks: rbac.yml
      tags: [headlamp, headlamp_rbac, kubernetes_rbac]

    - name: Configure k3s API server OIDC authentication
      ansible.builtin.import_tasks: k3s_oidc_configure.yml
      tags: [headlamp, k3s_oidc]
