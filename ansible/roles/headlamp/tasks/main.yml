---
- name: Resolve ARMORY_BUILD_DEBUG flag
  ansible.builtin.set_fact:
    armory_build_debug: "{{ (lookup('ansible.builtin.env', 'ARMORY_BUILD_DEBUG') | default('false', true)) | bool }}"
    armory_log_nolog: "{{ (lookup('ansible.builtin.env', 'ARMORY_LOG_NOLOG') | default('false', true)) | bool }}"
  changed_when: false

- name: Debug logging controls for headlamp role
  ansible.builtin.debug:
    msg:
      - "Role: headlamp"
      - "ARMORY_BUILD_DEBUG: {{ armory_build_debug | default(false) | bool }}"
      - "ARMORY_LOG_NOLOG: {{ armory_log_nolog | default(false) | bool }}"
      - "Sensitive task redaction enabled: {{ not (armory_log_nolog | default(false) | bool) }}"
  when: armory_build_debug | default(false) | bool

- name: Run Headlamp orchestration with diagnostics
  tags: [headlamp, headlamp_install]
  block:
    - name: Automate Keycloak OIDC client setup for Headlamp
      ansible.builtin.import_tasks: oidc_client.yml
      tags: [headlamp, headlamp_oidc, keycloak, openbao]

    - name: Debug Headlamp OIDC import task
      ansible.builtin.debug:
        msg:
          - "Task: Automate Keycloak OIDC client setup for Headlamp"
          - "Imported file: roles/headlamp/tasks/oidc_client.yml"
          - "OIDC client ID/issuer: {{ headlamp_oidc_client_id }} / {{ headlamp_oidc_issuer_url }}"
      when: armory_build_debug | default(false) | bool

    - name: Provision Headlamp TLS certificate resources
      ansible.builtin.import_tasks: pki.yml
      tags: [headlamp, headlamp_pki, openbao, cert_manager]

    - name: Debug Headlamp PKI import task
      ansible.builtin.debug:
        msg:
          - "Task: Provision Headlamp TLS certificate resources"
          - "Imported file: roles/headlamp/tasks/pki.yml"
          - "Ingress host/TLS secret: {{ headlamp_ingress_host }} / {{ headlamp_tls_secret_name }}"
      when: armory_build_debug | default(false) | bool

    - name: Deploy Headlamp and VSO sync resources
      ansible.builtin.import_tasks: deploy.yml
      tags: [headlamp, headlamp_deploy, openbao, vso]

    - name: Debug Headlamp deploy import task
      ansible.builtin.debug:
        msg:
          - "Task: Deploy Headlamp and VSO sync resources"
          - "Imported file: roles/headlamp/tasks/deploy.yml"
          - "Namespace/release: {{ headlamp_namespace }} / {{ headlamp_release_name }}"
      when: armory_build_debug | default(false) | bool

  rescue:
    - name: Debug Headlamp orchestration failure context
      ansible.builtin.debug:
        msg:
          - "Role: headlamp"
          - "Failure task: {{ ansible_failed_task.name | default('unknown') }}"
          - "Failure message: {{ ansible_failed_result.msg | default('n/a') }}"
          - "Failure rc: {{ ansible_failed_result.rc | default('n/a') }}"
          - "Failure cmd: {{ ansible_failed_result.cmd | default('n/a') }}"
          - "Failure stderr: {{ ansible_failed_result.stderr | default('n/a') }}"
          - "Failure stdout: {{ ansible_failed_result.stdout | default('n/a') }}"
          - "Failure exception: {{ ansible_failed_result.exception | default('n/a') }}"
      when: armory_build_debug | default(false) | bool

    - name: Fail Headlamp orchestration with context
      ansible.builtin.fail:
        msg: >-
          headlamp role failed at '{{ ansible_failed_task.name | default('unknown') }}'.
          Set ARMORY_BUILD_DEBUG=true for companion diagnostics.
