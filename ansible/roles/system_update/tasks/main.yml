---
- name: Resolve ARMORY_LOG_NOLOG flag
  ansible.builtin.set_fact:
    armory_log_nolog: "{{ (lookup('ansible.builtin.env', 'ARMORY_LOG_NOLOG') | default('false', true)) | bool }}"
  changed_when: false

- name: Run system update flow with diagnostics
  block:
    - name: Update installed packages with dnf
      tags:
        - system_update
        - dnf_update
      ansible.builtin.dnf:
        name: "*"
        state: "{{ system_update_package_state }}"
        update_only: "{{ system_update_update_only | bool }}"
        update_cache: "{{ system_update_update_cache | bool }}"
      register: _system_update_result
