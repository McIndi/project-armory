---
- name: Provision edge TLS resources with diagnostics
  block:
    - name: Ensure gateway namespace exists
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ envoy_gateway_namespace }}"
        kubeconfig: "{{ envoy_gateway_kubeconfig_path }}"
      when: not ansible_check_mode

    - name: Ensure edge TLS certificate exists and is ready
      ansible.builtin.import_role:
        name: common
        tasks_from: apply_certificate.yml
      vars:
        common_kubeconfig_path: "{{ envoy_gateway_kubeconfig_path }}"
        common_certificate_name: "{{ envoy_gateway_tls_secret_name }}"
        common_certificate_namespace: "{{ envoy_gateway_namespace }}"
        common_certificate_secret_name: "{{ envoy_gateway_tls_secret_name }}"
        common_certificate_issuer_name: "{{ envoy_gateway_tls_issuer_name }}"
        common_certificate_duration: "{{ envoy_gateway_cert_duration }}"
        common_certificate_renew_before: "{{ envoy_gateway_cert_renew_before }}"
        common_certificate_common_name: "{{ envoy_gateway_domain }}"
        common_certificate_dns_names: "{{ envoy_gateway_tls_sans }}"
        common_certificate_ip_addresses:
          - "{{ envoy_gateway_ip }}"
        common_certificate_wait_timeout_seconds: 120
