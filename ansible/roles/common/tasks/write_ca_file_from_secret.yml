---
- name: Assert secret CA file helper inputs
  ansible.builtin.assert:
    that:
      - (common_kubeconfig_path | default('') | trim | length) > 0
      - (common_ca_secret_name | default('') | trim | length) > 0
      - (common_ca_source_namespace | default(common_openbao_namespace) | trim | length) > 0
      - (common_ca_file_path | default('') | trim | length) > 0
    fail_msg: >-
      Missing required inputs for secret CA file helper.
      Required: common_kubeconfig_path, common_ca_secret_name, common_ca_file_path.
  when: not ansible_check_mode

- name: Read CA secret data for temporary file
  ansible.builtin.command:
    cmd: >-
      k3s kubectl get secret {{ common_ca_secret_name }}
      --namespace {{ common_ca_source_namespace | default(common_openbao_namespace) }}
      -o jsonpath={.data.ca\\.crt}
  environment:
    KUBECONFIG: "{{ common_kubeconfig_path }}"
  register: _common_ca_secret_b64
  changed_when: false
  when: not ansible_check_mode

- name: Assert CA secret payload is present
  ansible.builtin.assert:
    that:
      - (_common_ca_secret_b64.stdout | default('') | trim | length) > 0
    fail_msg: >-
      CA secret '{{ common_ca_secret_name }}' in namespace
      '{{ common_ca_source_namespace | default(common_openbao_namespace) }}'
      does not contain a non-empty ca.crt payload.
  when: not ansible_check_mode

- name: Write CA certificate file
  ansible.builtin.copy:
    dest: "{{ common_ca_file_path }}"
    mode: "0600"
    content: "{{ (_common_ca_secret_b64.stdout | trim) | b64decode }}"
  changed_when: false
  when: not ansible_check_mode
