---
# Resolve the Envoy data-plane Service for the Armory edge Gateway. The
# Service name is generated by Envoy Gateway, so consumers look it up by the
# owning-gateway labels and read facts:
#   edge_gateway_service_name        (empty string when not found)
#   edge_gateway_service_cluster_ip  (empty string when not found)

- name: Look up Envoy Gateway data-plane Service
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Service
    namespace: "{{ edge_gateway_namespace | default('envoy-gateway-system') }}"
    label_selectors:
      - "gateway.envoyproxy.io/owning-gateway-name={{ edge_gateway_name | default('armory') }}"
      - "gateway.envoyproxy.io/owning-gateway-namespace={{ edge_gateway_namespace | default('envoy-gateway-system') }}"
    kubeconfig: "{{ common_kubeconfig_path | default('/etc/rancher/k3s/k3s.yaml') }}"
  register: _common_gateway_svc_info
  changed_when: false
  failed_when: false
  when: not ansible_check_mode

- name: Set edge gateway service facts
  ansible.builtin.set_fact:
    edge_gateway_service_name: >-
      {{ ((_common_gateway_svc_info.resources | default([]) | first | default({})).metadata.name) | default('') }}
    edge_gateway_service_cluster_ip: >-
      {{ ((_common_gateway_svc_info.resources | default([]) | first | default({})).spec.clusterIP) | default('') }}
  changed_when: false
