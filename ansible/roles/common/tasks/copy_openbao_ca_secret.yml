---
- name: Assert CA copy helper inputs
  ansible.builtin.assert:
    that:
      - (common_ca_secret_name | default('') | trim | length) > 0
      - (common_ca_target_namespace | default('') | trim | length) > 0
      - (common_ca_source_namespace | default(common_openbao_namespace) | trim | length) > 0
    fail_msg: >-
      Missing required inputs for common CA copy helper.
      Required: common_ca_secret_name, common_ca_target_namespace.
  when: not ansible_check_mode

- name: Read CA secret data from source namespace
  ansible.builtin.command:
    cmd: >-
      k3s kubectl get secret {{ common_ca_secret_name }}
      --namespace {{ common_ca_source_namespace | default(common_openbao_namespace) }}
      -o jsonpath={.data.ca\\.crt}
  environment:
    KUBECONFIG: "{{ common_kubeconfig_path }}"
  register: _common_ca_secret_b64
  changed_when: false
  when: not ansible_check_mode

- name: Write temporary CA certificate file
  ansible.builtin.copy:
    dest: "/tmp/{{ common_ca_secret_name }}-{{ common_ca_target_namespace }}.crt"
    mode: "0600"
    content: "{{ (_common_ca_secret_b64.stdout | trim) | b64decode }}"
  when: not ansible_check_mode

- name: Generate CA secret manifest for target namespace
  ansible.builtin.command:
    cmd: >-
      k3s kubectl create secret generic {{ common_ca_secret_name }}
      --namespace {{ common_ca_target_namespace }}
      --from-file=ca.crt=/tmp/{{ common_ca_secret_name }}-{{ common_ca_target_namespace }}.crt
      --dry-run=client -o yaml
  environment:
    KUBECONFIG: "{{ common_kubeconfig_path }}"
  register: _common_ca_secret_yaml
  changed_when: false
  when: not ansible_check_mode

- name: Apply CA secret in target namespace
  ansible.builtin.command:
    cmd: k3s kubectl apply -f -
    stdin: "{{ _common_ca_secret_yaml.stdout }}"
  environment:
    KUBECONFIG: "{{ common_kubeconfig_path }}"
  register: _common_ca_secret_apply
  changed_when: >-
    'configured' in (_common_ca_secret_apply.stdout | default('')) or
    'created' in (_common_ca_secret_apply.stdout | default(''))
  when: not ansible_check_mode

- name: Remove temporary CA certificate file
  ansible.builtin.file:
    path: "/tmp/{{ common_ca_secret_name }}-{{ common_ca_target_namespace }}.crt"
    state: absent
  when: not ansible_check_mode