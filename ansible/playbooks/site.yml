---
- name: Base configuration for local Fedora VM
  hosts: all
  gather_facts: true
  roles:
    - role: env_guard
      tags:
        - always
        - env_guard
        - preflight
    - role: system_update
      tags:
        - system_update
        - dnf_update
    - role: helm
      tags:
        - helm
        - helm_install
    - role: k3s
      tags:
        - k3s
    - role: openbao
      tags:
        - openbao
    - role: cert_manager
      tags:
        - cert_manager
        - cert_manager_install
    - role: trust_manager
      tags:
        - trust_manager
        - trust_manager_install
      when: trust_manager_enabled | default(false) | bool
    - role: nginx_ingress
      tags:
        - nginx_ingress
    - role: vso
      tags:
        - vso
        - vso_install
    - role: keycloak
      tags:
        - keycloak
        - keycloak_install
      when: keycloak_enabled | default(false) | bool
    - role: openbao_oidc
      tags:
        - openbao_oidc
        - openbao
        - keycloak
      when: keycloak_enabled | default(false) | bool
    - role: headlamp
      tags:
        - headlamp
        - headlamp_install
        - k3s_oidc
    - role: delve
      tags:
        - delve
        - delve_install
      when: delve_enabled | default(false) | bool
    - role: readiness_check
      tags:
        - readiness
        - readiness_check
        - post_deploy
      when: not ansible_check_mode
