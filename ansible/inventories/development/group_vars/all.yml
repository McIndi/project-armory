---
# Global overrides for the development inventory.

# Cut over to the standalone Keycloak (Operator + Postgres StatefulSet) role.
# Must live here (group_vars/all), NOT in the keycloak role defaults, so that
# consumer roles (headlamp, k3s, readiness_check) — which cannot see the keycloak
# role's own defaults — switch their Keycloak coordinates to the standalone
# deployment (realm `armory`, ns `keycloak`, svc `keycloak-service:8443` for
# internal control-plane HTTPS calls, admin secret `keycloak-bootstrap-admin`).
keycloak_enabled: true

# Declarative CA distribution (trust-manager) is staged off by default.
trust_manager_enabled: true
use_declarative_ca_distribution: true

# Shared trust-manager internal CA distribution defaults.
trust_manager_internal_ca_bundle_name: openbao-ca-bundle
trust_manager_internal_ca_target_secret_name: openbao-ca-bundle
trust_manager_internal_ca_target_namespaces:
  - cert-manager
  - vault-secrets-operator-system
  - keycloak
  - headlamp

# Keycloak -> Postgres TLS rollout toggle (staged off by default for compatibility).
keycloak_pg_tls_enabled: true

# OpenBao consumer wiring - shared between the openbao role (which writes the
# consumer ACL policies and k8s auth roles at bootstrap, with root) and the
# keycloak/headlamp roles (which write KV secrets with the provisioner token).
# Must live here, NOT in role defaults, because role defaults are invisible
# across roles. Single source of truth: the role-default copies of these names
# have been removed.
keycloak_namespace: keycloak
keycloak_vso_sa_name: keycloak-vso
keycloak_openbao_policy_name: keycloak-vso
keycloak_openbao_k8s_role: keycloak-vso
keycloak_openbao_db_path: keycloak/db
keycloak_openbao_realm_admin_path: keycloak/realm-admin
keycloak_openbao_rotator_path: keycloak/rotator
keycloak_rotator_sa_name: keycloak-realm-admin-rotator
keycloak_rotator_openbao_policy_name: keycloak-realm-admin-rotator
keycloak_rotator_openbao_k8s_role: keycloak-realm-admin-rotator
headlamp_namespace: headlamp
headlamp_vso_sa_name: headlamp-vso
headlamp_openbao_policy_name: headlamp-vso
headlamp_openbao_k8s_role: headlamp-vso
headlamp_openbao_oidc_path: headlamp/oidc

# Ingress HTTP behavior policy.
ingress_http_policy: disabled

# Demo capability: expose OpenBao UI through ingress for OIDC login flows.
openbao_ui_enabled: true
