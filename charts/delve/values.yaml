# Default values for the delve chart. The armory delve role overrides the
# environment-specific values; keep this file generic and upstreamable (no
# armory-only literals).

image:
  repository: ghcr.io/mcindi/delve
  tag: latest
  pullPolicy: Always

# Optional image pull secrets (names of existing dockerconfigjson secrets).
# Empty for a public GHCR package.
imagePullSecrets: []

serviceAccount:
  # Create the ServiceAccount the web/worker/migrate pods run under.
  create: true
  name: delve

# Database connection. The chart does NOT provision the database; `secretName`
# must reference an existing Secret (synced by VSO) carrying the keys
# `username`, `password`, and `secret_key` (the Django SECRET_KEY).
database:
  engine: postgresql
  host: ""
  port: 5432
  name: delve
  secretName: delve-db-secret

# Comma-separated DELVE_ALLOWED_HOSTS. The chart always appends
# localhost,127.0.0.1 for in-cluster checks.
allowedHosts: ""

# Send the web server's logs to stdout (DELVE_SERVER_LOG_STDOUT).
logStdout: true

# Django SECRET_KEY origin. Read from the database secret's `secret_key` key.
secretKeyRef:
  name: ""        # defaults to database.secretName when empty
  key: secret_key

service:
  type: ClusterIP
  port: 8000

# Human SSO via Keycloak OIDC. Phase 3 flips `enabled` to true; Phase 1 keeps
# Delve's air-gapped local-auth default. When enabled, the web/worker pods read
# the OIDC client credentials + issuer from `secretName` (synced by VSO) and the
# web pod mounts the issuer CA so server-side token/JWKS calls trust it.
oidc:
  enabled: false
  # VSO-synced Secret carrying OIDC_CLIENT_ID / OIDC_CLIENT_SECRET /
  # OIDC_ISSUER_URL / OIDC_SCOPES / OIDC_CA_PEM.
  secretName: delve-oidc
  scopes: "openid profile email"
  # Key inside `secretName` holding the issuer CA PEM, mounted into the web pod.
  caPemKey: OIDC_CA_PEM
  caMountPath: /etc/delve-oidc
  caFileName: oidc-ca.pem
  # hostAliases injected into the web pod so it can resolve the public issuer
  # host (e.g. armory.local) to the in-cluster ingress IP. The role fills this
  # in at deploy time; empty here keeps the chart generic.
  # [{ ip: "10.0.0.10", hostnames: ["armory.local"] }]
  issuerHostAliases: []

# Machine ingestion (bearer-JWT) for the audit feed shippers. Independent of
# `oidc` (human SSO): same issuer, different client (delve-ingest), separate code
# path. When enabled, the web pod validates Bearer tokens on ingress/ against the
# realm JWKS, trusting the issuer's TLS via the CA mounted from `secretName`.
ingest:
  enabled: false
  # VSO-synced Secret carrying OIDC_CLIENT_ID / OIDC_CLIENT_SECRET /
  # OIDC_ISSUER_URL / OIDC_CA_PEM for the delve-ingest client.
  secretName: delve-ingest
  # Required azp/aud of accepted tokens.
  audience: delve-ingest
  # Key inside `secretName` holding the issuer CA PEM, mounted into the web pod.
  caPemKey: OIDC_CA_PEM
  caMountPath: /etc/delve-ingest
  caFileName: ingest-ca.pem

# Internal TLS re-encrypt. When enabled, the web pod serves HTTPS from a mounted
# cert (cherrypy SSL via DELVE_SSL_*), and the ingress must carry the
# `nginx.ingress.kubernetes.io/backend-protocol: HTTPS` annotation (set by the
# role). Phase 3 turns this on alongside oidc; Phase 1 served plain HTTP.
tls:
  enabled: false
  # VSO/cert-manager-issued internal TLS Secret (tls.crt / tls.key).
  secretName: delve-internal-tls
  mountPath: /etc/delve-tls

ingress:
  enabled: true
  className: nginx
  host: delve.local
  path: /
  pathType: Prefix
  tlsSecretName: delve-tls
  annotations: {}

worker:
  # django-q cluster (qcluster). Single replica; the broker is the ORM DB.
  replicas: 1

web:
  replicas: 1

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 768Mi

# Migrate pre-install/pre-upgrade hook.
migrate:
  backoffLimit: 3
