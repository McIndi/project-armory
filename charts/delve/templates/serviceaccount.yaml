{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "delve.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "delve.labels" . | nindent 4 }}
  annotations:
    # Also created as an install/upgrade hook (weighted ahead of the migrate
    # Job) so the pre-install migrate pod can reference it — normal resources are
    # only applied after hooks run.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
{{- with .Values.imagePullSecrets }}
imagePullSecrets:
  {{- toYaml . | nindent 2 }}
{{- end }}
{{- end }}
