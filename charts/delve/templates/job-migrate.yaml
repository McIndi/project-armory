apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "delve.fullname" . }}-migrate
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "delve.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    # Runs before the web/worker Deployments on every install/upgrade. The DB
    # and its credential secret are provisioned out-of-band by the delve role's
    # db.yml before this release runs, so the hook connects cleanly. collectstatic
    # already runs at image build, so this is migrate-only.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.migrate.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "delve.labels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "delve.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "manage.py", "migrate", "--noinput"]
          env:
            {{- include "delve.env" . | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
